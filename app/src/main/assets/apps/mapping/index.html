<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f111a"><title>Amy FX Mapping</title>
<style>
:root{--bg:#050505;--card:#151515;--card2:#1b1b1b;--gold:#d4af37;--text:#f6f6f6;--muted:#aaa;--green:#4ade80;--red:#ff5252;--blue:#3e89fa;--purple:#a855f7;--cyan:#2dd4bf;--orange:#f97316;--border:rgba(212,175,55,.18)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:88px}button,input{font:inherit}button{cursor:pointer}.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 14px;background:rgba(10,10,10,.92);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(12px)}.brand{width:50px;height:40px;border-radius:12px;background:var(--gold);color:#111;display:grid;place-items:center;font-weight:900}.brand-title{font-size:20px;font-weight:900}.brand-sub{font-size:12px;color:var(--gold)}.status{margin-left:auto;font-weight:800;color:var(--muted)}.status.on{color:var(--green)}.content{padding:20px;max-width:860px;margin:0 auto}.card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:18px;margin:0 0 18px}.hero{display:flex;justify-content:space-between;gap:14px}.kicker{color:var(--gold);font-size:13px;letter-spacing:.06em}.price{font-size:28px;font-weight:900}.muted{color:var(--muted)}.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--gold)}.tf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.tf-grid button,.action,.chip{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text);border-radius:12px;padding:13px 8px;font-weight:900}.tf-grid button.active,.action{background:var(--gold);color:#111;border-color:var(--gold)}.context{border:1px solid var(--border);border-radius:16px;padding:16px;background:#0c0c0c}.context h2{font-size:19px;margin:0 0 14px}.bias{padding:12px 14px;background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.28);border-radius:12px;font-weight:900;margin-bottom:16px}.block{padding-left:14px;margin:14px 0;line-height:1.58}.block b{display:block;margin-bottom:4px}.blue{border-left:3px solid var(--blue)}.purple{border-left:3px solid var(--purple)}.gold{border-left:3px solid var(--gold)}.cyan{border-left:3px solid var(--cyan)}.rred{border-left:3px solid var(--red)}.orange{border-left:3px solid var(--orange);background:rgba(249,115,22,.08);padding:10px 12px;border-radius:0 10px 10px 0}.suggest{border-left:5px solid var(--green);background:rgba(74,222,128,.12);padding:13px;border-radius:0 12px 12px 0;font-weight:800;line-height:1.55}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{margin:0;text-align:center}.metric strong{font-size:26px;display:block}.concept-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.concept{background:var(--card2);border-radius:14px;padding:13px;min-height:130px}.concept small{display:block;font-size:11px;font-weight:900;text-transform:uppercase}.concept h3{margin:2px 0 8px;color:var(--gold);font-size:16px}.concept p{margin:0;color:var(--muted);font-size:13px;line-height:1.38}.nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(15,15,15,.95);display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:10px 12px calc(env(safe-area-inset-bottom,0px) + 10px);border-top:1px solid rgba(255,255,255,.08)}.nav button{background:transparent;border:0;color:#aaa;font-weight:800;font-size:12px;display:flex;flex-direction:column;gap:3px;align-items:center}.nav button.active{color:var(--gold)}.log{background:#1e1e1e;border-left:4px solid var(--gold);padding:12px;border-radius:10px;margin:8px 0;white-space:pre-wrap}.settings input{width:100%;background:#111723;border:1px solid rgba(255,255,255,.12);border-radius:14px;color:#fff;padding:14px;margin:8px 0 14px}.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff3131;margin-right:8px;box-shadow:0 0 12px #ff3131}.warn{background:rgba(255,82,82,.11);border:1px solid rgba(255,82,82,.22);padding:12px;border-radius:12px}.signal{font-size:18px;font-weight:900}.home-spacer{height:24px}@media(max-width:520px){.content{padding:16px}.concept-grid{grid-template-columns:1fr 1fr}.tf-grid{grid-template-columns:repeat(4,1fr)}.hero{align-items:flex-start}.price{font-size:22px}}
</style>
</head>
<body>
<header class="topbar"><div class="brand">XAU</div><div><div class="brand-title">XAUUSD ICT</div><div class="brand-sub">Mapping • MTF • Signal</div></div><div id="conn" class="status">Offline</div></header>
<main class="content" id="app"></main>
<nav class="nav"><button data-tab="Dashboard" class="active">▥<span>Dashboard</span></button><button data-tab="Analyze">〽<span>Analyze</span></button><button data-tab="History">◷<span>History</span></button><button data-tab="Terminal">›_<span>Terminal</span></button><button data-tab="Settings">⚙<span>Settings</span></button></nav>
<script>
const TF={M1:'1min',M5:'5min',M15:'15min',M30:'30min',H1:'1h',H4:'4h',D1:'1day',W1:'1week'};
const tfSecs={M1:60,M5:300,M15:900,M30:1800,H1:3600,H4:14400,D1:86400,W1:604800};
const state={tab:'Dashboard',tf:'M5',key:localStorage.getItem('twelve_api_key')||'',price:Number(localStorage.getItem('last_price')||0),conn:'Offline',logs:JSON.parse(localStorage.getItem('amy_mapping_logs')||'[]'),analyses:JSON.parse(localStorage.getItem('amy_mapping_analyses')||'[]'),candles:{},current:{},result:null,mtf:{},bg:localStorage.getItem('bg_scanner')==='true',voice:localStorage.getItem('voice_alert')!=='false',notified:JSON.parse(localStorage.getItem('amy_mapping_notified')||'{}')};
let ws=null,reconnectTimer=null,scanTimer=null;
const p2=v=>Number.isFinite(+v)?Number(v).toFixed(2):'-';
function nowTime(){return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date())}
function log(x){state.logs=[`[${nowTime()}] ${x}`,...state.logs].slice(0,200);localStorage.setItem('amy_mapping_logs',JSON.stringify(state.logs));renderSoft()}
function save(){localStorage.setItem('amy_mapping_analyses',JSON.stringify(state.analyses.slice(0,80)));localStorage.setItem('amy_mapping_logs',JSON.stringify(state.logs.slice(0,200)));localStorage.setItem('bg_scanner',String(state.bg));localStorage.setItem('voice_alert',String(state.voice));}
function timeRange(zone,sh,sm,eh,em){let now=new Date(),fmt=new Intl.DateTimeFormat('en-CA',{timeZone:zone,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(now),g=t=>+fmt.find(x=>x.type===t).value;let guess=Date.UTC(g('year'),g('month')-1,g('day'),sh,sm);let txt=new Intl.DateTimeFormat('en-GB',{timeZone:zone,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(guess));let [hh,mm]=txt.split(':').map(Number);let start=guess+((sh*60+sm)-(hh*60+mm))*60000;let end=start+(((eh*60+em)-(sh*60+sm)+(eh*60+em<=sh*60+sm?1440:0))*60000);return{start,end}}
function sessions(){let z=[['Asian Kill Zone','Asia/Tokyo',9,0,12,0],['London Judas Swing','Europe/London',7,0,8,30],['London Open Kill Zone','Europe/London',8,0,12,0],['New York Judas Swing','America/New_York',8,0,9,30],['New York Open Kill Zone','America/New_York',8,30,11,30],['Silver Bullet','America/New_York',10,0,11,0],['Swing Session','America/New_York',13,30,16,0]];let n=Date.now();return z.map(a=>{let r=timeRange(...a.slice(1));return{name:a[0],active:n>=r.start&&n<r.end,wib:new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(r.start))+' - '+new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(r.end))}})}
function curSession(){return sessions().find(x=>x.active)||{name:'Off-Session',active:false,wib:'-'}}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function swings(cs,left=3,right=3){let highs=[],lows=[];for(let i=left;i<cs.length-right;i++){let h=true,l=true;for(let j=1;j<=left;j++){if(cs[i].high<=cs[i-j].high)h=false;if(cs[i].low>=cs[i-j].low)l=false}for(let j=1;j<=right;j++){if(cs[i].high<=cs[i+j].high)h=false;if(cs[i].low>=cs[i+j].low)l=false}if(h)highs.push({...cs[i],index:i});if(l)lows.push({...cs[i],index:i})}return{highs,lows}}
function detectFvg(cs){let ranges=cs.slice(-40).map(c=>c.high-c.low),ar=avg(ranges)||1,out=[];for(let i=Math.max(2,cs.length-80);i<cs.length;i++){let a=cs[i-2],b=cs[i-1],c=cs[i];if(!a||!b||!c)continue;let body=Math.abs(b.close-b.open);if(a.high<c.low && body>ar*.55){let mitigated=cs.slice(i+1).some(x=>x.low<=c.low&&x.high>=a.high);if(!mitigated)out.push({type:'BULLISH',bottom:a.high,top:c.low,index:i,score:Math.round(body/ar*20)})}if(a.low>c.high && body>ar*.55){let mitigated=cs.slice(i+1).some(x=>x.high>=c.high&&x.low<=a.low);if(!mitigated)out.push({type:'BEARISH',bottom:c.high,top:a.low,index:i,score:Math.round(body/ar*20)})}}return out.slice(-8)}
function detectStructure(cs,sw){let trend='NEUTRAL',last=null;for(let i=1;i<cs.length;i++){let prevHigh=[...sw.highs].reverse().find(x=>x.index<i-1);let prevLow=[...sw.lows].reverse().find(x=>x.index<i-1);if(prevHigh&&cs[i].close>prevHigh.high){last={kind:trend==='BEARISH'?'CHOCH':'BOS',dir:'BULLISH',price:prevHigh.high,index:i};trend='BULLISH'}if(prevLow&&cs[i].close<prevLow.low){last={kind:trend==='BULLISH'?'CHOCH':'BOS',dir:'BEARISH',price:prevLow.low,index:i};trend='BEARISH'}}return{trend,last}}
function detectOB(cs,structure){if(!structure.last)return[];let i=structure.last.index,dir=structure.last.dir;let start=Math.max(0,i-18),leg=cs.slice(start,i);let obs=[];if(dir==='BULLISH'){for(let k=leg.length-1;k>=0;k--){let c=leg[k];if(c.close<c.open){let idx=start+k,mit=cs.slice(i+1).some(x=>x.low<c.low);if(!mit)obs.push({type:'BULLISH',bottom:c.low,top:Math.max(c.open,c.close),index:idx});break}}}else{for(let k=leg.length-1;k>=0;k--){let c=leg[k];if(c.close>c.open){let idx=start+k,mit=cs.slice(i+1).some(x=>x.high>c.high);if(!mit)obs.push({type:'BEARISH',bottom:Math.min(c.open,c.close),top:c.high,index:idx});break}}}return obs}
function tfGroup(tf){return tf==='M1'?['M1','M5','M15','H1']:tf==='M5'?['M5','M15','H1','H4']:tf==='M15'?['M15','H1','H4','D1']:tf==='M30'?['M30','H1','H4','D1']:tf==='H1'?['H1','H4','D1','W1']:tf==='H4'?['H4','D1','W1']:['D1','W1']}
function analyze(cs,tf,htfBiases={}){if(!cs||cs.length<30)return null;let price=state.price||cs.at(-1).close, sw=swings(cs,tf==='M1'?2:3,tf==='M1'?2:3), st=detectStructure(cs,sw), fvg=detectFvg(cs), ob=detectOB(cs,st), high=Math.max(...sw.highs.slice(-5).map(x=>x.high),...cs.slice(-50).map(x=>x.high)), low=Math.min(...sw.lows.slice(-5).map(x=>x.low),...cs.slice(-50).map(x=>x.low)), eq=(high+low)/2, zone=price>eq?'Premium':price<eq?'Discount':'Equilibrium';let bsl=[...sw.highs].reverse().find(x=>x.high>price)?.high||Math.max(...cs.slice(-30).map(c=>c.high));let ssl=[...sw.lows].reverse().find(x=>x.low<price)?.low||Math.min(...cs.slice(-30).map(c=>c.low));let htfList=Object.values(htfBiases).filter(Boolean),bull=htfList.filter(x=>x==='BULLISH').length,bear=htfList.filter(x=>x==='BEARISH').length,htf=bear>bull?'BEARISH':bull>bear?'BULLISH':'NEUTRAL';let biasScore=(st.trend==='BULLISH'?1:st.trend==='BEARISH'?-1:0)+(htf==='BULLISH'?2:htf==='BEARISH'?-2:0)+(zone==='Discount'?1:zone==='Premium'?-1:0);let final=biasScore>0?'BULLISH':biasScore<0?'BEARISH':'NEUTRAL';let nearFvg=fvg.filter(x=>price>=x.bottom&&price<=x.top).at(-1)||fvg.at(-1), nearOb=ob.find(x=>price>=x.bottom&&price<=x.top)||ob[0];let score=Math.min(100,Math.max(20,45+Math.abs(biasScore)*8+(nearFvg?10:0)+(nearOb?15:0)+(curSession().active?8:0)+(st.last?8:0)));let signal='WAIT',reason='Tunggu konfirmasi harga di liquidity / POI.';if(final==='BULLISH'&&zone==='Discount'&&(nearOb?.type==='BULLISH'||nearFvg?.type==='BULLISH')){signal='BUY WATCH';reason='Bias bullish + discount + POI bullish valid.'}if(final==='BEARISH'&&zone==='Premium'&&(nearOb?.type==='BEARISH'||nearFvg?.type==='BEARISH')){signal='SELL WATCH';reason='Bias bearish + premium + POI bearish valid.'}if(final==='BEARISH'&&zone==='Discount')reason='Bias bearish tetapi harga discount. Waspada retracement sebelum sell.';if(final==='BULLISH'&&zone==='Premium')reason='Bias bullish tetapi harga premium. Waspada koreksi sebelum buy.';let fvgText=nearFvg?`${nearFvg.type} FVG ${p2(nearFvg.bottom)} - ${p2(nearFvg.top)}`:'Tidak ada FVG aktif';let obText=nearOb?`${nearOb.type} OB ${p2(nearOb.bottom)} - ${p2(nearOb.top)}`:'Tidak ada OB valid';return{tf,price,final,biasScore,score,signal,reason,zone,high,low,eq,bsl,ssl,st,fvgText,obText,htf,htfBiases,concepts:[['HTF Bias Engine',htf,JSON.stringify(htfBiases).replace(/[{}\"]/g,'')||'Belum ada HTF'],['Final Bias',final,`${final} | Score ${biasScore} | ${zone}`],['Market Structure',st.trend,st.last?`${st.last.kind} ${st.last.dir} @ ${p2(st.last.price)}`:'Belum ada BOS/CHOCH'],['Order Block',nearOb?'ACTIVE':'WAIT',obText],['Fair Value Gap',nearFvg?'CONTEXT':'WAIT',fvgText],['Liquidity','ACTIVE',`BSL ${p2(bsl)} & SSL ${p2(ssl)}`],['Premium/Discount',zone,`Range ${p2(low)} - ${p2(high)}, EQ ${p2(eq)}`],['Setup Validity',score>=70?'KUAT':score>=50?'SEDANG':'LEMAH',`${score}/100 | ${signal} | ${reason}`]]}}
async function fetchTf(tf){if(!state.key.trim())throw new Error('API key kosong');let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${TF[tf]}&outputsize=300&apikey=${encodeURIComponent(state.key.trim())}`;let r=await fetch(url);let d=await r.json();if(d.status==='error')throw new Error(d.message||'Fetch gagal');let arr=(d.values||[]).reverse().map(c=>({time:new Date(c.datetime).getTime()/1000,timeframe:tf,open:+c.open,high:+c.high,low:+c.low,close:+c.close,tickCount:1,isClosed:true}));state.candles[tf]=arr;return arr}
async function runAnalysis(tf=state.tf){state.tf=tf;render();try{log('Memindai '+tf+'...');let group=tfGroup(tf);await Promise.all(group.map(x=>state.candles[x]?.length?Promise.resolve(state.candles[x]):fetchTf(x).catch(e=>[])));let htfBiases={};for(let x of group.filter(x=>x!==tf)){let mini=state.candles[x];if(mini?.length>30){let a=analyze(mini,x,{});htfBiases[x]=a?.st?.trend||'NEUTRAL'}}let res=analyze(state.candles[tf],tf,htfBiases);state.result=res;state.mtf[tf]=res?.final||'NEUTRAL';state.analyses=[{id:Date.now(),...res},...state.analyses].slice(0,80);save();log(`${tf} selesai: ${res.final} score ${res.score}/100, ${res.signal}`);sendTargetsToNative();notifyImportant(res)}catch(e){log('Error '+tf+': '+e.message)}render()}
function notifyImportant(res){if(!res)return;let key=`${res.tf}:${res.signal}:${Math.round(res.bsl)}:${Math.round(res.ssl)}`;let last=state.notified[key]||0;if(Date.now()-last<300000)return;state.notified[key]=Date.now();localStorage.setItem('amy_mapping_notified',JSON.stringify(state.notified));if(res.signal!=='WAIT'||res.score>=70){let msg=`${res.tf} ${res.final} ${res.score}/100. BSL ${p2(res.bsl)} SSL ${p2(res.ssl)}. ${res.reason}`;if(window.Android?.showNotificationWithUrl)window.Android.showNotificationWithUrl('Amy FX Mapping Signal',msg,location.href);else if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('Amy FX Mapping Signal',{body:msg});}}
function sendTargetsToNative(){if(state.bg&&window.Android?.startBackgroundScanner){let r=state.result;window.Android.startBackgroundScanner(state.key,String(r?.bsl||''),String(r?.ssl||''));}}
function connect(){if(!state.key.trim()){log('Masukkan API key dulu.');return}localStorage.setItem('twelve_api_key',state.key.trim());if(ws){ws.onclose=null;ws.close()}state.conn='Reconnecting';renderSoft();ws=new WebSocket(`wss://ws.twelvedata.com/v1/quotes/price?apikey=${encodeURIComponent(state.key.trim())}`);ws.onopen=()=>{state.conn='Connected';document.getElementById('conn').className='status on';document.getElementById('conn').textContent='Connected';ws.send(JSON.stringify({action:'subscribe',params:{symbols:'XAU/USD'}}));log('WebSocket Connected.');runAnalysis(state.tf)};ws.onmessage=e=>{try{let d=JSON.parse(e.data);let p=+d.price;if(p>1000&&p<10000){state.price=p;localStorage.setItem('last_price',String(p));renderSoft();if(!scanTimer)scanTimer=setTimeout(()=>{scanTimer=null;runAnalysis(state.tf)},15000)}}catch(_){}};ws.onclose=()=>{state.conn='Offline';renderSoft();clearTimeout(reconnectTimer);reconnectTimer=setTimeout(connect,8000)};ws.onerror=()=>log('WebSocket error')}
function renderContext(r){if(!r)return'<div class="context"><h2>Market Context</h2><p class="muted">Klik Analyze atau Save & Connect untuk memuat data.</p></div>';return`<div class="context"><h2>Market Context (${r.tf}) <span style="float:right;font-size:12px"><i class="live-dot"></i>LIVE MAP</span></h2><div class="bias">FINAL BIAS: ${r.final} (Score ${r.biasScore}) • ${r.signal}</div><div class="block blue"><b>📚 The Storyline:</b>FINAL BIAS: ${r.final}. Struktur ${r.tf}: ${r.st.trend}. ${r.st.last?`${r.st.last.kind} ${r.st.last.dir} di ${p2(r.st.last.price)}.`:'Belum ada break struktur valid.'}</div><div class="block purple"><b>⏳ Time & Price:</b>Saat ini berada di sesi ${curSession().name}.</div><div class="block gold"><b>⚖️ Dealing Range:</b>Harga berada di zona ${r.zone}. Range ${p2(r.low)} - ${p2(r.high)}, EQ ${p2(r.eq)}.</div><div class="block cyan"><b>🕳️ Imbalance (FVG):</b>${r.fvgText}.</div><div class="block rred"><b>🎯 Liquidity Targets:</b>BSL terdekat: ${p2(r.bsl)}. SSL terdekat: ${p2(r.ssl)}.</div><div class="block orange"><b>🧲 Draw on Liquidity (DOL):</b>${r.final==='BULLISH'?'Magnet utama ke BSL, tunggu discount/POI valid.':r.final==='BEARISH'?'Magnet utama ke SSL, tunggu premium/POI valid.':'Arah magnet belum cukup bersih.'}</div><div class="suggest">💡 Saran Eksekusi:<br>${r.reason} Setup score ${r.score}/100.</div></div>`}
function dashboard(){let r=state.result,s=curSession();return`<section class="hero card"><div><div class="kicker">INNER CIRCLE TRADER</div><h1>XAU/USD</h1><div class="muted">WIB ${nowTime()}</div></div><div style="text-align:right"><div class="muted">Gold Price</div><div class="price">$${p2(state.price)}</div><div class="${state.conn==='Connected'?'green':'muted'}">${state.conn}</div><div class="${s.active?'green':'muted'}">${s.name}</div></div></section><section class="metrics"><div class="metric card"><strong>${state.analyses.length}</strong><span>Analyses</span></div><div class="metric card"><strong>${state.analyses.filter(a=>a.final==='BULLISH').length}</strong><span>Bullish</span></div><div class="metric card"><strong>${state.analyses.filter(a=>a.final==='BEARISH').length}</strong><span>Bearish</span></div></section><button class="action" onclick="setTab('Analyze')" style="width:100%;margin:0 0 18px">⚡ Analisis ICT MTF</button>${renderContext(r)}<section class="card"><h2>ICT Concepts Covered</h2><div class="concept-grid">${(r?.concepts||[]).map(c=>`<div class="concept"><small class="${c[1]==='BULLISH'||c[1]==='ACTIVE'||c[1]==='KUAT'?'green':c[1]==='BEARISH'?'red':'yellow'}">${c[1]}</small><h3>${c[0]}</h3><p>${c[2]}</p></div>`).join('')||'<p class="muted">Belum ada analisis.</p>'}</div></section>`}
function analyzeView(){return`<section class="card"><div class="kicker">SMART MONEY ENGINE</div><h1>AI Analyzer</h1><p class="muted">Pilih timeframe. Semua tombol benar-benar memuat data timeframe masing-masing.</p></section><section class="card"><div class="tf-grid">${Object.keys(TF).map(x=>`<button class="${state.tf===x?'active':''}" onclick="runAnalysis('${x}')">${x}</button>`).join('')}</div></section>${renderContext(state.result)}`}
function history(){let list=state.logs.filter(x=>/FVG|OB|BSL|SSL|Signal|selesai|Error|Connected|Bias/i.test(x));return`<section class="card"><h1>Event Logs</h1><button class="action" onclick="downloadLogs()">⇩ Download TXT</button>${list.map(x=>`<div class="log">${x}</div>`).join('')||'<p class="muted">Belum ada event.</p>'}</section>`}
function terminal(){return`<section class="card"><h1>Terminal</h1>${state.logs.map(x=>`<div class="log">› ${x}</div>`).join('')||'<p class="muted">Belum ada log.</p>'}</section>`}
function settings(){return`<section class="card settings"><h1>Settings & API</h1><label>Twelve Data API Key</label><input id="apiKey" value="${state.key}" placeholder="Twelve Data API key"><button class="action" onclick="saveConnect()" style="width:100%">🔑 Save & Connect</button><p class="muted">API key disimpan lokal di HP.</p><div class="warn"><b>Izin scanner</b><br>Jika notifikasi mengambang belum muncul, aktifkan Notifikasi, Unrestricted Battery, dan Kelola Semua File.</div><button class="${state.bg?'action':'chip'}" onclick="toggleBg()" style="width:100%;margin-top:14px">${state.bg?'📡 Background Scanner ON':'📴 Background Scanner OFF'}</button><button class="${state.voice?'action':'chip'}" onclick="state.voice=!state.voice;save();render()" style="width:100%;margin-top:12px">${state.voice?'🔊 Voice Alerts ON':'🔇 Voice Alerts OFF'}</button><button class="action" onclick="testNotif()" style="width:100%;margin-top:12px">🔔 Kirim Notifikasi Tes</button><button class="chip" onclick="window.Android?.openManageFilesPermission?.()" style="width:100%;margin-top:12px">📁 Buka Izin Kelola Semua File</button></section>`}
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));document.getElementById('conn').textContent=state.conn;document.getElementById('conn').className='status '+(state.conn==='Connected'?'on':'');document.getElementById('app').innerHTML=state.tab==='Dashboard'?dashboard():state.tab==='Analyze'?analyzeView():state.tab==='History'?history():state.tab==='Terminal'?terminal():settings()}
function renderSoft(){let c=document.getElementById('conn');if(c){c.textContent=state.conn;c.className='status '+(state.conn==='Connected'?'on':'')}let p=document.querySelector('.price');if(p)p.textContent='$'+p2(state.price)}
function setTab(t){state.tab=t;render()}window.setTab=setTab;window.runAnalysis=runAnalysis;
function saveConnect(){state.key=document.getElementById('apiKey').value.trim();localStorage.setItem('twelve_api_key',state.key);connect();sendTargetsToNative()}window.saveConnect=saveConnect;
function toggleBg(){if(!state.key.trim()){alert('Isi API key dulu.');return}state.bg=!state.bg;save();if(state.bg)sendTargetsToNative();else window.Android?.stopBackgroundScanner?.();render()}window.toggleBg=toggleBg;
function testNotif(){let msg='Tes notifikasi Amy FX Mapping. Jika tidak mengambang, aktifkan izin notifikasi dan channel heads-up.';if(window.Android?.showNotificationWithUrl)window.Android.showNotificationWithUrl('✅ Tes Berhasil',msg,location.href);else if(typeof Notification!=='undefined'){Notification.requestPermission().then(p=>p==='granted'&&new Notification('✅ Tes Berhasil',{body:msg}))}}
function downloadLogs(){let blob=new Blob([state.logs.join('\n')],{type:'text/plain'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='AmyFX_Event_Logs.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}window.downloadLogs=downloadLogs;
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
render();if(state.key)connect();
</script>
</body></html>
