<html lang="id">
<head>
<meta charset="utf-8">

<script>
(function () {
  var NativeDateTimeFormat = Intl.DateTimeFormat;
  function AmyDateTimeFormat(locales, options) {
    try {
      return new NativeDateTimeFormat(locales, options);
    } catch (error) {
      if (options && options.timeZone === 'Asia/Makassar') {
        var fallback = {};
        Object.keys(options).forEach(function (key) { fallback[key] = options[key]; });
        fallback.timeZone = 'Asia/Singapore';
        return new NativeDateTimeFormat(locales, fallback);
      }
      throw error;
    }
  }
  AmyDateTimeFormat.prototype = NativeDateTimeFormat.prototype;
  AmyDateTimeFormat.supportedLocalesOf = NativeDateTimeFormat.supportedLocalesOf.bind(NativeDateTimeFormat);
  Intl.DateTimeFormat = AmyDateTimeFormat;

  window.addEventListener('error', function (event) {
    window.__amyMappingStartupError = event && (event.message || event.error && event.error.message) || 'JavaScript startup error';
  });

  setTimeout(function () {
    var app = document.getElementById('app');
    if (!app || app.children.length || app.textContent.trim()) return;
    var message = window.__amyMappingStartupError || 'Analisis market belum berhasil dimuat.';
    app.innerHTML = '<section class="card"><div class="kicker">PEMULIHAN DATA</div><h2>Memuat ulang analisis</h2><p class="muted">' + String(message).replace(/[&<>"']/g, function (char) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[char]; }) + '</p><button class="action" style="width:100%" onclick="location.reload()">Muat Ulang</button></section>';
  }, 3500);
})();
</script>
</head>
<body>
<header class="topbar preview-topbar"><div class="brand">XAU</div><div><div class="brand-title">Amy FX</div><div class="brand-sub">Struktur • Arah • Likuiditas</div></div><div id="conn" class="status">Offline</div></header>
<section id="mapping-command-strip" class="amy-command-strip mapping-command-strip" aria-label="Ringkasan market"></section>
<main class="content" id="app"></main>
<nav class="nav"><button data-tab="Dashboard" class="active">▥<span>Dashboard</span></button><button data-tab="Analyze">〽<span>Analisis</span></button><button data-tab="Setups">◎<span>Skenario</span></button><button data-tab="History">◷<span>Riwayat</span></button><button data-tab="Settings">⚙<span>Pengaturan</span></button></nav>
