ckground:linear-gradient(180deg,#181818,#101010);border:1px solid var(--border);border-radius:18px;padding:15px;margin:12px 0}.setup-head{display:flex;justify-content:space-between;gap:10px}.setup-title{font-weight:950;color:var(--gold);font-size:16px}.badge{border:1px solid rgba(212,175,55,.35);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;color:var(--gold);height:max-content}.badge.buy{color:var(--green);border-color:rgba(74,222,128,.38)}.badge.sell{color:var(--red);border-color:rgba(255,82,82,.38)}.num-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.num{background:#0b0b0b;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px}.num small{display:block;color:var(--muted);font-size:11px;font-weight:800}.num strong{display:block;font-size:15px;margin-top:2px}.reason{margin-top:12px;line-height:1.45;color:#ddd}.concept-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.concept{background:#1b1b1b;border-radius:14px;padding:13px}.concept small{display:block;font-size:11px;font-weight:900;color:var(--gold)}.concept h3{margin:3px 0 8px;color:var(--gold);font-size:15px}.concept p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}.log{background:#1e1e1e;border-left:4px solid var(--gold);padding:12px;border-radius:10px;margin:8px 0;white-space:pre-wrap}.settings input{width:100%;background:#111723;border:1px solid rgba(255,255,255,.12);border-radius:14px;color:#fff;padding:14px;margin:8px 0 14px}.warn{background:rgba(255,82,82,.11);border:1px solid rgba(255,82,82,.22);padding:12px;border-radius:12px}.killzone-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.killzone-item{background:#0b0b0b;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px}.killzone-item.active{border-color:rgba(74,222,128,.55);background:rgba(74,222,128,.08)}.killzone-item b{display:block;font-size:13px}.killzone-item small{display:block;color:var(--muted);font-size:11px;margin-top:3px}.session-pill{display:inline-block;border:1px solid rgba(212,175,55,.35);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;color:var(--gold);margin-top:6px}.session-pill.active{color:var(--green);border-color:rgba(74,222,128,.4)}@media(max-width:520px){.concept-grid,.num-grid,.killzone-grid{grid-template-columns:1fr}.price{font-size:23px}}

<header class="topbar"><div class="brand">XAU</div><div><div class="brand-title">Amy FX Mapping</div><div class="brand-sub">Setup Entry • BSL/SSL • Alerts</div></div><div id="conn" class="status">Offline</div></header>
<main class="content" id="app"></main>
<nav class="nav"><button data-tab="Dashboard" class="active">▥<span>Dashboard</span></button><button data-tab="Analyze">〽<span>Analyze</span></button><button data-tab="Setups">◎<span>Setup</span></button><button data-tab="History">◷<span>History</span></button><button data-tab="Settings">⚙<span>Settings</span></button></nav>
<script>
const TF={M1:'1min',M5:'5min',M15:'15min',M30:'30min',H1:'1h',H4:'4h',D1:'1day',W1:'1week'};
const state={tab:'Dashboard',tf:'M5',key:localStorage.getItem('twelve_api_key')||'',price:Number(localStorage.getItem('last_price')||0),conn:'Offline',logs:JSON.parse(localStorage.getItem('amy_mapping_logs')||'[]'),analyses:JSON.parse(localStorage.getItem('amy_mapping_analyses')||'[]'),setups:JSON.parse(localStorage.getItem('amy_mapping_setups')||'[]'),candles:{},result:null,bg:localStorage.getItem('bg_scanner')==='true',notified:JSON.parse(localStorage.getItem('amy_mapping_notified')||'{}')};
let ws=null,reconnectTimer=null,scanTimer=null;
const p2=v=>Number.isFinite(+v)?Number(v).toFixed(2):'-';
function nowTime(){return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date())}
function timeRange(zone,sh,sm,eh,em){let now=new Date(),fmt=new Intl.DateTimeFormat('en-CA',{timeZone:zone,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(now),g=t=>+fmt.find(x=>x.type===t).value;let guess=Date.UTC(g('year'),g('month')-1,g('day'),sh,sm);let txt=new Intl.DateTimeFormat('en-GB',{timeZone:zone,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(guess));let [hh,mm]=txt.split(':').map(Number);let start=guess+((sh*60+sm)-(hh*60+mm))*60000;let end=start+(((eh*60+em)-(sh*60+sm)+(eh*60+em<=sh*60+sm?1440:0))*60000);return{start,end}}
function sessions(){let z=[['Asian Kill Zone','Asia/Tokyo',9,0,12,0],['London Judas Swing','Europe/London',7,0,8,30],['London Open Kill Zone','Europe/London',8,0,12,0],['New York Judas Swing','America/New_York',8,0,9,30],['New York Open Kill Zone','America/New_York',8,30,11,30],['Silver Bullet','America/New_York',10,0,11,0],['Swing Session','America/New_York',13,30,16,0]];let n=Date.now();return z.map(a=>{let r=timeRange(...a.slice(1));return{name:a[0],active:n>=r.start&&n<r.end,wib:new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(r.start))+' - '+new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(r.end))}})}
function curSession(){return sessions().find(x=>x.active)||{name:'Off-Session',active:false,wib:'-'}}
function killzonePanel(){let list=sessions(),cur=curSession();return`<section class="card"><div class="kicker">ICT KILLZONE</div><h2>Session & Killzone</h2><div class="muted">WIB ${nowTime()}</div><div class="session-pill ${cur.active?'active':''}">${cur.active?'Aktif: '+cur.name:'Off-Session'}</div><div class="killzone-grid">${list.map(s=>`<div class="killzone-item ${s.active?'active':''}"><b>${s.active?'🟢 ':'⚪ '}${s.name}</b><small>WIB ${s.wib}</small></div>`).join('')}</div></section>`}

function log(x){state.logs=[`[${nowTime()}] ${x}`,...state.logs].slice(0,200);save();renderSoft()}
function save(){localStorage.setItem('amy_mapping_logs',JSON.stringify(state.logs.slice(0,200)));localStorage.setItem('amy_mapping_analyses',JSON.stringify(state.analyses.slice(0,80)));localStorage.setItem('amy_mapping_setups',JSON.stringify(state.setups.slice(0,50)));localStorage.setItem('bg_scanner',String(state.bg));}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function atr(cs){return avg(cs.slice(-14).map(c=>c.high-c.low).filter(x=>x>0))||0.5}
function bodyRatio(c){return Math.abs(c.close-c.open)/Math.max(c.high-c.low,0.0001)}
function swings(cs,left=3,right=3){let highs=[],lows=[];for(let i=left;i<cs.length-right;i++){let h=true,l=true;for(let j=1;j<=left;j++){if(cs[i].high<=cs[i-j].high)h=false;if(cs[i].low>=cs[i-j].low)l=false}for(let j=1;j<=right;j++){if(cs[i].high<=cs[i+j].high)h=false;if(cs[i].low>=cs[i+j].low)l=false}if(h)highs.push({...cs[i],index:i});if(l)lows.push({...cs[i],index:i})}return{highs,lows}}
function detectStructure(cs,sw){let trend='NEUTRAL',last=null;for(let i=1;i<cs.length;i++){let ph=[...sw.highs].reverse().find(x=>x.index<i-1),pl=[...sw.lows].reverse().find(x=>x.index<i-1);if(ph&&cs[i].close>ph.high){last={kind:trend==='BEARISH'?'CHOCH':'BOS',dir:'BULLISH',price:ph.high,index:i};trend='BULLISH'}if(pl&&cs[i].close<pl.low){last={kind:trend==='BULLISH'?'CHOCH':'BOS',dir:'BEARISH',price:pl.low,index:i};trend='BEARISH'}}return{trend,last}}
function detectFvg(cs){let a=atr(cs),out=[];for(let i=Math.max(2,cs.length-80);i<cs.length;i++){let x=cs[i-2],m=cs[i-1],z=cs[i];if(!x||!m||!z)continue;let b=Math.abs(m.close-m.open);if(x.high<z.low&&b>a*.55)out.push({type:'BULLISH',bottom:x.high,top:z.low,index:i});if(x.low>z.high&&b>a*.55)out.push({type:'BEARISH',bottom:z.high,top:x.low,index:i})}return out.slice(-8)}
function detectOB(cs,st){if(!st.last)return[];let i=st.last.index,dir=st.last.dir,start=Math.max(0,i-18),leg=cs.slice(start,i),obs=[];if(dir==='BULLISH'){for(let k=leg.length-1;k>=0;k--){let c=leg[k];if(c.close<c.open){obs.push({type:'BULLISH',bottom:c.low,top:Math.max(c.open,c.close),index:start+k});break}}}else{for(let k=leg.length-1;k>=0;k--){let c=leg[k];if(c.close>c.open){obs.push({type:'BEARISH',bottom:Math.min(c.open,c.close),top:c.high,index:start+k});break}}}return obs}
function tfGroup(tf){return tf==='M1'?['M1','M5','M15','H1']:tf==='M5'?['M5','M15','H1','H4']:tf==='M15'?['M15','H1','H4','D1']:tf==='M30'?['M30','H1','H4','D1']:tf==='H1'?['H1','H4','D1','W1']:tf==='H4'?['H4','D1','W1']:['D1','W1']}
function setupObj(type,dir,tf,score,now,entryLow,entryHigh,sl,tp1,tp2,reason,extra={}){return{type,dir,tf,score:Math.round(Math.max(0,Math.min(100,score))),status:score>=70?'READY SETUP':score>=55?'WATCH SETUP':'WAIT',price:now,entryLow,entryHigh,sl,tp1,tp2,reason,...extra}}
function buildSetups(cs,tf,ctx){let out=[],a=Math.max(atr(cs),0.1),price=ctx.price,bsl=ctx.bsl,ssl=ctx.ssl,eq=ctx.eq,last=cs.at(-1),buffer=Math.max(a*.25,0.2);if(ctx.nearOb){let z=ctx.nearOb,dir=z.type==='BULLISH'?'BUY WATCH':'SELL WATCH',sl=dir.startsWith('BUY')?z.bottom-buffer:z.top+buffer,tp1=dir.startsWith('BUY')?Math.min(eq,bsl):Math.max(eq,ssl),tp2=dir.startsWith('BUY')?bsl:ssl;out.push(setupObj('ORDER BLOCK',dir,tf,68+(ctx.final===(dir.startsWith('BUY')?'BULLISH':'BEARISH')?8:0),price,z.bottom,z.top,sl,tp1,tp2,`${z.type} OB aktif di area ${p2(z.bottom)} - ${p2(z.top)}.`))}if(ctx.nearFvg){let z=ctx.nearFvg,dir=z.type==='BULLISH'?'BUY WATCH':'SELL WATCH',sl=dir.startsWith('BUY')?z.bottom-buffer:z.top+buffer,tp1=dir.startsWith('BUY')?Math.min(eq,bsl):Math.max(eq,ssl),tp2=dir.startsWith('BUY')?bsl:ssl;out.push(setupObj('FAIR VALUE GAP',dir,tf,66+(ctx.final===(dir.startsWith('BUY')?'BULLISH':'BEARISH')?8:0),price,z.bottom,z.top,sl,tp1,tp2,`${z.type} FVG aktif di area ${p2(z.bottom)} - ${p2(z.top)}.`))}let sw=ctx.sw,prevHigh=[...sw.highs].reverse().find(x=>x.index<cs.length-2),prevLow=[...sw.lows].reverse().find(x=>x.index<cs.length-2);if(prevLow&&last.low<prevLow.low&&last.close>prevLow.low){let e1=prevLow.low,e2=Math.max(last.close,prevLow.low+buffer),sl=last.low-buffer;out.push(setupObj('LIQUIDITY SWEEP','BUY WATCH',tf,78,price,e1,e2,sl,price+(price-sl),bsl,`SSL ${p2(prevLow.low)} disapu, low sweep ${p2(last.low)}, lalu close kembali di atas SSL.`))}if(prevHigh&&last.high>prevHigh.high&&last.close<prevHigh.high){let e1=Math.min(last.close,prevHigh.high-buffer),e2=prevHigh.high,sl=last.high+buffer;out.push(setupObj('LIQUIDITY SWEEP','SELL WATCH',tf,78,price,e1,e2,sl,price-(sl-price),ssl,`BSL ${p2(prevHigh.high)} disapu, high sweep ${p2(last.high)}, lalu close kembali di bawah BSL.`))}if(ctx.st.last){let s=ctx.st.last,dir=s.dir==='BULLISH'?'BUY WATCH':'SELL WATCH',entryLow=s.dir==='BULLISH'?s.price-buffer:s.price,entryHigh=s.dir==='BULLISH'?s.price:s.price+buffer,sl=s.dir==='BULLISH'?ctx.low-buffer:ctx.high+buffer,tp1=s.dir==='BULLISH'?Math.min(eq,bsl):Math.max(eq,ssl),tp2=s.dir==='BULLISH'?bsl:ssl;out.push(setupObj('STRUCTURE SETUP',dir,tf,s.kind==='CHOCH'?76:72,price,entryLow,entryHigh,sl,tp1,tp2,`${s.kind} ${s.dir} terkonfirmasi di level ${p2(s.price)}.`))}let body=Math.abs(last.close-last.open);if(body>=a*1.5&&bodyRatio(last)>=.6){let bull=last.close>last.open,dir=bull?'BUY WATCH':'SELL WATCH',lo=Math.min(last.open,last.close),hi=Math.max(last.open,last.close),entryLow=bull?lo+body*.35:hi-body*.65,entryHigh=bull?lo+body*.65:hi-body*.35,sl=bull?last.low-buffer:last.high+buffer,tp1=bull?price+(price-sl):price-(sl-price),tp2=bull?bsl:ssl;out.push(setupObj('DISPLACEMENT CANDLE',dir,tf,81,price,Math.min(entryLow,entryHigh),Math.max(entryLow,entryHigh),sl,tp1,tp2,`Candle ${bull?'bullish':'bearish'} besar. Open ${p2(last.open)}, close ${p2(last.close)}, body dominan.`))}return out.filter(x=>Number.isFinite(x.entryLow)&&Number.isFinite(x.entryHigh)&&Number.isFinite(x.sl)&&Number.isFinite(x.tp1)&&Number.isFinite(x.tp2)).sort((a,b)=>b.score-a.score)}
function analyze(cs,tf,htfBiases={}){if(!cs||cs.length<30)return null;let price=state.price||cs.at(-1).close,sw=swings(cs,tf==='M1'?2:3,tf==='M1'?2:3),st=detectStructure(cs,sw),fvg=detectFvg(cs),ob=detectOB(cs,st),high=Math.max(...sw.highs.slice(-5).map(x=>x.high),...cs.slice(-50).map(x=>x.high)),low=Math.min(...sw.lows.slice(-5).map(x=>x.low),...cs.slice(-50).map(x=>x.low)),eq=(high+low)/2,zone=price>eq?'Premium':price<eq?'Discount':'Equilibrium',bsl=[...sw.highs].reverse().find(x=>x.high>price)?.high||Math.max(...cs.slice(-30).map(c=>c.high)),ssl=[...sw.lows].reverse().find(x=>x.low<price)?.low||Math.min(...cs.slice(-30).map(c=>c.low));let htfList=Object.values(htfBiases).filter(Boolean),bull=htfList.filter(x=>x==='BULLISH').length,bear=htfList.filter(x=>x==='BEARISH').length,htf=bear>bull?'BEARISH':bull>bear?'BULLISH':'NEUTRAL';let biasScore=(st.trend==='BULLISH'?1:st.trend==='BEARISH'?-1:0)+(htf==='BULLISH'?2:htf==='BEARISH'?-2:0),final=biasScore>0?'BULLISH':biasScore<0?'BEARISH':'NEUTRAL';let nearFvg=fvg.find(x=>price>=x.bottom&&price<=x.top)||fvg.at(-1),nearOb=ob.find(x=>price>=x.bottom&&price<=x.top)||ob[0];let ctx={tf,price,sw,st,nearFvg,nearOb,final,bsl,ssl,high,low,eq,zone};let setups=buildSetups(cs,tf,ctx),best=setups[0]||null,signal=best?best.dir:'WAIT',score=best?best.score:45+Math.abs(biasScore)*8;return{tf,price,final,biasScore,score,signal,zone,high,low,eq,bsl,ssl,st,htf,htfBiases,setups,bestSetup:best,concepts:[['Final Bias',final,`${final} | ${zone}`],['Structure',st.trend,st.last?`${st.last.kind} ${st.last.dir} @ ${p2(st.last.price)}`:'Belum ada break struktur'],['OB',nearOb?'ACTIVE':'WAIT',nearOb?`${nearOb.type} ${p2(nearOb.bottom)} - ${p2(nearOb.top)}`:'Tidak ada OB aktif'],['FVG',nearFvg?'ACTIVE':'WAIT',nearFvg?`${nearFvg.type} ${p2(nearFvg.bottom)} - ${p2(nearFvg.top)}`:'Tidak ada FVG aktif'],['Liquidity','ACTIVE',`BSL ${p2(bsl)} | SSL ${p2(ssl)}`],['Best Setup',best?best.status:'WAIT',best?`${best.type} ${best.score}/100`:'Belum ada setup angka']]} }
async function fetchTf(tf){if(!state.key.trim())throw new Error('API key kosong');let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${TF[tf]}&outputsize=300&apikey=${encodeURIComponent(state.key.trim())}`;let r=await fetch(url);let d=await r.json();if(d.status==='error')throw new Error(d.message||'Fetch gagal');let arr=(d.values||[]).reverse().map(c=>({time:new Date(c.datetime).getTime()/1000,timeframe:tf,open:+c.open,high:+c.high,low:+c.low,close:+c.close,tickCount:1,isClosed:true}));state.candles[tf]=arr;return arr}
async function runAnalysis(tf=state.tf){state.tf=tf;render();try{log('Memindai '+tf+'...');let group=tfGroup(tf);await Promise.all(group.map(x=>state.candles[x]?.length?Promise.resolve(state.candles[x]):fetchTf(x).catch(e=>[])));let htfBiases={};for(let x of group.filter(x=>x!==tf)){let mini=state.candles[x];if(mini?.length>30){let a=analyze(mini,x,{});htfBiases[x]=a?.st?.trend||'NEUTRAL'}}let res=analyze(state.candles[tf],tf,htfBiases);state.result=res;state.setups=[...(res?.setups||[]),...state.setups].slice(0,50);state.analyses=[{id:Date.now(),...res},...state.analyses].slice(0,80);save();log(`${tf} selesai: ${res.signal} score ${res.score}/100`);sendTargetsToNative();notifyImportant(res)}catch(e){log('Error '+tf+': '+e.message)}render()}

/* AMYFX_SYNC_FIX_JS_START */
(function(){
  if(window.__amyfxSyncFixLoaded)return;
  window.__amyfxSyncFixLoaded=true;

  const TF_KEY='amyfx.selected.tf';
  const DEFAULT_TF_KEY='amyfx.default.tf';
  const SNAP_KEY='amyfx.mapping.last.state';
  const SETUP_DOM_KEY='amyfx.mapping.last.setup.dom';
  const TF_FALLBACK=['M1','M5','M15','M30','H1','H4','D1','W1'];

  function wibTime(){
    return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());
  }

  try{
    if(typeof nowTime==='function'){
      nowTime=function(){return wibTime()};
    }
  }catch(e){}

  function getState(){
    try{return typeof state!=='undefined'&&state?state:null}catch(e){return null}
  }

  function getTFs(){
    try{
      if(typeof TF!=='undefined'&&TF)return Object.keys(TF);
    }catch(e){}
    return TF_FALLBACK;
  }

  function validTf(tf){
    return getTFs().includes(tf);
  }

  function savedTf(){
    const a=localStorage.getItem(TF_KEY);
    const b=localStorage.getItem(DEFAULT_TF_KEY);
    if(validTf(a))return a;
    if(validTf(b))return b;
    return null;
  }

  function setTf(tf,asDefault){
    if(!validTf(tf))return;
    localStorage.setItem(TF_KEY,tf);
    if(asDefault)localStorage.setItem(DEFAULT_TF_KEY,tf);
    const st=getState();
    if(st)st.tf=tf;
  }

  function emptyValue(v){
    return v===undefined||v===null||v===''||(Array.isArray(v)&&v.length===0)||(typeof v==='object'&&!Array.isArray(v)&&Object.keys(v).length===0);
  }

  function cloneState(){
    const st=getState();
    if(!st||typeof st!=='object')return null;
    const out={};
    Object.keys(st).forEach(k=>{
      try{
        JSON.stringify(st[k]);
        out[k]=st[k];
      }catch(e){}
    });
    return out;
  }

  function usefulState(obj){
    try{
      const raw=JSON.stringify(obj||{});
      return /price|harga|setup|entry|score|xau|gold|tp|sl/i.test(raw);
    }catch(e){
      return false;
    }
  }

  function hasCache(){
    return !!localStorage.getItem(SNAP_KEY)||!!localStorage.getItem(SETUP_DOM_KEY);
  }

  function saveSnapshot(){
    const st=cloneState();
    if(!st||!usefulState(st))return;
    const tf=savedTf()||(st&&st.tf)||null;
    localStorage.setItem(SNAP_KEY,JSON.stringify({at:Date.now(),tf,state:st}));
  }

  function restoreSnapshot(){
    const st=getState();
    if(!st)return;

    const tf=savedTf();
    if(tf)st.tf=tf;

    let snap=null;
    try{snap=JSON.parse(localStorage.getItem(SNAP_KEY)||'null')}catch(e){}
    if(!snap||!snap.state)return;

    Object.keys(snap.state).forEach(k=>{
      if(k==='tf')return;
      if(emptyValue(st[k])&&!emptyValue(snap.state[k]))st[k]=snap.state[k];
    });

    st.__amyfxCacheAt=snap.at;
  }

  function stateConnected(){
    const st=getState();
    if(!st)return false;

    const boolKeys=['connected','isConnected','goldConnected','feedConnected','priceConnected','wsConnected','socketConnected'];
    for(const k of boolKeys){
      if(st[k]===true)return true;
    }

    const strKeys=['status','connectionStatus','goldStatus','feedStatus','priceStatus','appStatus'];
    const raw=strKeys.map(k=>st[k]).filter(Boolean).join(' ');
    if(/\bconnected\b|\bonline\b/i.test(raw)&&!/\boffline\b|\bdisconnected\b/i.test(raw))return true;

    return false;
  }

  function goldConnectedFromUI(){
    const t=(document.body&&document.body.innerText)||'';
    return /Gold Price[\s\S]{0,160}\bConnected\b/i.test(t)||/XAUUSD[\s\S]{0,160}\bConnected\b/i.test(t);
  }

  function computedStatus(){
    if(stateConnected()||goldConnectedFromUI())return 'Connected';
    if(hasCache())return 'Cache';
    return 'Offline';
  }

  function forceCacheMode(){
    const st=getState();
    if(!st||!hasCache())return;

    ['offline','isOffline','feedOffline','appOffline'].forEach(k=>{
      if(k in st)st[k]=false;
    });

    ['status','connectionStatus','appStatus'].forEach(k=>{
      if(k in st&&/^offline$/i.test(String(st[k])))st[k]='Cache';
    });
  }

  function leaf(el){
    return el&&el.children&&el.children.length===0;
  }

  function syncHeader(){
    const status=computedStatus();
    const cls=status==='Connected'?'amyfx-status-connected':status==='Cache'?'amyfx-status-cache':'amyfx-status-offline';

    let targets=Array.from(document.querySelectorAll('header *,.header *,.topbar *,.app-header *'))
      .filter(el=>leaf(el)&&/^(Offline|Online|Connected|Cache)$/i.test(el.textContent.trim()));

    if(!targets.length){
      targets=Array.from(document.querySelectorAll('*')).filter(el=>{
        if(!leaf(el))return false;
        const r=el.getBoundingClientRect();
        return r.top>=0&&r.top<150&&r.left>window.innerWidth*0.45&&/^(Offline|Online|Connected|Cache)$/i.test(el.textContent.trim());
      });
    }

    targets.forEach(el=>{
      el.textContent=status;
      el.classList.remove('amyfx-status-connected','amyfx-status-cache','amyfx-status-offline');
      el.classList.add(cls);
    });
  }

  function syncScanner(){
    const status=computedStatus();
    const scannerStatus=status==='Connected'?'ON':status==='Cache'?'CACHE':'OFF';

    Array.from(document.querySelectorAll('*')).forEach(el=>{
      if(!/Background Scanner/i.test(el.textContent||''))return;

      const card=el.closest('section,.card,div')||el.parentElement;
      if(!card)return;

      Array.from(card.querySelectorAll('*')).forEach(x=>{
        if(!leaf(x))return;
        const tx=x.textContent.trim();
        if(/^(ON|OFF|CACHE|Offline|Connected)$/i.test(tx)){
          x.textContent=scannerStatus;
          x.classList.remove('amyfx-status-connected','amyfx-status-cache','amyfx-status-offline');
          x.classList.add(scannerStatus==='ON'?'amyfx-status-connected':scannerStatus==='CACHE'?'amyfx-status-cache':'amyfx-status-offline');
        }
      });
    });
  }

  function syncClock(){
    Array.from(document.querySelectorAll('[data-amyfx-wib-clock]')).forEach(el=>{
      el.textContent='WIB '+wibTime();
    });

    Array.from(document.querySelectorAll('.muted,small,span,div')).forEach(el=>{
      if(!leaf(el))return;
      const tx=el.textContent.trim();
      if(/^WIB \d{2}:\d{2}(:\d{2})?$/.test(tx)){
        el.textContent='WIB '+wibTime();
        el.setAttribute('data-amyfx-wib-clock','1');
      }
    });
  }

  function findTfButtons(){
    return Array.from(document.querySelectorAll('button')).filter(b=>validTf(b.textContent.trim()));
  }

  function decorateTf(){
    const btns=findTfButtons();
    if(!btns.length)return;

    const grid=btns[0].closest('.tf-grid')||btns[0].parentElement;
    if(!grid)return;

    grid.classList.add('amyfx-tf-grid');

    const card=grid.closest('section,.card')||grid.parentElement;
    if(!card)return;

    card.classList.add('amyfx-tf-card');

    const cur=savedTf()||(getState()&&getState().tf)||'M5';

    btns.forEach(b=>{
      const tf=b.textContent.trim();
      b.classList.toggle('active',tf===cur);
    });

    let toolbar=card.querySelector('.amyfx-tf-toolbar');
    if(!toolbar){
      toolbar=document.createElement('div');
      toolbar.className='amyfx-tf-toolbar';
      toolbar.innerHTML=`<div><span class="amyfx-tf-title">Timeframe</span><span class="amyfx-tf-current">${cur}</span></div><button type="button" class="amyfx-tf-dots">⋮</button><div class="amyfx-tf-menu hidden"><div class="amyfx-tf-menu-title">Set default TF</div><div class="amyfx-tf-menu-grid"></div></div>`;
      card.insertBefore(toolbar,grid);

      const menu=toolbar.querySelector('.amyfx-tf-menu');
      const menuGrid=toolbar.querySelector('.amyfx-tf-menu-grid');

      getTFs().forEach(tf=>{
        const b=document.createElement('button');
        b.type='button';
        b.textContent=tf;
        b.onclick=()=>{
          setTf(tf,true);
          menu.classList.add('hidden');
          try{
            if(typeof runAnalysis==='function')runAnalysis(tf);
          }catch(e){}
          postRender();
        };
        menuGrid.appendChild(b);
      });

      toolbar.querySelector('.amyfx-tf-dots').onclick=()=>{
        menu.classList.toggle('hidden');
      };
    }else{
      const label=toolbar.querySelector('.amyfx-tf-current');
      if(label)label.textContent=cur;
    }
  }

  function findSetupCard(){
    const head=Array.from(document.querySelectorAll('h1,h2,h3,.title,.card-title'))
      .find(el=>/Setup Aktif/i.test(el.textContent||''));
    if(!head)return null;
    return head.closest('section,.card')||head.parentElement;
  }

  function setupHasData(card){
    if(!card)return false;
    const t=card.innerText||'';
    if(/tidak ada setup|no setup/i.test(t))return false;
    return /SETUP\s*\d|LIQUIDITY|ENTRY|Entry Area|Harga Sekarang|Score|TP1|TP2|SL/i.test(t);
  }

  function saveSetupDom(){
    const card=findSetupCard();
    if(!setupHasData(card))return false;
    localStorage.setItem(SETUP_DOM_KEY,card.outerHTML);
    return true;
  }

  function restoreSetupDom(){
    if(setupHasData(findSetupCard()))return;

    const html=localStorage.getItem(SETUP_DOM_KEY);
    if(!html)return;

    const card=findSetupCard();
    if(!card)return;

    card.outerHTML=html;

    const restored=findSetupCard();
    if(restored&&!restored.querySelector('.amyfx-cache-badge')){
      const h=Array.from(restored.querySelectorAll('h1,h2,h3')).find(x=>/Setup Aktif/i.test(x.textContent||''));
      if(h){
        const badge=document.createElement('span');
        badge.className='amyfx-cache-badge';
        badge.textContent='CACHE';
        h.appendChild(badge);
      }
    }
  }

  function postRender(){
    restoreSnapshot();
    forceCacheMode();
    syncHeader();
    syncScanner();
    syncClock();
    decorateTf();
    if(!saveSetupDom())restoreSetupDom();
  }

  document.addEventListener('click',function(e){
    const btn=e.target.closest('button');
    if(!btn)return;
    const tf=btn.textContent.trim();
    if(validTf(tf)){
      setTf(tf,false);
      setTimeout(function(){
        saveSnapshot();
        postRender();
      },80);
    }
  },true);

  try{
    if(typeof runAnalysis==='function'&&!runAnalysis.__amyfxSyncFix){
      const oldRunAnalysis=runAnalysis;
      runAnalysis=function(tf){
        if(validTf(tf))setTf(tf,false);
        restoreSnapshot();
        forceCacheMode();
        const out=oldRunAnalysis.apply(this,arguments);
        setTimeout(function(){
          saveSnapshot();
          postRender();
        },100);
        return out;
      };
      runAnalysis.__amyfxSyncFix=true;
    }
  }catch(e){}

  try{
    if(typeof render==='function'&&!render.__amyfxSyncFix){
      const oldRender=render;
      render=function(){
        restoreSnapshot();
        forceCacheMode();
        const out=oldRender.apply(this,arguments);
        setTimeout(postRender,0);
        return out;
      };
      render.__amyfxSyncFix=true;
    }
  }catch(e){}

  restoreSnapshot();
  forceCacheMode();

  setTimeout(function(){
    const tf=savedTf();
    if(tf){
      try{
        if(typeof runAnalysis==='function')runAnalysis(tf);
        else postRender();
      }catch(e){
        postRender();
      }
    }else{
      postRender();
    }
  },0);

  setInterval(function(){
    syncClock();
    syncHeader();
    syncScanner();
  },1000);

  window.addEventListener('online',postRender);
  window.addEventListener('offline',postRender);
})();
/* AMYFX_SYNC_FIX_JS_END */

</script>
<script>
/* AMYFX_NOTIFY_GUARD_START */
(function(){
  if(window.__amyfxNotifyGuardLoaded)return;
  window.__amyfxNotifyGuardLoaded=true;

  const STORE='amyfx.notify.last.sent';
  const COOLDOWN=5*60*1000;
  const RESUME_MUTE=9000;
  const MAX_ITEMS=80;
  let muteUntil=0;

  function now(){return Date.now()}
  function norm(x){
    return String(x||'')
      .replace(/\d+([.,]\d+)?/g,'#')
      .replace(/\s+/g,' ')
      .trim()
      .slice(0,180);
  }
  function kind(t,b){
    const x=(String(t||'')+' '+String(b||'')).toLowerCase();
    if(x.includes('scanner terhubung'))return 'scanner_connected';
    if(x.includes('amy fx aktif'))return 'scanner_alive';
    if(x.includes('liquidity sweep'))return 'liquidity_sweep';
    if(x.includes('ssl')||x.includes('bsl'))return 'bsl_ssl_touched';
    return 'amyfx_alert';
  }
  function key(t,b){
    return kind(t,b)+'|'+norm(t)+'|'+norm(b);
  }
  function read(){
    try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return{}}
  }
  function write(o){
    const arr=Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,MAX_ITEMS);
    localStorage.setItem(STORE,JSON.stringify(Object.fromEntries(arr)));
  }
  function route(t,b){
    const k=kind(t,b);
    if(k==='liquidity_sweep')return 'Analyze';
    if(k==='bsl_ssl_touched')return 'Analyze';
    if(k==='scanner_connected'||k==='scanner_alive')return 'Dashboard';
    return 'Analyze';
  }
  function openRoute(t,b){
    const r=route(t,b);
    try{localStorage.setItem('amyfx.notification.route',r)}catch(e){}
    try{if(typeof setTab==='function')setTab(r)}catch(e){}
    try{window.focus()}catch(e){}
  }
  function allow(t,b){
    const n=now();
    const k=key(t,b);

    if(n<muteUntil && kind(t,b)!=='scanner_alive')return false;

    const last=read();
    const prev=last[k]||0;
    if(n-prev<COOLDOWN)return false;

    last[k]=n;
    write(last);
    return true;
  }

  document.addEventListener('visibilitychange',function(){
    if(!document.hidden){
      muteUntil=now()+RESUME_MUTE;
    }
  });

  window.addEventListener('pageshow',function(){
    muteUntil=now()+RESUME_MUTE;
  });

  try{
    if('Notification' in window && !window.Notification.__amyfxWrapped){
      const OriginalNotification=window.Notification;
      const WrappedNotification=function(title,opts){
        opts=opts||{};
        const body=opts.body||'';
        if(!allow(title,body))return null;
        const n=new OriginalNotification(title,opts);
        n.onclick=function(){openRoute(title,body)};
        return n;
      };
      Object.getOwnPropertyNames(OriginalNotification).forEach(function(k){
        try{WrappedNotification[k]=OriginalNotification[k]}catch(e){}
      });
      WrappedNotification.prototype=OriginalNotification.prototype;
      WrappedNotification.__amyfxWrapped=true;
      window.Notification=WrappedNotification;
    }
  }catch(e){}

  function wrapBridge(obj){
    if(!obj||obj.__amyfxNotifyBridgeWrapped)return;
    Object.keys(obj).forEach(function(k){
      if(!/notify|notification|alert|push/i.test(k))return;
      if(typeof obj[k]!=='function')return;
      const old=obj[k];
      obj[k]=function(){
        const args=[].slice.call(arguments);
        const title=args[0]||'Amy FX';
        const body=args[1]||args[0]||'';
        if(!allow(title,body))return null;
        try{return old.apply(this,args)}catch(e){return null}
      };
    });
    obj.__amyfxNotifyBridgeWrapped=true;
  }

  function wrapAll(){
    ['Android','AndroidBridge','AmyFX','AmyFx','Native','NotificationBridge','AppBridge'].forEach(function(n){
      try{wrapBridge(window[n])}catch(e){}
    });
  }

  wrapAll();
  setInterval(wrapAll,1500);

  window.__amyfxNotifyAllow=allow;
  window.__amyfxNotifyOpenRoute=openRoute;
})();
/* AMYFX_NOTIFY_GUARD_END */
</script>
