<script>
const TF={M1:'1min',M5:'5min',M15:'15min',M30:'30min',H1:'1h',H4:'4h',D1:'1day',W1:'1week'};
const tfMs={M1:60000,M5:300000,M15:900000,M30:1800000,H1:3600000,H4:14400000,D1:86400000,W1:604800000};
const BULLISH=1,BEARISH=-1,NEUTRAL=0;
const state={tab:'Dashboard',tf:'M5',key:localStorage.getItem('twelve_api_key')||'',price:Number(localStorage.getItem('last_price')||0),conn:'Offline',logs:safeJson('amy_mapping_logs',[]),analyses:safeJson('amy_mapping_analyses',[]),candles:{},result:null,mtf:{},bg:localStorage.getItem('bg_scanner')==='true',voice:localStorage.getItem('voice_alert')!=='false',notified:safeJson('amy_mapping_notified',{}),settings:safeJson('amy_mapping_settings',{structureMode:'Present',obMitigation:'High/Low',obFilter:'ATR',showInternal:true,showSwing:true,showEQ:true,showFVG:true,showVI:true,showLiq:true,showNWOG:true,showNDOG:false})};
let ws=null,reconnectTimer=null,scanTimer=null;
function safeJson(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(_){return d}}
function h(x){return String(x??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function p2(v){return Number.isFinite(+v)?Number(v).toFixed(2):'-'}
function last(a){return a&&a.length?a[a.length-1]:null}
function sum(a){return a.reduce((x,y)=>x+y,0)}
function avg(a){return a.length?sum(a)/a.length:0}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function nowTime(){return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date())}
function log(x){state.logs=[`[${nowTime()}] ${x}`,...state.logs].slice(0,250);localStorage.setItem('amy_mapping_logs',JSON.stringify(state.logs));renderSoft()}
function save(){localStorage.setItem('amy_mapping_analyses',JSON.stringify(state.analyses.slice(0,100)));localStorage.setItem('amy_mapping_logs',JSON.stringify(state.logs.slice(0,250)));localStorage.setItem('bg_scanner',String(state.bg));localStorage.setItem('voice_alert',String(state.voice));localStorage.setItem('amy_mapping_settings',JSON.stringify(state.settings));}
function timeRange(zone,sh,sm,eh,em){let now=new Date(),fmt=new Intl.DateTimeFormat('en-CA',{timeZone:zone,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(now),g=t=>+fmt.find(x=>x.type===t).value;let guess=Date.UTC(g('year'),g('month')-1,g('day'),sh,sm);let txt=new Intl.DateTimeFormat('en-GB',{timeZone:zone,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(guess));let [hh,mm]=txt.split(':').map(Number);let start=guess+((sh*60+sm)-(hh*60+mm))*60000;let end=start+(((eh*60+em)-(sh*60+sm)+(eh*60+em<=sh*60+sm?1440:0))*60000);return{start,end}}
function sessions(){let z=[['Asian Kill Zone','Asia/Tokyo',9,0,12,0],['London Judas Swing','Europe/London',7,0,8,30],['London Open Kill Zone','Europe/London',8,0,12,0],['London Close','Europe/London',15,0,17,0],['New York Judas Swing','America/New_York',8,0,9,30],['New York Open Kill Zone','America/New_York',8,30,11,30],['Silver Bullet','America/New_York',10,0,11,0],['Swing Session','America/New_York',13,30,16,0]];let n=Date.now();return z.map(a=>{let r=timeRange(...a.slice(1));return{name:a[0],active:n>=r.start&&n<r.end,wib:new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(r.start))+' - '+new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(r.end))}})}
function curSession(){return sessions().find(x=>x.active)||{name:'Off-Session',active:false,wib:'-'}}
function trueRange(c,p){return Math.max(c.high-c.low,Math.abs(c.high-(p?p.close:c.close)),Math.abs(c.low-(p?p.close:c.close)))}
function atr(cs,len=10){let trs=[];for(let i=Math.max(1,cs.length-len);i<cs.length;i++)trs.push(trueRange(cs[i],cs[i-1]));return avg(trs)||1}
function meanBody(cs,len=5){return avg(cs.slice(-len).map(c=>Math.abs(c.close-c.open)))||0}
function bodyOk(c,mean){let body=Math.abs(c.close-c.open),mx=Math.max(c.close,c.open),mn=Math.min(c.close,c.open);return body>mean&&c.high-mx<body*.36&&mn-c.low<body*.36}
function volatilityParsed(c,p,measure){let highVol=(c.high-c.low)>=2*measure;return{parsedHigh:highVol?c.low:c.high,parsedLow:highVol?c.high:c.low}}
function pivotPoints(cs,size){let highs=[],lows=[];for(let i=size;i<cs.length-size;i++){let h=true,l=true;for(let j=1;j<=size;j++){if(cs[i].high<=cs[i-j].high||cs[i].high<=cs[i+j].high)h=false;if(cs[i].low>=cs[i-j].low||cs[i].low>=cs[i+j].low)l=false}if(h)highs.push({level:cs[i].high,time:cs[i].time,index:i,lastLevel:null,crossed:false});if(l)lows.push({level:cs[i].low,time:cs[i].time,index:i,lastLevel:null,crossed:false})}return{highs,lows}}
function equalHighLows(cs,size=3,threshold=.1,atrVal=1){let p=pivotPoints(cs,size),eqh=[],eql=[];for(let i=1;i<p.highs.length;i++)if(Math.abs(p.highs[i].level-p.highs[i-1].level)<threshold*atrVal)eqh.push({type:'EQH',level:p.highs[i].level,index:p.highs[i].index,from:p.highs[i-1].index});for(let i=1;i<p.lows.length;i++)if(Math.abs(p.lows[i].level-p.lows[i-1].level)<threshold*atrVal)eql.push({type:'EQL',level:p.lows[i].level,index:p.lows[i].index,from:p.lows[i-1].index});return{eqh:eqh.slice(-5),eql:eql.slice(-5)}}
function structureEngine(cs,size=5,internal=false,volFilter=false){let piv=pivotPoints(cs,size),trend=0,events=[],obs=[],parsedHighs=[],parsedLows=[];let trAvg=atr(cs,Math.min(200,cs.length-1));for(let i=0;i<cs.length;i++){let vp=volatilityParsed(cs[i],cs[i-1],trAvg);parsedHighs[i]=vp.parsedHigh;parsedLows[i]=vp.parsedLow;let ph=piv.highs.filter(x=>x.index<i).pop(),pl=piv.lows.filter(x=>x.index<i).pop();let bullishBar=true,bearishBar=true;if(volFilter){bullishBar=cs[i].high-Math.max(cs[i].close,cs[i].open)>Math.min(cs[i].close,cs[i].open)-cs[i].low;bearishBar=cs[i].high-Math.max(cs[i].close,cs[i].open)<Math.min(cs[i].close,cs[i].open)-cs[i].low}if(ph&&!ph.crossed&&cs[i].close>ph.level&&bullishBar){let tag=trend===BEARISH?'CHoCH':'BOS';events.push({type:tag,dir:'BULLISH',level:ph.level,index:i,pivotIndex:ph.index,internal});ph.crossed=true;trend=BULLISH;let slice=parsedLows.slice(ph.index,i+1),min=Math.min(...slice),idx=ph.index+slice.indexOf(min),top=parsedHighs[idx],bottom=parsedLows[idx];if(Number.isFinite(min))obs.unshift({type:'BULLISH',top,bottom,index:idx,time:cs[idx]?.time,internal,breaker:false,breakIndex:null})}if(pl&&!pl.crossed&&cs[i].close<pl.level&&bearishBar){let tag=trend===BULLISH?'CHoCH':'BOS';events.push({type:tag,dir:'BEARISH',level:pl.level,index:i,pivotIndex:pl.index,internal});pl.crossed=true;trend=BEARISH;let slice=parsedHighs.slice(pl.index,i+1),max=Math.max(...slice),idx=pl.index+slice.indexOf(max),top=parsedHighs[idx],bottom=parsedLows[idx];if(Number.isFinite(max))obs.unshift({type:'BEARISH',top,bottom,index:idx,time:cs[idx]?.time,internal,breaker:false,breakIndex:null})}}
let mitSrc=state.settings.obMitigation==='Close';for(let i=obs.length-1;i>=0;i--){let o=obs[i];for(let k=o.index+1;k<cs.length;k++){let c=cs[k];if(o.type==='BULLISH'&&(mitSrc?c.close<c.low:c.low<o.bottom)){o.breaker=true;o.breakIndex=k}if(o.type==='BEARISH'&&(mitSrc?c.close>c.high:c.high>o.top)){o.breaker=true;o.breakIndex=k}if(o.breaker){if(o.type==='BULLISH'&&c.close>o.top){obs.splice(i,1);break}if(o.type==='BEARISH'&&c.close<o.bottom){obs.splice(i,1);break}}}}
return{trend,events,orderBlocks:obs.slice(0,internal?5:3),pivots:piv,lastEvent:last(events)}}
function fvgEngine(cs){let out=[],bpr=[];let mean=meanBody(cs,5);for(let i=2;i<cs.length;i++){let prev=cs[i-1],a=cs[i-2],c=cs[i];let displacement=bodyOk(prev,mean);let bull=displacement&&c.low>a.high&&prev.close>a.high;let bear=displacement&&c.high<a.low&&prev.close<a.low;if(bull){let z={type:'BULLISH',top:c.low,bottom:a.high,index:i,active:true,touched:false,broken:false};for(let k=i+1;k<cs.length;k++){if(cs[k].low<z.top)z.touched=true;if(cs[k].low<z.bottom){z.active=false;z.broken=true;break}}if(z.active)out.unshift(z)}if(bear){let z={type:'BEARISH',top:a.low,bottom:c.high,index:i,active:true,touched:false,broken:false};for(let k=i+1;k<cs.length;k++){if(cs[k].high>z.bottom)z.touched=true;if(cs[k].high>z.top){z.active=false;z.broken=true;break}}if(z.active)out.unshift(z)}}let bulls=out.filter(x=>x.type==='BULLISH'),bears=out.filter(x=>x.type==='BEARISH');if(bulls.length&&bears.length){let bu=bulls[0],be=bears[0];let top=Math.min(bu.top,be.top),bottom=Math.max(bu.bottom,be.bottom);if(top>bottom)bpr.push({type:bu.index>be.index?'BPR_UP':'BPR_DN',top,bottom,index:Math.max(bu.index,be.index),active:true})}return{fvgs:out.slice(0,8),bpr:bpr.slice(0,3)}}
function volumeImbalance(cs){let out=[];for(let i=1;i<cs.length;i++){let p=cs[i-1],c=cs[i],mx=Math.max(c.close,c.open),mn=Math.min(c.close,c.open),pmx=Math.max(p.close,p.open),pmn=Math.min(p.close,p.open);let bull=c.open>p.close&&p.high>c.low&&c.close>p.close&&c.open>p.open&&p.high<mn;let bear=c.open<p.close&&p.low<c.high&&c.close<p.close&&c.open<p.open&&p.low>mx;if(bull)out.unshift({type:'BULLISH',top:mn,bottom:pmx,index:i});if(bear)out.unshift({type:'BEARISH',top:pmn,bottom:mx,index:i})}return out.slice(0,5)}
function liquidityEngine(cs,pivots,atrVal){let margin=atrVal/(10/4),b=[],s=[];function zones(list,type){let out=[];for(let i=0;i<list.length;i++){let group=list.filter(x=>Math.abs(x.level-list[i].level)<=margin);if(group.length>2){let levels=group.map(x=>x.level),top=Math.max(...levels)+margin,bottom=Math.min(...levels)-margin,left=Math.min(...group.map(x=>x.index));let broken=false,brokenTop=false,brokenBottom=false;for(let k=list[i].index+1;k<cs.length;k++){let c=cs[k];if(type==='BSL'){if(c.close>top)brokenTop=true;if(c.close>bottom)brokenBottom=true;if(brokenTop&&brokenBottom)broken=true}else{if(c.close<top)brokenTop=true;if(c.close<bottom)brokenBottom=true;if(brokenTop&&brokenBottom)broken=true}}out.push({type,top,bottom,level:avg(levels),left,count:group.length,broken,brokenTop,brokenBottom})}}let uniq=[];for(let z of out){if(!uniq.some(u=>Math.abs(u.level-z.level)<=margin))uniq.push(z)}return uniq.filter(x=>!x.broken).slice(-5).reverse()}b=zones(pivots.highs,'BSL');s=zones(pivots.lows,'SSL');return{bsl:b,ssl:s}}
function gapsEngine(cs){let nwog=[],ndog=[];for(let i=1;i<cs.length;i++){let d=new Date(cs[i].time),pd=new Date(cs[i-1].time);let day=d.getUTCDay(),pday=pd.getUTCDay();if(day===1&&pday===5){nwog.unshift({type:'NWOG',top:Math.max(cs[i].open,cs[i-1].close),bottom:Math.min(cs[i].open,cs[i-1].close),mid:(cs[i].open+cs[i-1].close)/2,index:i})}if(new Date(cs[i].time).toDateString()!==new Date(cs[i-1].time).toDateString()){ndog.unshift({type:'NDOG',top:Math.max(cs[i].open,cs[i-1].close),bottom:Math.min(cs[i].open,cs[i-1].close),mid:(cs[i].open+cs[i-1].close)/2,index:i})}}return{nwog:nwog.slice(0,3),ndog:ndog.slice(0,3)}}
function pdZones(cs,sw){let top=Math.max(...sw.pivots.highs.slice(-5).map(x=>x.level),...cs.slice(-80).map(x=>x.high));let bottom=Math.min(...sw.pivots.lows.slice(-5).map(x=>x.level),...cs.slice(-80).map(x=>x.low));let eq=(top+bottom)/2;return{top,bottom,eq,premiumTop:top,premiumBottom:.95*top+.05*bottom,equilibriumTop:.525*top+.475*bottom,equilibriumBottom:.525*bottom+.475*top,discountTop:.95*bottom+.05*top,discountBottom:bottom}}
function displacement(cs){let mean=meanBody(cs,5),c=last(cs);if(!c)return null;if(bodyOk(c,mean)&&c.close>c.open)return{type:'UP',level:c.low};if(bodyOk(c,mean)&&c.close<c.open)return{type:'DN',level:c.high};return null}
function previousLevels(cs){let daily={},weekly={},monthly={};for(let c of cs){let d=new Date(c.time),dk=d.toISOString().slice(0,10),wk=d.getUTCFullYear()+'-W'+Math.ceil((((d-new Date(Date.UTC(d.getUTCFullYear(),0,1)))/86400000)+new Date(Date.UTC(d.getUTCFullYear(),0,1)).getUTCDay()+1)/7),mk=d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0');for(let [map,key] of [[daily,dk],[weekly,wk],[monthly,mk]]){if(!map[key])map[key]={high:c.high,low:c.low};else{map[key].high=Math.max(map[key].high,c.high);map[key].low=Math.min(map[key].low,c.low)}}}let vals=o=>Object.values(o);return{daily:last(vals(daily))||null,weekly:last(vals(weekly))||null,monthly:last(vals(monthly))||null}}
function analyze(cs,tf,htfBiases={}){if(!cs||cs.length<30)return null;let price=state.price||last(cs).close,atrVal=atr(cs,10),swing=structureEngine(cs,Math.max(10,tf==='M1'?10:20),false,false),internal=structureEngine(cs,5,true,true),eq=equalHighLows(cs,3,.1,atrVal),fg=fvgEngine(cs),vi=volumeImbalance(cs),liq=liquidityEngine(cs,swing.pivots,atrVal),gaps=gapsEngine(cs),pd=pdZones(cs,swing),disp=displacement(cs),levels=previousLevels(cs);let zone=price>pd.equilibriumTop?'Premium':price<pd.equilibriumBottom?'Discount':'Equilibrium';let htfList=Object.values(htfBiases).filter(Boolean),bull=htfList.filter(x=>x==='BULLISH').length,bear=htfList.filter(x=>x==='BEARISH').length,htf=bull>bear?'BULLISH':bear>bull?'BEARISH':'NEUTRAL';let internalBias=internal.trend===BULLISH?'BULLISH':internal.trend===BEARISH?'BEARISH':'NEUTRAL';let swingBias=swing.trend===BULLISH?'BULLISH':swing.trend===BEARISH?'BEARISH':'NEUTRAL';let scoreBias=(swing.trend===BULLISH?2:swing.trend===BEARISH?-2:0)+(internal.trend===BULLISH?1:internal.trend===BEARISH?-1:0)+(htf==='BULLISH'?2:htf==='BEARISH'?-2:0)+(zone==='Discount'?1:zone==='Premium'?-1:0);let final=scoreBias>1?'BULLISH':scoreBias<-1?'BEARISH':'NEUTRAL';let activeBullFvg=fg.fvgs.find(x=>x.type==='BULLISH'),activeBearFvg=fg.fvgs.find(x=>x.type==='BEARISH'),bullOb=swing.orderBlocks.find(x=>x.type==='BULLISH')||internal.orderBlocks.find(x=>x.type==='BULLISH'),bearOb=swing.orderBlocks.find(x=>x.type==='BEARISH')||internal.orderBlocks.find(x=>x.type==='BEARISH');let bsl=liq.bsl[0]?.level||swing.pivots.highs.slice().reverse().find(x=>x.level>price)?.level||Math.max(...cs.slice(-50).map(c=>c.high));let ssl=liq.ssl[0]?.level||swing.pivots.lows.slice().reverse().find(x=>x.level<price)?.level||Math.min(...cs.slice(-50).map(c=>c.low));let hasPoi=final==='BULLISH'?(bullOb||activeBullFvg):final==='BEARISH'?(bearOb||activeBearFvg):false;let session=curSession();let score=40;if(final!=='NEUTRAL')score+=15;if(htf!=='NEUTRAL'&&htf===final)score+=15;if(hasPoi)score+=15;if(session.active)score+=8;if(disp&&((disp.type==='UP'&&final==='BULLISH')||(disp.type==='DN'&&final==='BEARISH')))score+=7;if((final==='BULLISH'&&zone==='Discount')||(final==='BEARISH'&&zone==='Premium'))score+=10;if(final==='BULLISH'&&zone==='Premium')score-=15;if(final==='BEARISH'&&zone==='Discount')score-=15;score=clamp(score,10,95);let signal='WAIT';if(score>=75&&final==='BULLISH')signal='BUY CONTEXT';else if(score>=75&&final==='BEARISH')signal='SELL CONTEXT';else if(score>=60&&final!=='NEUTRAL')signal='WATCHLIST';let reason=signal==='WAIT'?'Belum ada kombinasi struktur, POI, dan konteks yang cukup bersih.':signal==='WATCHLIST'?'Konteks mulai selaras, tunggu reaksi pada POI/likuiditas.':final==='BULLISH'?'Konteks bullish: cari reaksi discount, bullish OB/FVG, lalu target BSL.':'Konteks bearish: cari reaksi premium, bearish OB/FVG, lalu target SSL.';let events=[...swing.events.slice(-3),...internal.events.slice(-3)].map(x=>(x.internal?'Internal ':'Swing ')+x.dir+' '+x.type+' @ '+p2(x.level));if(eq.eqh.length)events.push('EQH @ '+p2(last(eq.eqh).level));if(eq.eql.length)events.push('EQL @ '+p2(last(eq.eql).level));if(activeBullFvg)events.push('Bullish FVG aktif '+p2(activeBullFvg.bottom)+'-'+p2(activeBullFvg.top));if(activeBearFvg)events.push('Bearish FVG aktif '+p2(activeBearFvg.bottom)+'-'+p2(activeBearFvg.top));return{tf,price,atr:atrVal,final,score,biasScore:scoreBias,signal,reason,zone,htfBias:htf,internalBias,swingBias,swing,internal,eq,fvgs:fg.fvgs,bpr:fg.bpr,vi,liq,gaps,pd,disp,levels,bsl,ssl,bullOb,bearOb,activeBullFvg,activeBearFvg,events,concepts:[['Market Structure',swingBias,events[0]||'Belum ada struktur valid'],['Internal Structure',internalBias,events[1]||'Menunggu internal break'],['Order Blocks',bullOb||bearOb?'ACTIVE':'WAIT',`Bull ${bullOb?p2(bullOb.bottom)+'-'+p2(bullOb.top):'-'} | Bear ${bearOb?p2(bearOb.bottom)+'-'+p2(bearOb.top):'-'}`],['Fair Value Gap',fg.fvgs.length?'ACTIVE':'WAIT',fg.fvgs[0]?`${fg.fvgs[0].type} ${p2(fg.fvgs[0].bottom)}-${p2(fg.fvgs[0].top)}`:'Tidak ada FVG aktif'],['Liquidity',liq.bsl.length||liq.ssl.length?'ACTIVE':'WAIT',`BSL ${p2(bsl)} | SSL ${p2(ssl)}`],['EQH/EQL',eq.eqh.length||eq.eql.length?'ACTIVE':'WAIT',`EQH ${eq.eqh.length? p2(last(eq.eqh).level):'-'} | EQL ${eq.eql.length? p2(last(eq.eql).level):'-'}`],['Volume Imbalance',vi.length?'ACTIVE':'WAIT',vi[0]?`${vi[0].type} ${p2(vi[0].bottom)}-${p2(vi[0].top)}`:'Tidak ada VI'],['Premium/Discount',zone,`Premium ${p2(pd.premiumBottom)}+ | EQ ${p2(pd.eq)} | Discount ${p2(pd.discountTop)}-`],['NWOG/NDOG',gaps.nwog.length||gaps.ndog.length?'ACTIVE':'WAIT',`NWOG ${gaps.nwog[0]?p2(gaps.nwog[0].bottom)+'-'+p2(gaps.nwog[0].top):'-'} | NDOG ${gaps.ndog[0]?p2(gaps.ndog[0].bottom)+'-'+p2(gaps.ndog[0].top):'-'}`],['Kill Zone',session.active?'ACTIVE':'WAIT',session.name]]}}
async function fetchTf(tf){let interval=TF[tf]||tf;if(!state.key.trim())throw new Error('API key kosong');let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${interval}&outputsize=500&apikey=${encodeURIComponent(state.key.trim())}`;let res=await fetch(url);let data=await res.json();if(!data||data.status==='error')throw new Error(data?.message||'Gagal mengambil data');let arr=(data.values||[]).reverse().map(c=>({time:new Date(c.datetime.replace(' ','T')).getTime(),timeframe:tf,open:+c.open,high:+c.high,low:+c.low,close:+c.close,tickCount:1,isClosed:true})).filter(c=>Number.isFinite(c.close));state.candles[tf]=arr;return arr}
function tfGroup(tf){return tf==='M1'?['M1','M5','M15','H1']:tf==='M5'?['M5','M15','H1','H4']:tf==='M15'?['M15','H1','H4','D1']:tf==='M30'?['M30','H1','H4','D1']:tf==='H1'?['H1','H4','D1','W1']:tf==='H4'?['H4','D1','W1']:['D1','W1']}
async function runAnalysis(tf=state.tf){state.tf=tf;state.tab='Analyze';render();try{log('Memindai ICT Concepts '+tf+'...');let group=tfGroup(tf);for(let x of group){if(!state.candles[x]||state.candles[x].length<30)await fetchTf(x).catch(e=>{log('Data '+x+' gagal: '+e.message);return[]})}let htfBiases={};for(let x of group.filter(x=>x!==tf)){let a=analyze(state.candles[x],x,{});htfBiases[x]=a?.final||'NEUTRAL';state.mtf[x]=htfBiases[x]}let res=analyze(state.candles[tf],tf,htfBiases);if(!res)throw new Error('Candle belum cukup');state.result=res;state.mtf[tf]=res.final;state.analyses=[{id:Date.now(),date:new Date().toISOString(),...res},...state.analyses].slice(0,100);save();log(`${tf} selesai: ${res.final} score ${res.score}/100, ${res.signal}`);sendTargetsToNative();notifyImportant(res)}catch(e){log('Error '+tf+': '+e.message)}render()}
function notifyImportant(res){if(!res)return;let key=`${res.tf}:${res.signal}:${Math.round(res.bsl)}:${Math.round(res.ssl)}:${res.events.slice(-2).join('|')}`;let last=state.notified[key]||0;if(Date.now()-last<300000)return;state.notified[key]=Date.now();localStorage.setItem('amy_mapping_notified',JSON.stringify(state.notified));if(res.signal!=='WAIT'||res.score>=70||res.events.length){let msg=`${res.tf} ${res.final} ${res.score}/100. BSL ${p2(res.bsl)} SSL ${p2(res.ssl)}. ${res.reason}`;if(window.Android?.showNotificationWithUrl)window.Android.showNotificationWithUrl('Amy FX ICT Signal',msg,location.href);else if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('Amy FX ICT Signal',{body:msg});}}
function sendTargetsToNative(){if(state.bg&&window.Android?.startBackgroundScanner){let r=state.result;window.Android.startBackgroundScanner(state.key,String(r?.bsl||''),String(r?.ssl||''));}}
function connect(){if(!state.key.trim()){log('Masukkan API key dulu.');return}localStorage.setItem('twelve_api_key',state.key.trim());if(ws){ws.onclose=null;ws.close()}state.conn='Reconnecting';renderSoft();ws=new WebSocket(`wss://ws.twelvedata.com/v1/quotes/price?apikey=${encodeURIComponent(state.key.trim())}`);ws.onopen=()=>{state.conn='Connected';renderSoft();ws.send(JSON.stringify({action:'subscribe',params:{symbols:'XAU/USD'}}));log('WebSocket Connected.');if(!state.result)runAnalysis(state.tf)};ws.onmessage=e=>{try{let d=JSON.parse(e.data);let p=+d.price;if(p>1000&&p<10000){state.price=p;localStorage.setItem('last_price',String(p));renderSoft();if(!scanTimer)scanTimer=setTimeout(()=>{scanTimer=null;if(state.tab==='Analyze'||state.bg)runAnalysis(state.tf)},15000)}}catch(_){}};ws.onclose=()=>{state.conn='Offline';renderSoft();clearTimeout(reconnectTimer);reconnectTimer=setTimeout(connect,8000)};ws.onerror=()=>log('WebSocket error')}
function renderContext(r){if(!r)return'<div class="context"><h2>Market Context</h2><p class="muted">Buka tab Analyze lalu pilih timeframe untuk memuat ICT Concepts.</p></div>';let fvg=r.fvgs[0],vi=r.vi[0],bpr=r.bpr[0],nw=r.gaps.nwog[0],nd=r.gaps.ndog[0];return`<div class="context"><h2>Market Context (${h(r.tf)}) <span style="float:right;font-size:12px"><i class="live-dot on"></i>ICT MAP</span></h2><div class="bias">FINAL BIAS: ${h(r.final)} • ${h(r.signal)} • Score ${r.score}/100</div><div class="bar"><i style="width:${r.score}%"></i></div><div class="block blue"><b>📚 Market Structure:</b>Swing ${h(r.swingBias)} | Internal ${h(r.internalBias)} | HTF ${h(r.htfBias)}. ${h(r.events.slice(-3).join(' • ')||'Belum ada BOS/CHoCH baru.')}</div><div class="block purple"><b>⏳ Killzone & Time:</b>Sesi aktif: ${h(curSession().name)} (${h(curSession().wib)} WIB).</div><div class="block gold"><b>⚖️ Premium / Discount:</b>Harga berada di ${h(r.zone)}. Range ${p2(r.pd.bottom)} - ${p2(r.pd.top)}, EQ ${p2(r.pd.eq)}.<div class="zone"></div></div><div class="block cyan"><b>🕳️ FVG / BPR / VI:</b>FVG: ${fvg?h(fvg.type)+' '+p2(fvg.bottom)+'-'+p2(fvg.top):'-'} | BPR: ${bpr?p2(bpr.bottom)+'-'+p2(bpr.top):'-'} | VI: ${vi?h(vi.type)+' '+p2(vi.bottom)+'-'+p2(vi.top):'-'}.</div><div class="block rred"><b>🎯 Liquidity / EQH-EQL:</b>BSL ${p2(r.bsl)} | SSL ${p2(r.ssl)} | EQH ${r.eq.eqh.length?p2(last(r.eq.eqh).level):'-'} | EQL ${r.eq.eql.length?p2(last(r.eq.eql).level):'-'}.</div><div class="block orange"><b>🧲 NWOG / NDOG / DOL:</b>NWOG ${nw?p2(nw.bottom)+'-'+p2(nw.top):'-'} | NDOG ${nd?p2(nd.bottom)+'-'+p2(nd.top):'-'}. DOL: ${r.final==='BULLISH'?'BSL':r.final==='BEARISH'?'SSL':'belum jelas'}.</div><div class="suggest">💡 Saran Eksekusi:<br>${h(r.reason)}</div></div>`}
function renderConcepts(r){let arr=r?.concepts||[];return`<section class="card"><h2>ICT Concepts</h2><div class="concept-grid">${arr.map(c=>`<div class="concept"><small class="${c[1]==='BULLISH'||c[1]==='ACTIVE'||c[1]==='BUY CONTEXT'||c[1]==='Discount'?'green':c[1]==='BEARISH'||c[1]==='Premium'?'red':'yellow'}">${h(c[1])}</small><h3>${h(c[0])}</h3><p>${h(c[2])}</p></div>`).join('')||'<p class="muted">Belum ada analisis.</p>'}</div></section>`}
function mtfMatrix(){let keys=['M1','M5','M15','M30','H1','H4','D1','W1'];return`<section class="card"><h2>Multi Timeframe</h2><div class="tf-grid">${keys.map(x=>`<button class="${state.tf===x?'active':''}" onclick="runAnalysis('${x}')">${x}<br><span class="small ${state.mtf[x]==='BULLISH'?'green':state.mtf[x]==='BEARISH'?'red':'yellow'}">${state.mtf[x]||'LOAD'}</span></button>`).join('')}</div></section>`}
function dashboard(){let r=state.result,s=curSession();return`<section class="hero card"><div><div class="kicker">INNER CIRCLE TRADER</div><h1>XAU/USD</h1><div class="muted">WIB ${nowTime()}</div></div><div style="text-align:right"><div class="muted">Gold Price</div><div class="price">$${p2(state.price)}</div><div class="${state.conn==='Connected'?'green':'muted'}">${h(state.conn)}</div><div class="${s.active?'green':'muted'}">${h(s.name)}</div></div></section><section class="metrics"><div class="metric card"><strong>${state.analyses.length}</strong><span>Analyses</span></div><div class="metric card"><strong>${state.analyses.filter(a=>a.final==='BULLISH').length}</strong><span>Bullish</span></div><div class="metric card"><strong>${state.analyses.filter(a=>a.final==='BEARISH').length}</strong><span>Bearish</span></div></section><section class="card"><h2>Ringkasan Terakhir</h2>${r?`<div class="signal ${r.final==='BULLISH'?'green':r.final==='BEARISH'?'red':'yellow'}">${h(r.tf)} ${h(r.final)} • ${h(r.signal)} • ${r.score}/100</div><p class="muted">BSL ${p2(r.bsl)} • SSL ${p2(r.ssl)}</p><p>${h(r.reason)}</p>`:'<p class="muted">Belum ada mapping. Buka tab Analyze untuk menjalankan analisis.</p>'}</section><section class="card"><h2>Trading Sessions Auto DST</h2><div class="rows">${sessions().map(x=>`<div class="row"><b class="${x.active?'green':''}">${h(x.name)}</b><span>${h(x.wib)} WIB</span></div>`).join('')}</div></section>${renderConcepts(r)}`}
function analyzeView(){return`<section class="card"><div class="kicker">SMART MONEY ENGINE</div><h1>ICT Concepts Engine</h1><p class="muted">Logika mengikuti fitur indikator: MSS/BOS/CHoCH, internal/swing structure, OB, FVG/BPR, VI, liquidity, EQH/EQL, NWOG/NDOG, premium-discount, killzone, MTF levels.</p></section>${mtfMatrix()}${renderContext(state.result)}${renderConcepts(state.result)}`}
function history(){let list=state.logs.filter(x=>/FVG|OB|BSL|SSL|Signal|selesai|Error|Connected|BOS|CHoCH|EQH|EQL|NWOG|NDOG|VI/i.test(x));return`<section class="card"><h1>Event Logs</h1><button class="action" onclick="downloadLogs()">⇩ Download TXT</button>${list.map(x=>`<div class="log">${h(x)}</div>`).join('')||'<p class="muted">Belum ada event.</p>'}</section>`}
function terminal(){return`<section class="card"><h1>Terminal</h1>${state.logs.map(x=>`<div class="log">› ${h(x)}</div>`).join('')||'<p class="muted">Belum ada log.</p>'}</section>`}
function settings(){let s=state.settings;return`<section class="card settings"><h1>Settings & API</h1><label>Twelve Data API Key</label><input id="apiKey" value="${h(state.key)}" placeholder="Twelve Data API key"><button class="action" onclick="saveConnect()" style="width:100%">🔑 Save & Connect</button><p class="muted">API key disimpan lokal di HP.</p><div class="two"><div><label>Structure Mode</label><select onchange="state.settings.structureMode=this.value;save()"><option ${s.structureMode==='Present'?'selected':''}>Present</option><option ${s.structureMode==='Historical'?'selected':''}>Historical</option></select></div><div><label>OB Mitigation</label><select onchange="state.settings.obMitigation=this.value;save()"><option ${s.obMitigation==='High/Low'?'selected':''}>High/Low</option><option ${s.obMitigation==='Close'?'selected':''}>Close</option></select></div></div><div class="warn"><b>Izin scanner</b><br>Jika notifikasi mengambang belum muncul, aktifkan Notifikasi, Unrestricted Battery, dan Kelola Semua File.</div><button class="${state.bg?'action':'chip'}" onclick="toggleBg()" style="width:100%;margin-top:14px">${state.bg?'📡 Background Scanner ON':'📴 Background Scanner OFF'}</button><button class="${state.voice?'action':'chip'}" onclick="state.voice=!state.voice;save();render()" style="width:100%;margin-top:12px">${state.voice?'🔊 Voice Alerts ON':'🔇 Voice Alerts OFF'}</button><button class="action" onclick="testNotif()" style="width:100%;margin-top:12px">🔔 Kirim Notifikasi Tes</button><button class="chip" onclick="window.Android?.openManageFilesPermission?.()" style="width:100%;margin-top:12px">📁 Buka Izin Kelola Semua File</button></section>`}
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));let conn=document.getElementById('conn');conn.textContent=state.conn;conn.className='status '+(state.conn==='Connected'?'on':state.conn==='Reconnecting'?'warn':'');document.getElementById('app').innerHTML=state.tab==='Dashboard'?dashboard():state.tab==='Analyze'?analyzeView():state.tab==='History'?history():state.tab==='Terminal'?terminal():settings()}
function renderSoft(){let c=document.getElementById('conn');if(c){c.textContent=state.conn;c.className='status '+(state.conn==='Connected'?'on':state.conn==='Reconnecting'?'warn':'')}let p=document.querySelector('.price');if(p)p.textContent='$'+p2(state.price)}
function setTab(t){state.tab=t;render()}window.setTab=setTab;window.runAnalysis=runAnalysis;
function saveConnect(){state.key=(document.getElementById('apiKey')?.value||'').trim();localStorage.setItem('twelve_api_key',state.key);connect();sendTargetsToNative()}window.saveConnect=saveConnect;
function toggleBg(){if(!state.key.trim()){alert('Isi API key dulu.');return}state.bg=!state.bg;save();if(state.bg)sendTargetsToNative();else window.Android?.stopBackgroundScanner?.();render()}window.toggleBg=toggleBg;
function testNotif(){let msg='Tes notifikasi Amy FX Mapping. Jika tidak mengambang, aktifkan izin notifikasi dan channel heads-up.';if(window.Android?.showNotificationWithUrl)window.Android.showNotificationWithUrl('✅ Tes Berhasil',msg,location.href);else if(typeof Notification!=='undefined'){Notification.requestPermission().then(p=>p==='granted'&&new Notification('✅ Tes Berhasil',{body:msg}))}}
function downloadLogs(){let blob=new Blob([state.logs.join('\n')],{type:'text/plain'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='AmyFX_Event_Logs.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}window.downloadLogs=downloadLogs;
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
render();if(state.key)connect();
</script>
