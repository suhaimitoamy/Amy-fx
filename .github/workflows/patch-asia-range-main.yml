name: Apply Asia Range Mapping Update

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/patch-asia-range-main.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Add Asia High and Asia Low
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path('.')

          asia_module = r'''const NY_ZONE = 'America/New_York';
          const WIB_ZONE = 'Asia/Jakarta';

          function zonedParts(timestamp, timeZone) {
            const parts = new Intl.DateTimeFormat('en-CA', {
              timeZone,
              year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit', second: '2-digit',
              hourCycle: 'h23'
            }).formatToParts(new Date(timestamp));
            const read = type => Number(parts.find(item => item.type === type)?.value || 0);
            return { year: read('year'), month: read('month'), day: read('day'), hour: read('hour'), minute: read('minute'), second: read('second') };
          }

          function addCalendarDays(parts, amount) {
            const date = new Date(Date.UTC(parts.year, parts.month - 1, parts.day + amount));
            return { year: date.getUTCFullYear(), month: date.getUTCMonth() + 1, day: date.getUTCDate() };
          }

          function zonedTimestamp(dateParts, hour, minute, timeZone) {
            const targetAsUtc = Date.UTC(dateParts.year, dateParts.month - 1, dateParts.day, hour, minute, 0);
            let guess = targetAsUtc;
            for (let attempt = 0; attempt < 3; attempt += 1) {
              const observed = zonedParts(guess, timeZone);
              const observedAsUtc = Date.UTC(observed.year, observed.month - 1, observed.day, observed.hour, observed.minute, observed.second);
              const correction = targetAsUtc - observedAsUtc;
              guess += correction;
              if (Math.abs(correction) < 1000) break;
            }
            return guess;
          }

          function candleTimeMs(candle) {
            const value = Number(candle?.time);
            if (!Number.isFinite(value)) return NaN;
            return value > 10_000_000_000 ? value : value * 1000;
          }

          function validCandle(candle) {
            return Number.isFinite(candleTimeMs(candle)) && Number.isFinite(Number(candle?.high)) && Number.isFinite(Number(candle?.low)) && Number.isFinite(Number(candle?.close));
          }

          function formatWib(timestamp) {
            return new Intl.DateTimeFormat('id-ID', { timeZone: WIB_ZONE, hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date(timestamp)).replace('.', ':');
          }

          function formatWibDate(timestamp) {
            return new Intl.DateTimeFormat('id-ID', { timeZone: WIB_ZONE, day: '2-digit', month: 'short' }).format(new Date(timestamp));
          }

          export function asiaSessionWindows(nowMs = Date.now(), count = 8) {
            const nowNy = zonedParts(nowMs, NY_ZONE);
            const anchorOffset = nowNy.hour >= 20 ? 0 : -1;
            const windows = [];
            for (let index = 0; index < count; index += 1) {
              const startDate = addCalendarDays(nowNy, anchorOffset - index);
              const endDate = addCalendarDays(startDate, 1);
              const start = zonedTimestamp(startDate, 20, 0, NY_ZONE);
              const end = zonedTimestamp(endDate, 0, 0, NY_ZONE);
              windows.push({
                start,
                end,
                active: nowMs >= start && nowMs < end,
                complete: nowMs >= end,
                label: `${formatWibDate(start)} • ${formatWib(start)}–${formatWib(end)} WIB`
              });
            }
            return windows;
          }

          function classifyLevel(direction, level, postSession, livePrice, tolerance, active) {
            if (active) return 'BERKEMBANG';
            const closeBroken = postSession.some(candle => direction === 'HIGH' ? Number(candle.close) > level : Number(candle.close) < level);
            if (closeBroken) return 'CLOSE BREAK';
            const wickSwept = postSession.some(candle => direction === 'HIGH'
              ? Number(candle.high) > level && Number(candle.close) <= level
              : Number(candle.low) < level && Number(candle.close) >= level);
            if (wickSwept) return 'TERSAPU WICK';
            if (Number.isFinite(livePrice)) {
              const beyond = direction === 'HIGH' ? livePrice > level : livePrice < level;
              if (beyond) return 'LEWAT LIVE';
              if (Math.abs(livePrice - level) <= tolerance) return 'SEDANG DIUJI';
            }
            return 'BELUM DISAPU';
          }

          function marketPosition(price, high, low) {
            if (!Number.isFinite(price)) return 'Harga live belum tersedia';
            if (price > high) return 'Harga di atas Asia High';
            if (price < low) return 'Harga di bawah Asia Low';
            return 'Harga masih di dalam Asia Range';
          }

          function buildSummary(result) {
            if (!result.valid) return result.note || 'Candle M15 Asia Range belum tersedia.';
            if (result.active) return `Range sementara ${result.range.toFixed(2)} • Asia Range masih berkembang`;
            const highTaken = ['TERSAPU WICK', 'CLOSE BREAK', 'LEWAT LIVE'].includes(result.highStatus);
            const lowTaken = ['TERSAPU WICK', 'CLOSE BREAK', 'LEWAT LIVE'].includes(result.lowStatus);
            if (highTaken && !lowTaken) return `Range ${result.range.toFixed(2)} • Asia High sudah diambil, Asia Low masih utuh`;
            if (lowTaken && !highTaken) return `Range ${result.range.toFixed(2)} • Asia Low sudah diambil, Asia High masih utuh`;
            if (highTaken && lowTaken) return `Range ${result.range.toFixed(2)} • Kedua sisi Asia Range sudah diambil`;
            return `Range ${result.range.toFixed(2)} • ${result.position}`;
          }

          export function calculateAsiaRange(candles = [], livePrice = NaN, nowMs = Date.now()) {
            const clean = candles.filter(validCandle);
            const windows = asiaSessionWindows(nowMs);
            if (!clean.length) return { valid: false, state: 'NO_DATA', windowLabel: windows[0]?.label || '-', note: 'Memuat candle M15 untuk Asia Range.' };

            let selected = null;
            let sessionCandles = [];
            for (let index = 0; index < windows.length; index += 1) {
              const window = windows[index];
              const rows = clean.filter(candle => {
                const time = candleTimeMs(candle);
                return time >= window.start && time < window.end;
              });
              if (window.active && index === 0 && rows.length === 0) {
                return { valid: false, state: 'DEVELOPING', active: true, windowLabel: window.label, note: 'Asia Range baru dimulai; menunggu candle M15 pertama selesai.' };
              }
              if (rows.length >= 2) {
                selected = window;
                sessionCandles = rows;
                break;
              }
            }

            if (!selected) return { valid: false, state: 'NO_SESSION', windowLabel: windows[0]?.label || '-', note: 'Data Asia Range belum lengkap.' };

            const high = Math.max(...sessionCandles.map(candle => Number(candle.high)));
            const low = Math.min(...sessionCandles.map(candle => Number(candle.low)));
            const range = high - low;
            const price = Number(livePrice);
            const postSession = clean.filter(candle => {
              const time = candleTimeMs(candle);
              return time >= selected.end && time <= nowMs;
            });
            const tolerance = Math.max(range * 0.025, 0.2);
            const result = {
              valid: true,
              state: selected.active ? 'DEVELOPING' : 'COMPLETE',
              active: selected.active,
              complete: selected.complete,
              start: selected.start,
              end: selected.end,
              windowLabel: selected.label,
              high,
              low,
              range,
              highStatus: classifyLevel('HIGH', high, postSession, price, tolerance, selected.active),
              lowStatus: classifyLevel('LOW', low, postSession, price, tolerance, selected.active),
              position: marketPosition(price, high, low),
              candleCount: sessionCandles.length
            };
            result.summary = buildSummary(result);
            return result;
          }
          '''.replace('\n          ', '\n').lstrip()

          asia_css = r'''.asia-range-block{margin-top:12px;padding:11px;border:1px solid rgba(212,175,55,.2);border-radius:14px;background:linear-gradient(180deg,rgba(212,175,55,.055),rgba(0,0,0,.18))}
          .asia-range-head,.asia-strip-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
          .asia-range-head b,.asia-strip-head span{color:var(--gold);font-size:11px;font-weight:950;letter-spacing:.08em}
          .asia-range-head small,.asia-strip-head small{color:var(--muted);font-size:9px;text-align:right}
          .asia-range-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:9px}
          .asia-level{background:#090909;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:9px}
          .asia-level small{display:block;color:var(--muted);font-size:9px;font-weight:900}
          .asia-level strong{display:block;margin-top:2px;font-size:15px;color:#f5f5f5}
          .asia-level span{display:block;margin-top:4px;font-size:9px;font-weight:900;color:var(--muted)}
          .asia-level.status-sedang-diuji,.asia-level.status-berkembang,.asia-level.status-lewat-live{border-color:rgba(212,175,55,.5)}
          .asia-level.status-sedang-diuji span,.asia-level.status-berkembang span,.asia-level.status-lewat-live span{color:var(--gold)}
          .asia-level.status-tersapu-wick{border-color:rgba(251,191,36,.48);background:rgba(251,191,36,.055)}
          .asia-level.status-tersapu-wick span{color:#fbbf24}
          .asia-level.status-close-break{border-color:rgba(74,222,128,.44);background:rgba(74,222,128,.05)}
          .asia-level.status-close-break span{color:var(--green)}
          .asia-range-summary{margin-top:8px;color:#cfcfcf;font-size:10px;line-height:1.4}
          .asia-range-empty{margin-top:8px;color:var(--muted);font-size:10px}
          .asia-liquidity-strip{padding:11px 13px!important;margin-bottom:12px!important}
          .asia-strip-levels{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}
          .asia-strip-levels>span{display:flex;align-items:center;justify-content:space-between;gap:5px;background:#0b0b0b;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px;font-size:10px;color:var(--muted)}
          .asia-strip-levels b{color:#fff;font-size:12px}
          .asia-strip-levels em{font-style:normal;color:var(--gold);font-size:8px;font-weight:900;text-align:right}
          @media(max-width:520px){.asia-range-grid,.asia-strip-levels{grid-template-columns:repeat(2,minmax(0,1fr))}}
          '''.replace('\n          ', '\n').lstrip()

          asia_test = r'''import test from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import { fileURLToPath } from 'node:url';
          import { calculateAsiaRange } from '../app/src/main/assets/apps/mapping/js/session/asia-range.js';

          const candle = (iso, high, low, close) => ({ time: Date.parse(iso) / 1000, high, low, close, open: close });

          test('Asia Range uses 20:00-00:00 New York and reports wick sweep', () => {
            const now = Date.parse('2026-07-13T10:00:00Z');
            const candles = [
              candle('2026-07-13T00:00:00Z', 4102, 4099, 4101),
              candle('2026-07-13T00:15:00Z', 4106, 4100, 4105),
              candle('2026-07-13T00:30:00Z', 4110, 4103, 4108),
              candle('2026-07-13T01:00:00Z', 4108, 4096, 4098),
              candle('2026-07-13T02:00:00Z', 4104, 4094, 4097),
              candle('2026-07-13T03:45:00Z', 4103, 4095, 4100),
              candle('2026-07-13T05:00:00Z', 4112, 4105, 4108)
            ];
            const result = calculateAsiaRange(candles, 4107, now);
            assert.equal(result.valid, true);
            assert.equal(result.high, 4110);
            assert.equal(result.low, 4094);
            assert.equal(result.range, 16);
            assert.equal(result.highStatus, 'TERSAPU WICK');
            assert.equal(result.lowStatus, 'BELUM DISAPU');
            assert.match(result.windowLabel, /WIB/);
          });

          test('closed candle beyond Asia High has priority', () => {
            const now = Date.parse('2026-07-13T10:00:00Z');
            const candles = [
              candle('2026-07-13T00:00:00Z', 4105, 4098, 4102),
              candle('2026-07-13T01:00:00Z', 4110, 4095, 4100),
              candle('2026-07-13T03:45:00Z', 4108, 4097, 4104),
              candle('2026-07-13T05:00:00Z', 4113, 4107, 4112)
            ];
            assert.equal(calculateAsiaRange(candles, 4112, now).highStatus, 'CLOSE BREAK');
          });

          test('active Asia session remains developing', () => {
            const now = Date.parse('2026-07-14T01:00:00Z');
            const candles = [
              candle('2026-07-14T00:00:00Z', 4072, 4068, 4070),
              candle('2026-07-14T00:15:00Z', 4075, 4069, 4074),
              candle('2026-07-14T00:30:00Z', 4076, 4071, 4073)
            ];
            const result = calculateAsiaRange(candles, 4073, now);
            assert.equal(result.active, true);
            assert.equal(result.highStatus, 'BERKEMBANG');
            assert.equal(result.lowStatus, 'BERKEMBANG');
          });

          test('TwelveData candles are requested and parsed as UTC', () => {
            const root = fileURLToPath(new URL('..', import.meta.url));
            const backend = readFileSync(`${root}/api/twelvedata.js`, 'utf8');
            const marketData = readFileSync(`${root}/app/src/main/assets/apps/mapping/js/api/market-data.js`, 'utf8');
            assert.match(backend, /timezone=UTC/);
            assert.match(marketData, /parseMarketTimestamp/);
          });
          '''.replace('\n          ', '\n').lstrip()

          session_dir = root / 'app/src/main/assets/apps/mapping/js/session'
          session_dir.mkdir(parents=True, exist_ok=True)
          (session_dir / 'asia-range.js').write_text(asia_module, encoding='utf-8')
          (root / 'app/src/main/assets/apps/mapping/css/asia-range.css').write_text(asia_css, encoding='utf-8')
          (root / 'tests/asia-range.test.mjs').write_text(asia_test, encoding='utf-8')

          index_path = root / 'app/src/main/assets/apps/mapping/index.html'
          index = index_path.read_text(encoding='utf-8')
          marker = '<link rel="stylesheet" href="css/style.css">'
          if 'css/asia-range.css' not in index:
            if marker not in index: raise SystemExit('mapping style marker not found')
            index = index.replace(marker, marker + '\n<link rel="stylesheet" href="css/asia-range.css">', 1)
          index_path.write_text(index, encoding='utf-8')

          ui_path = root / 'app/src/main/assets/apps/mapping/js/ui/ui-render.js'
          ui = ui_path.read_text(encoding='utf-8')
          import_marker = "import { renderSetupLifecycle } from './setup-lifecycle.js';"
          if "../session/asia-range.js" not in ui:
            if import_marker not in ui: raise SystemExit('ui import marker not found')
            ui = ui.replace(import_marker, import_marker + "\nimport { calculateAsiaRange } from '../session/asia-range.js';", 1)

          asia_ui = r'''function currentAsiaRange(){return calculateAsiaRange(state.candles?.M15||[],analyzeLivePrice(),Date.now())}
          function asiaStatusClass(status){return`status-${String(status||'wait').toLowerCase().replaceAll(' ','-')}`}
          function asiaLevelMarkup(label,value,status){return`<div class="asia-level ${asiaStatusClass(status)}"><small>${label}</small><strong>${p2(value)}</strong><span>${status}</span></div>`}
          function asiaRangeContent(range,compact=false){
            if(!range?.valid){return compact?`<div class="asia-strip-head"><span>ASIA LIQUIDITY</span><small>${range?.windowLabel||'-'}</small></div><div class="asia-range-empty">${range?.note||'Data Asia Range belum tersedia.'}</div>`:`<div class="asia-range-head"><b>ASIA RANGE</b><small>${range?.windowLabel||'-'}</small></div><div class="asia-range-empty">${range?.note||'Data Asia Range belum tersedia.'}</div>`}
            if(compact)return`<div class="asia-strip-head"><span>ASIA LIQUIDITY</span><small>${range.windowLabel}</small></div><div class="asia-strip-levels"><span>Asia High <b>${p2(range.high)}</b><em>${range.highStatus}</em></span><span>Asia Low <b>${p2(range.low)}</b><em>${range.lowStatus}</em></span></div><div class="asia-range-summary">${range.summary}</div>`;
            return`<div class="asia-range-head"><b>ASIA RANGE</b><small>${range.windowLabel}</small></div><div class="asia-range-grid">${asiaLevelMarkup('ASIA HIGH',range.high,range.highStatus)}${asiaLevelMarkup('ASIA LOW',range.low,range.lowStatus)}</div><div class="asia-range-summary">${range.summary}</div>`
          }
          export function killzonePanel(){let list=sessions(),cur=curSession(),focus=list.filter(s=>s.name.includes('London Open')||s.name.includes('New York Open')),asia=currentAsiaRange();return`<section class="card session-card"><div class="section-row"><div><div class="kicker">SESI TRADING</div><h2>Session focus</h2></div><span class="muted" id="kz-wib">WIB ${nowTime()}</span></div><div class="session-pill ${cur.active?'active':''}">${cur.active?'Aktif: '+cur.name:'Off-Session'}</div><div class="asia-range-block" data-asia-range-dashboard>${asiaRangeContent(asia)}</div><div class="session-grid">${focus.map(s=>`<div class="session-focus ${s.active?'active':''}"><b>${s.active?'● ':'○ '}${s.name.replace(' Kill Zone','')}</b><small>${s.wib} WIB</small><span>${s.active?'Aktif sekarang':'Menunggu sesi'}</span></div>`).join('')}</div></section>`}
          export function asiaLiquidityStrip(){return`<section class="card asia-liquidity-strip" data-asia-range-compact>${asiaRangeContent(currentAsiaRange(),true)}</section>`}
          function syncAsiaRangeDom(){const range=currentAsiaRange();document.querySelectorAll('[data-asia-range-dashboard]').forEach(el=>el.innerHTML=asiaRangeContent(range));document.querySelectorAll('[data-asia-range-compact]').forEach(el=>el.innerHTML=asiaRangeContent(range,true))}
          '''.replace('\n          ', '\n').strip()

          pattern = re.compile(r"export function killzonePanel\(\)\{.*?\n\nexport function fmtDir", re.S)
          if not pattern.search(ui): raise SystemExit('killzonePanel block not found')
          ui = pattern.sub(asia_ui + '\n\nexport function fmtDir', ui, count=1)

          marker = '  ${amyDecisionCard()}\n  <details class="card disclosure" open>'
          if '${asiaLiquidityStrip()}' not in ui:
            if marker not in ui: raise SystemExit('analyze view marker not found')
            ui = ui.replace(marker, '  ${amyDecisionCard()}\n  ${asiaLiquidityStrip()}\n  <details class="card disclosure" open>', 1)

          clock_marker = "  if(kw)kw.textContent='WIB '+nowTime();"
          tail = ui.split('export function renderSoft()',1)[-1]
          if 'syncAsiaRangeDom();' not in tail:
            if clock_marker not in ui: raise SystemExit('renderSoft marker not found')
            ui = ui.replace(clock_marker, clock_marker + '\n  syncAsiaRangeDom();', 1)
          ui_path.write_text(ui, encoding='utf-8')

          market_path = root / 'app/src/main/assets/apps/mapping/js/api/market-data.js'
          market = market_path.read_text(encoding='utf-8')
          parser = r'''

          export function parseMarketTimestamp(value) {
            const text = String(value || '').trim();
            if (!text) return NaN;
            let normalized = text;
            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) normalized = `${text}T00:00:00Z`;
            else if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(text)) normalized = `${text.replace(' ', 'T')}Z`;
            const timestamp = Date.parse(normalized);
            return Number.isFinite(timestamp) ? timestamp / 1000 : NaN;
          }
          '''.replace('\n          ', '\n').rstrip()
          if 'export function parseMarketTimestamp' not in market:
            market = market.replace('let lastErrorLogAt = 0;', 'let lastErrorLogAt = 0;' + parser, 1)
          market = market.replace('time: new Date(c.datetime).getTime() / 1000,', 'time: parseMarketTimestamp(c.datetime),', 1)
          market = market.replace('.filter(c => c.isClosed && Number.isFinite(c.close));', '.filter(c => c.isClosed && Number.isFinite(c.close) && Number.isFinite(c.time));', 1)
          market_path.write_text(market, encoding='utf-8')

          api_path = root / 'api/twelvedata.js'
          api = api_path.read_text(encoding='utf-8')
          if 'timezone=UTC' not in api:
            api = api.replace('outputsize=${outputsize}&apikey=${encodeURIComponent(targetKey)}', 'outputsize=${outputsize}&timezone=UTC&apikey=${encodeURIComponent(targetKey)}', 1)
          api_path.write_text(api, encoding='utf-8')

          replacements = {
            'app/build.gradle.kts': [('?: 26)', '?: 27)'), ('?: "1.4.3"', '?: "1.4.4"')],
            'app/src/main/assets/app-version.js': [("name: '1.4.3', code: 26", "name: '1.4.4', code: 27")],
            'app/src/main/assets/update-checker.js': [("name: '1.4.3', code: 26", "name: '1.4.4', code: 27"), ('|| 26', '|| 27'), ("|| '1.4.3'", "|| '1.4.4'")],
            '.github/workflows/build-apk.yml': [('AMYFX_VERSION_NAME: "1.4.3"', 'AMYFX_VERSION_NAME: "1.4.4"'), ('AMYFX_VERSION_CODE: "26"', 'AMYFX_VERSION_CODE: "27"')],
            '.github/workflows/build-release.yml': [('Version Name (e.g., 1.4.3)', 'Version Name (e.g., 1.4.4)'), ('default: "1.4.3"', 'default: "1.4.4"'), ('default: "26"', 'default: "27"')],
            'tests/profile-version-update-regression.test.mjs': [('version 1.4.3', 'version 1.4.4'), ("1\\.4\\.3", "1\\.4\\.4"), ('code: 26', 'code: 27')]
          }
          for filename, pairs in replacements.items():
            path = root / filename
            text = path.read_text(encoding='utf-8')
            for old, new in pairs:
              if old not in text: raise SystemExit(f'version marker not found in {filename}: {old}')
              text = text.replace(old, new, 1)
            path.write_text(text, encoding='utf-8')

          metadata_path = root / 'update.json'
          metadata = json.loads(metadata_path.read_text(encoding='utf-8'))
          notes = [
            'Session Focus kini menampilkan Asia High, Asia Low, ukuran range, dan posisi harga',
            'Status Asia High/Low membedakan belum disapu, sedang diuji, wick sweep, live break, dan candle close break',
            'Asia Range memakai jendela ICT 20:00–00:00 New York dengan daylight saving otomatis',
            'Halaman Analyze menampilkan Asia High/Low sebagai konteks target likuiditas yang ringkas',
            'Timestamp candle TwelveData dinormalisasi ke UTC agar batas sesi tidak bergeser mengikuti zona waktu perangkat'
          ]
          metadata['release_notes'] = notes
          metadata['changelog'] = notes
          metadata_path.write_text(json.dumps(metadata, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app api tests update.json .github/workflows/build-apk.yml .github/workflows/build-release.yml
          git commit -m "feat(mapping): add Asia high and low session levels"
          git push origin HEAD:main
