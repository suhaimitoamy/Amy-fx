name: Internal Build Validation

on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JS regression tests
        run: node --test tests/*.test.mjs

      - name: Run Android unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Run Android lint
        run: ./gradlew lintDebug --no-configuration-cache

      - name: Validate debug build only
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace
