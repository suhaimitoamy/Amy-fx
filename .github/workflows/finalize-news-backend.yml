name: Finalize News Backend

on:
  push:
    paths:
      - '.github/workflows/finalize-news-backend.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-news-backend
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch news sync source
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('supabase/functions/news-sync/handler.ts')
          source = path.read_text()

          old_constant = "const NEWS_SOURCE_PROXY = 'https://amy-fx.vercel.app/api/news';"
          new_constant = """const TELEGRAM_WEB_BASES = [
            'https://telegram.me/s',
            'https://telegram.dog/s'
          ];"""
          if old_constant not in source:
              raise RuntimeError('Expected NEWS_SOURCE_PROXY constant was not found')
          source = source.replace(old_constant, new_constant, 1)
          source = source.replace(
              "link: `https://t.me/${SOURCE}/${match[1]}`",
              "link: `https://telegram.me/${SOURCE}/${match[1]}`"
          )

          start = source.index('async function fetchSourcePosts() {')
          end = source.index('\nasync function translate(text: string)', start)
          replacement = '''async function fetchSourcePosts() {
            let lastError: unknown;

            for (const base of TELEGRAM_WEB_BASES) {
              try {
                const response = await fetchTimed(`${base}/${SOURCE}?_=${Date.now()}`, {
                  headers: {
                    Accept: 'text/html,application/xhtml+xml',
                    'User-Agent': 'Mozilla/5.0 (Linux; Android 14) AmyFX-NewsSync/1.0'
                  }
                }, 20000);
                const html = await response.text();
                if (!response.ok) {
                  throw new Error(`Telegram ${response.status}: ${html.slice(0, 300)}`);
                }

                const posts = extractPosts(html).slice(0, 50);
                if (!posts.length) throw new Error('Telegram response contained no posts');
                return posts;
              } catch (error) {
                lastError = error;
              }
            }

            const message = lastError instanceof Error ? lastError.message : String(lastError || 'unknown');
            throw new Error(`All Telegram web endpoints failed: ${message}`);
          }
          '''
          source = source[:start] + replacement + source[end:]
          path.write_text(source)

          Path('.github/workflows/sm-news-cache.yml').unlink(missing_ok=True)
          Path('.github/workflows/finalize-news-backend.yml').unlink(missing_ok=True)
          PY

      - name: Run news regression tests
        run: |
          node --check api/news.js
          node --test tests/news-relevance-regression.test.mjs

      - name: Commit final backend patch
        run: |
          git config user.name 'suhaimitoamy'
          git config user.email '34860608+suhaimitoamy@users.noreply.github.com'
          git add supabase/functions/news-sync/handler.ts tests/news-relevance-regression.test.mjs api/news.js .github/workflows
          git diff --cached --check
          git commit -m 'fix(news): fetch SM News from active Telegram domains'
          git push origin HEAD:main
