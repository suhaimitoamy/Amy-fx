name: News Test Diagnostics

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture JS test output
        id: tests
        shell: bash
        run: |
          set +e
          node --test tests/*.test.mjs > news-test-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: news-test-output
          path: news-test-output.txt

      - name: Preserve test result
        if: steps.tests.outputs.status != '0'
        run: exit 1
