name: Amy FX 1.5 Production Diagnostics

on:
  push:
    branches:
      - feature/amyfx-v1.5-full-enhancements
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: amyfx-v15-production-diagnostics
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run complete repository suite
        id: suite
        continue-on-error: true
        run: |
          set +e
          timeout 10m npm test > /tmp/amyfx-tests.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 180 /tmp/amyfx-tests.log
          exit 0
      - name: Report failure details to PR
        if: steps.suite.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Production diagnostics failed'
            echo
            echo '```text'
            tail -n 140 /tmp/amyfx-tests.log
            echo '```'
          } > /tmp/pr-comment.md
          gh pr comment 47 --repo "$GITHUB_REPOSITORY" --body-file /tmp/pr-comment.md
      - name: Enforce test result
        if: steps.suite.outputs.status != '0'
        run: exit 1
