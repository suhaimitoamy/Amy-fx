name: JavaScript Regression Tail

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/js-regression-tail.yml
      - tests/**
      - app/src/main/assets/**
      - api/**
      - lib/**
  push:
    branches:
      - feature/learning-context-stage1
    paths:
      - .github/workflows/js-regression-tail.yml
      - tests/**
      - app/src/main/assets/**
      - api/**
      - lib/**

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fetch tested commit quietly
        shell: bash
        run: |
          git init --quiet .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 --quiet origin "${GITHUB_SHA}"
          git checkout --quiet FETCH_HEAD

      - name: Run tests and print concise failure summary
        shell: bash
        run: |
          set +e
          node --test --test-reporter=spec tests/*.test.mjs > /tmp/js-regression.log 2>&1
          status=$?
          grep -E "^(✖|ℹ tests|ℹ suites|ℹ pass|ℹ fail|ℹ cancelled|ℹ skipped|ℹ todo|ℹ duration)|AssertionError|ERR_ASSERTION|not ok|error:" /tmp/js-regression.log | tail -n 80 || true
          exit "$status"
