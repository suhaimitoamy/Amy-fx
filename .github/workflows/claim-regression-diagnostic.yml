name: Claim Regression Diagnostic

on:
  push:
    branches:
      - experiment/mapping-regime-engine-20260721
    paths-ignore:
      - preview-update.json
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: claim-regression-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-js-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run full JavaScript regression and save log
        id: regression
        continue-on-error: true
        run: |
          set +e
          node --test --test-reporter=spec tests/*.test.mjs > full-js-tests.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          tail -n 120 full-js-tests.log
          exit "$status"
      - name: Upload complete regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claim-regression-log
          path: full-js-tests.log
          if-no-files-found: error
          retention-days: 3
      - name: Publish diagnostic status and run URL
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          EXIT_CODE: ${{ steps.regression.outputs.exit_code }}
        run: |
          state=success
          description='Full JavaScript regression passed'
          if [ "$EXIT_CODE" != '0' ]; then
            state=failure
            description='Full JavaScript regression failed; complete log artifact is available'
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context='Claim Regression Diagnostic' \
            -f description="$description" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Fail when regression failed
        if: steps.regression.outputs.exit_code != '0'
        run: exit 1
