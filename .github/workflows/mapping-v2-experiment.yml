name: Regime Router V3 Experiment

on:
  push:
    branches:
      - experiment/mapping-regime-engine-20260721
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: regime-router-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regime-router-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: |
          node --check app/src/main/assets/apps/mapping/js/engine/market-math.js
          node --check app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/regime-state-machine.js
          node --check app/src/main/assets/apps/mapping/js/engine/strategy-router-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/strategies/strategy-common.js
          node --check app/src/main/assets/apps/mapping/js/engine/strategies/trend-pullback-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/strategies/range-mean-reversion-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/strategies/manipulation-sweep-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/strategies/expansion-breakout-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/market-intent-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/concept-analyze.js
          node --check app/src/main/assets/apps/mapping/js/api/market-data.js
          node --check app/src/main/assets/apps/mapping/js/integrity/mapping-integrity-core.js
          node --check app/src/main/assets/apps/mapping/js/market-intent-ui.js
          node --check app/src/main/assets/apps/mapping/js/mapping-v2.js
          node --check tools/backtest-market-regime-v2.mjs
          node --check tools/backtest-shift-lag-v2.mjs

      - name: Verify regime router wiring and safety contract
        run: |
          grep -Fq 'Amy FX Preview · Regime Router' app/src/main/assets/apps/mapping/index.html
          grep -Fq 'Market Regime • Strategy Router • Market Shift' app/src/main/assets/apps/mapping/index.html
          grep -Fq 'Market sedang apa?' app/src/main/assets/apps/mapping/js/market-intent-ui.js
          grep -Fq 'MARKET HEALTH' app/src/main/assets/apps/mapping/js/market-intent-ui.js
          grep -Fq 'STRATEGY ROUTER' app/src/main/assets/apps/mapping/js/market-intent-ui.js
          grep -Fq 'NEAREST LIQUIDITY' app/src/main/assets/apps/mapping/js/market-intent-ui.js
          grep -Fq 'HTF-ALIGNED LIQUIDITY' app/src/main/assets/apps/mapping/js/market-intent-ui.js
          grep -Fq 'strategyGateEnabled: true' app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          grep -Fq 'automaticTradeExecution: false' app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          grep -Fq 'REGIME_ROUTED_M15' app/src/main/assets/apps/mapping/js/integrity/mapping-integrity-core.js
          grep -Fq 'routeRegimeStrategy' app/src/main/assets/apps/mapping/js/api/market-data.js
          ! grep -Fq 'NAIK KE BSL' app/src/main/assets/apps/mapping/js/market-intent-ui.js
          ! grep -Fq 'TURUN KE SSL' app/src/main/assets/apps/mapping/js/market-intent-ui.js

      - name: Run regime, router, liquidity and integrity tests
        run: node --test tests/market-regime-engine-v2.test.mjs tests/market-intent-engine-v3.test.mjs tests/regime-strategy-router-v3.test.mjs

  android-preview-build:
    needs: regime-router-validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
      AMYFX_KEYSTORE_PASSWORD: android
      AMYFX_KEY_ALIAS: androiddebugkey
      AMYFX_KEY_PASSWORD: android
      AMYFX_SIGNING_CERT_SHA256: "47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7"
      AMYFX_APPLICATION_ID: com.amyelitesuite.learningpreview
      AMYFX_APP_LABEL: Amy FX Preview
      AMYFX_URI_SCHEME: amyfxpreview
      AMYFX_VERSION_CODE: '90040'
      AMYFX_VERSION_NAME: 1.4.15-preview.3
      AMYFX_UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/suhaimitoamy/Amy-fx/experiment/mapping-regime-engine-20260721/preview-update.json
    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Amy FX preview signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent preview signing key
        run: |
          set -euo pipefail
          test "${{ steps.signing-cache.outputs.cache-hit }}" = "true"
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Build signed Amy FX Preview Regime Router APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-daemon --no-configuration-cache

      - name: Verify preview package, label, version and signer
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          test -f "$APK"
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$AAPT" dump badging "$APK" | tee /tmp/preview-badging.txt
          grep -Fq "package: name='com.amyelitesuite.learningpreview' versionCode='90040' versionName='1.4.15-preview.3'" /tmp/preview-badging.txt
          grep -Fq "application-label:'Amy FX Preview'" /tmp/preview-badging.txt
          "$APKSIGNER" verify --verbose "$APK"
          cert_entry="$(unzip -Z1 "$APK" | grep -E '^META-INF/[^/]+\.(RSA|DSA|EC)$' | head -n1)"
          test -n "$cert_entry"
          unzip -p "$APK" "$cert_entry" > /tmp/amyfx-preview-cert
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(keytool -printcert -file /tmp/amyfx-preview-cert | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test "$actual" = "$expected"
          cp "$APK" AmyFX-Preview-RegimeRouterV3.apk

      - name: Upload signed Amy FX Preview APK
        uses: actions/upload-artifact@v4
        with:
          name: AmyFX-Preview-RegimeRouterV3-v1.4.15-preview.3
          path: AmyFX-Preview-RegimeRouterV3.apk
          if-no-files-found: error
          retention-days: 14

  report-status:
    if: always()
    needs:
      - regime-router-validation
      - android-preview-build
    runs-on: ubuntu-latest
    steps:
      - name: Publish combined experiment status
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_RESULT: ${{ needs.regime-router-validation.result }}
          BUILD_RESULT: ${{ needs.android-preview-build.result }}
        run: |
          state=success
          description='Regime Router V3 passed; signed Amy FX Preview APK is ready'
          if [ "$VALIDATION_RESULT" != 'success' ] || [ "$BUILD_RESULT" != 'success' ]; then
            state=failure
            description="Regime Router V3 failed: validation=$VALIDATION_RESULT preview=$BUILD_RESULT"
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context='Regime Router V3 Experiment' \
            -f description="$description" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
