name: Mapping V2 Experiment

on:
  push:
    branches:
      - experiment/mapping-regime-engine-20260721
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: mapping-v2-experiment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mapping-v2-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: |
          node --check app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          node --check app/src/main/assets/apps/mapping/js/mapping-v2.js
          node --check tools/backtest-market-regime-v2.mjs
          node --check tools/backtest-shift-lag-v2.mjs

      - name: Verify Mapping V2 wiring and safety contract
        run: |
          grep -Fq 'css/mapping-v2.css' app/src/main/assets/apps/mapping/index.html
          grep -Fq 'js/mapping-v2.js' app/src/main/assets/apps/mapping/index.html
          grep -Fq 'executionGateEnabled:!1' app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          grep -Fq 'action:"WAIT",advisoryAction:' app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          grep -Fq 'EXPERIMENTAL · CONTEXT ONLY' app/src/main/assets/apps/mapping/js/mapping-v2.js
          grep -Fq 'executionGateEnabled&&n?.shift?.blockRecommended' app/src/main/assets/apps/mapping/js/mapping-v2.js
          grep -Fq '"M15"!==String(n.tf||"").toUpperCase()' app/src/main/assets/apps/mapping/js/mapping-v2.js
          ! grep -Fq 'if(n?.shift?.blockRecommended)' app/src/main/assets/apps/mapping/js/mapping-v2.js

      - name: Run regime safety tests
        run: node --test tests/market-regime-engine-v2.test.mjs

  android-preview-build:
    needs: mapping-v2-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AMYFX_APPLICATION_ID: com.amyelitesuite.learningpreview
      AMYFX_APP_LABEL: Amy FX Preview
      AMYFX_URI_SCHEME: amyfxpreview
      AMYFX_VERSION_CODE: '90038'
      AMYFX_VERSION_NAME: 1.4.15-preview
      AMYFX_UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/suhaimitoamy/Amy-fx/main/update.json
    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Amy FX Preview APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Verify preview identity
        shell: bash
        run: |
          APK='app/build/outputs/apk/debug/app-debug.apk'
          test -f "$APK"
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          test -x "$AAPT"
          "$AAPT" dump badging "$APK" | tee /tmp/preview-badging.txt
          grep -Fq "package: name='com.amyelitesuite.learningpreview'" /tmp/preview-badging.txt
          grep -Fq "application-label:'Amy FX Preview'" /tmp/preview-badging.txt
          cp "$APK" AmyFX-Preview-MappingV2.apk

      - name: Upload Amy FX Preview APK
        uses: actions/upload-artifact@v4
        with:
          name: AmyFX-Preview-MappingV2
          path: AmyFX-Preview-MappingV2.apk
          if-no-files-found: error
          retention-days: 14

  report-status:
    if: always()
    needs:
      - mapping-v2-validation
      - android-preview-build
    runs-on: ubuntu-latest
    steps:
      - name: Publish combined experiment status
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_RESULT: ${{ needs.mapping-v2-validation.result }}
          BUILD_RESULT: ${{ needs.android-preview-build.result }}
        run: |
          state=success
          description='Mapping V2 passed; Amy FX Preview APK is ready'
          if [ "$VALIDATION_RESULT" != 'success' ] || [ "$BUILD_RESULT" != 'success' ]; then
            state=failure
            description="Mapping V2 failed: validation=$VALIDATION_RESULT preview=$BUILD_RESULT"
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context='Mapping V2 Experiment' \
            -f description="$description" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
