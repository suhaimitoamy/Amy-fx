name: Mapping V2 Experiment

on:
  push:
    branches:
      - experiment/mapping-regime-engine-20260721
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: mapping-v2-experiment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mapping-v2-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: |
          node --check app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          node --check app/src/main/assets/apps/mapping/js/mapping-v2.js
          node --check tools/backtest-market-regime-v2.mjs
          node --check tools/backtest-shift-lag-v2.mjs

      - name: Verify Mapping V2 wiring and safety contract
        run: |
          grep -Fq 'css/mapping-v2.css' app/src/main/assets/apps/mapping/index.html
          grep -Fq 'js/mapping-v2.js' app/src/main/assets/apps/mapping/index.html
          grep -Fq 'executionGateEnabled:!1' app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          grep -Fq 'action:"WAIT",advisoryAction:' app/src/main/assets/apps/mapping/js/engine/market-regime-engine.js
          grep -Fq 'EXPERIMENTAL · CONTEXT ONLY' app/src/main/assets/apps/mapping/js/mapping-v2.js
          grep -Fq 'executionGateEnabled&&n?.shift?.blockRecommended' app/src/main/assets/apps/mapping/js/mapping-v2.js
          grep -Fq '"M15"!==String(n.tf||"").toUpperCase()' app/src/main/assets/apps/mapping/js/mapping-v2.js
          ! grep -Fq 'if(n?.shift?.blockRecommended)' app/src/main/assets/apps/mapping/js/mapping-v2.js

      - name: Run regime safety tests
        run: node --test tests/market-regime-engine-v2.test.mjs

  android-debug-build:
    needs: mapping-v2-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Android debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

  report-status:
    if: always()
    needs:
      - mapping-v2-validation
      - android-debug-build
    runs-on: ubuntu-latest
    steps:
      - name: Publish combined experiment status
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATION_RESULT: ${{ needs.mapping-v2-validation.result }}
          BUILD_RESULT: ${{ needs.android-debug-build.result }}
        run: |
          state=success
          description='Mapping V2 tests and Android debug build passed'
          if [ "$VALIDATION_RESULT" != 'success' ] || [ "$BUILD_RESULT" != 'success' ]; then
            state=failure
            description="Mapping V2 failed: validation=$VALIDATION_RESULT build=$BUILD_RESULT"
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context='Mapping V2 Experiment' \
            -f description="$description" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
