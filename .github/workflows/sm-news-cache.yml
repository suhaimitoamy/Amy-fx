name: SM News Cache

on:
  push:
    paths:
      - '.github/workflows/sm-news-cache.yml'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: sm-news-cache
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Fetch SM News and refresh issue cache
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          CACHE_ISSUE: '28'
        run: |
          python3 - <<'PY'
          import datetime
          import html
          import json
          import os
          import re
          import time
          import urllib.request

          source = 'SM_News_24h'
          source_url = f'https://t.me/s/{source}?_={int(time.time() * 1000)}'
          request = urllib.request.Request(
              source_url,
              headers={'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AmyFX-NewsCache/1.0'}
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              page = response.read().decode('utf-8', errors='replace')

          pattern = re.compile(
              r'data-post="SM_News_24h/(\d+)"[\s\S]*?'
              r'<div class="tgme_widget_message_text[^"]*"[^>]*>([\s\S]*?)</div>\s*'
              r'(?:<div class="tgme_widget_message_author|<div class="tgme_widget_message_footer)',
              re.IGNORECASE,
          )

          posts = []
          for match in pattern.finditer(page):
              text = re.sub(r'<br\s*/?>', '\n', match.group(2), flags=re.IGNORECASE)
              text = re.sub(r'<[^>]+>', '', text)
              text = html.unescape(text)
              text = re.sub(r'\n{3,}', '\n\n', text).strip()
              if len(text) < 20:
                  continue

              block = page[match.start():min(len(page), match.end() + 1600)]
              time_match = re.search(r'datetime="([^"]+)"', block)
              if not time_match:
                  before = page[max(0, match.start() - 700):match.start()]
                  time_match = re.search(r'datetime="([^"]+)"', before)

              post_id = match.group(1)
              posts.append({
                  'id': post_id,
                  'text': text,
                  'textOriginal': text,
                  'time': time_match.group(1) if time_match else '',
                  'link': f'https://t.me/{source}/{post_id}',
              })

          posts.sort(key=lambda item: int(item['id']), reverse=True)
          if not posts:
              raise RuntimeError('Telegram page contained no extractable posts')

          updated = datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00', 'Z')
          selected = []
          for post in posts:
              trial = selected + [post]
              payload = {
                  'source': source,
                  'updated': updated,
                  'count': len(trial),
                  'news': trial,
                  'backend': 'github_actions_cache',
              }
              body = '<!-- amyfx-sm-news-cache-v1 -->\n```json\n' + json.dumps(
                  payload, ensure_ascii=False, separators=(',', ':')
              ) + '\n```'
              if len(body.encode('utf-8')) > 60000:
                  break
              selected = trial

          if not selected:
              raise RuntimeError('No posts fit inside the GitHub issue cache')

          payload = {
              'source': source,
              'updated': updated,
              'count': len(selected),
              'news': selected,
              'backend': 'github_actions_cache',
          }
          body = '<!-- amyfx-sm-news-cache-v1 -->\n```json\n' + json.dumps(
              payload, ensure_ascii=False, separators=(',', ':')
          ) + '\n```'

          repository = os.environ['GH_REPOSITORY']
          issue = os.environ['CACHE_ISSUE']
          token = os.environ['GH_TOKEN']
          api_url = f'https://api.github.com/repos/{repository}/issues/{issue}'
          update = urllib.request.Request(
              api_url,
              data=json.dumps({'body': body}).encode('utf-8'),
              method='PATCH',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
                  'User-Agent': 'AmyFX-NewsCache/1.0',
              },
          )
          with urllib.request.urlopen(update, timeout=30) as response:
              if response.status != 200:
                  raise RuntimeError(f'GitHub issue update returned HTTP {response.status}')

          print(f'Cached {len(selected)} SM News posts in issue #{issue}')
          PY
