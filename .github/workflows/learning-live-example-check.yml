name: Academy Inline Live Example Check

on:
  pull_request:
    branches:
      - main
    paths:
      - api/learning-live-example.js
      - lib/learning-live-engine.js
      - lib/learning-topic-router.js
      - app/src/main/assets/apps/academy/assets/data/market-learning-map.json
      - app/src/main/assets/apps/academy/assets/js/market-learning-bridge.js
      - tests/market-learning-live-examples.test.mjs
      - tests/learning-live-engine.test.mjs
      - .github/workflows/learning-live-example-check.yml
  push:
    branches:
      - feature/learning-context-stage1
    paths:
      - api/learning-live-example.js
      - lib/learning-live-engine.js
      - lib/learning-topic-router.js
      - app/src/main/assets/apps/academy/assets/data/market-learning-map.json
      - app/src/main/assets/apps/academy/assets/js/market-learning-bridge.js
      - tests/market-learning-live-examples.test.mjs
      - tests/learning-live-engine.test.mjs
      - .github/workflows/learning-live-example-check.yml

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AMYFX_VERSION_CODE: '36'
      AMYFX_VERSION_NAME: '1.4.13-learning-test'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate JavaScript syntax
        run: |
          node --check api/learning-live-example.js
          node --check lib/learning-live-engine.js
          node --check lib/learning-topic-router.js
          node --check app/src/main/assets/apps/academy/assets/js/market-learning-bridge.js

      - name: Run topic router and inline UI regression
        run: |
          node --test --test-reporter=spec \
            tests/market-learning-live-examples.test.mjs \
            tests/learning-live-engine.test.mjs

      - name: Run Android unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug update candidate
        run: ./gradlew assembleDebug signingReport --stacktrace

      - name: Upload debug update candidate
        uses: actions/upload-artifact@v4
        with:
          name: amy-fx-learning-context-debug-update-candidate
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
