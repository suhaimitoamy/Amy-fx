name: Academy Inline Live Example Check

on:
  pull_request:
    branches:
      - main
    paths:
      - app/src/main/assets/apps/academy/assets/data/market-learning-map.json
      - app/src/main/assets/apps/academy/assets/js/market-learning-bridge.js
      - tests/market-learning-live-examples.test.mjs
      - .github/workflows/learning-live-example-check.yml
  push:
    branches:
      - feature/learning-context-stage1
    paths:
      - app/src/main/assets/apps/academy/assets/data/market-learning-map.json
      - app/src/main/assets/apps/academy/assets/js/market-learning-bridge.js
      - tests/market-learning-live-examples.test.mjs
      - .github/workflows/learning-live-example-check.yml

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate bridge syntax
        run: node --check app/src/main/assets/apps/academy/assets/js/market-learning-bridge.js

      - name: Run inline live-example regression
        run: node --test --test-reporter=spec tests/market-learning-live-examples.test.mjs

      - name: Run Android unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
