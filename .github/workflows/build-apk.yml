name: Build and Publish Amy FX APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "update.json"
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AMYFX_KEYSTORE_PATH: ${{ runner.temp }}/amy-fx-signing.keystore
      AMYFX_KEYSTORE_PASSWORD: android
      AMYFX_KEY_ALIAS: androiddebugkey
      AMYFX_KEY_PASSWORD: android
      AMYFX_VERSION_NAME: "1.3.1"
      AMYFX_VERSION_CODE: "14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Amy FX signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent signing key
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Permanent Amy FX signing key tidak ditemukan. Build dihentikan agar tanda tangan aplikasi tidak berubah."
            exit 1
          fi
          test -f "$HOME/.android/debug.keystore"
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          keytool -list -keystore "$AMYFX_KEYSTORE_PATH" -storepass android -alias androiddebugkey >/dev/null

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JS regression tests
        run: node --test tests/*.test.mjs

      - name: Run Android unit tests
        run: ./gradlew testReleaseUnitTest --no-configuration-cache

      - name: Run Android lint
        run: ./gradlew lintRelease --no-configuration-cache

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Prepare and verify rolling APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/AmyFX-latest.apk
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs dist/AmyFX-latest.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v1.3.1-signed-apk
          path: dist/AmyFX-latest.apk

      - name: Publish rolling in-app update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f amyfx-latest "$GITHUB_SHA"
          git push origin refs/tags/amyfx-latest --force

          if gh release view amyfx-latest >/dev/null 2>&1; then
            gh release edit amyfx-latest \
              --title "Amy FX Latest — v${AMYFX_VERSION_NAME}" \
              --notes "APK resmi Amy FX untuk update langsung tanpa uninstall. Version code ${AMYFX_VERSION_CODE}."
          else
            gh release create amyfx-latest \
              --title "Amy FX Latest — v${AMYFX_VERSION_NAME}" \
              --notes "APK resmi Amy FX untuk update langsung tanpa uninstall. Version code ${AMYFX_VERSION_CODE}." \
              --latest
          fi

          gh release upload amyfx-latest dist/AmyFX-latest.apk --clobber
