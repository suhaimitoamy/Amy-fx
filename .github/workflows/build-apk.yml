name: Build and Publish Amy FX APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "update.json"

permissions:
  contents: write

concurrency:
  group: amyfx-main-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
      AMYFX_KEYSTORE_PASSWORD: android
      AMYFX_KEY_ALIAS: androiddebugkey
      AMYFX_KEY_PASSWORD: android
      AMYFX_VERSION_NAME: "1.4.16"
      AMYFX_VERSION_CODE: "39"
      AMYFX_SIGNING_CERT_SHA256: "47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Amy FX signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent signing key
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Permanent Amy FX signing key tidak ditemukan. Build dihentikan agar tanda tangan aplikasi tidak berubah."
            exit 1
          fi
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JavaScript regression tests
        run: |
          set +e
          mkdir -p dist
          : > dist/js-test-report.txt
          failed=0
          for test_file in tests/*.test.mjs; do
            echo "===== ${test_file} =====" | tee -a dist/js-test-report.txt
            if node --test "$test_file" >> dist/js-test-report.txt 2>&1; then
              echo "PASS ${test_file}" | tee -a dist/js-test-report.txt
            else
              echo "FAIL ${test_file}" | tee -a dist/js-test-report.txt
              echo "::error file=${test_file}::JavaScript regression test failed"
              failed=1
            fi
            echo | tee -a dist/js-test-report.txt
          done
          cat dist/js-test-report.txt
          exit "$failed"

      - name: Upload JavaScript test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-JavaScript-test-report
          path: dist/js-test-report.txt
          if-no-files-found: error

      - name: Run Android unit tests
        run: ./gradlew testReleaseUnitTest --no-configuration-cache

      - name: Run Android lint
        run: ./gradlew lintRelease --no-configuration-cache

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Verify APK identity, version, signing structures and signer
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$apk" | grep -F "package: name='com.amyelitesuite' versionCode='${AMYFX_VERSION_CODE}' versionName='${AMYFX_VERSION_NAME}'"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose "$apk"
          sf_entry="$(unzip -Z1 "$apk" | grep -E '^META-INF/[^/]+\.SF$' | head -n1)"
          cert_entry="$(unzip -Z1 "$apk" | grep -E '^META-INF/[^/]+\.(RSA|DSA|EC)$' | head -n1)"
          test -n "$sf_entry"
          test -n "$cert_entry"
          unzip -p "$apk" "$cert_entry" > /tmp/amyfx-apk-cert
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(keytool -printcert -file /tmp/amyfx-apk-cert | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test -n "$actual"
          test "$actual" = "$expected"
          APK_PATH="$apk" python3 - <<'PY'
          import os
          import struct
          data = open(os.environ["APK_PATH"], "rb").read()
          index = data.rfind(b"APK Sig Block 42")
          if index < 0:
              raise SystemExit("APK Signing Block tidak ditemukan")
          size = struct.unpack_from("<Q", data, index - 8)[0]
          start = index + 8 - size
          if start < 0 or struct.unpack_from("<Q", data, start)[0] != size:
              raise SystemExit("APK Signing Block tidak valid")
          position, end, ids = start + 8, index - 8, set()
          while position < end:
              length = struct.unpack_from("<Q", data, position)[0]
              position += 8
              if length < 4 or position + length > end:
                  raise SystemExit("Pasangan APK Signing Block rusak")
              ids.add(struct.unpack_from("<I", data, position)[0])
              position += length
          if 0x7109871A not in ids:
              raise SystemExit("APK Signature Scheme v2 tidak ditemukan")
          PY

      - name: Prepare rolling APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/AmyFX-latest.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v${{ env.AMYFX_VERSION_NAME }}-signed-apk
          path: dist/AmyFX-latest.apk

      - name: Publish rolling in-app update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f amyfx-latest "$GITHUB_SHA"
          git push origin refs/tags/amyfx-latest --force

          release_notes="Amy FX 1.4.16 mempromosikan Mapping Regime Engine dari branch experiment/mapping-regime-engine-20260721 ke aplikasi produksi. Package com.amyelitesuite dan sertifikat permanen tetap dipertahankan agar dapat dipasang sebagai pembaruan."
          if gh release view amyfx-latest >/dev/null 2>&1; then
            gh release edit amyfx-latest \
              --title "Amy FX Latest — v${AMYFX_VERSION_NAME}" \
              --notes "$release_notes" \
              --latest
          else
            gh release create amyfx-latest \
              --title "Amy FX Latest — v${AMYFX_VERSION_NAME}" \
              --notes "$release_notes" \
              --latest
          fi

          gh release upload amyfx-latest dist/AmyFX-latest.apk --clobber

      - name: Activate update only after APK is published
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B release-metadata origin/main

          python3 - <<'PY'
          import json
          import os
          from datetime import date
          from pathlib import Path

          path = Path("update.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          version_name = os.environ["AMYFX_VERSION_NAME"].strip()
          version_code = int(os.environ["AMYFX_VERSION_CODE"])
          notes = [
              "Mapping Regime Engine V3 dan Strategy Router dipromosikan ke Amy FX produksi",
              "Tampilan Mapping, Market Health, Market Shift, dan keputusan M15 diperbarui",
              "Pemeriksaan pembaruan melewati cache dan tersedia melalui tombol Cek Pembaruan Versi",
              "Package com.amyelitesuite dan sertifikat permanen tetap dipertahankan",
              "Pembaruan dapat dipasang tanpa menghapus aplikasi dan tanpa menghilangkan data lokal"
          ]

          data.update({
              "latest_version_code": version_code,
              "latest_version_name": version_name,
              "versionCode": version_code,
              "version": version_name,
              "releaseDate": date.today().isoformat(),
              "apk_url": "https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-latest/AmyFX-latest.apk",
              "downloadUrl": "https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-latest/AmyFX-latest.apk",
              "force_update": False,
              "mandatory": False,
              "release_notes": notes,
              "changelog": notes,
          })
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          git add update.json
          if git diff --cached --quiet; then
            echo "update.json sudah sesuai versi ${AMYFX_VERSION_NAME}."
            exit 0
          fi

          git commit -m "release: activate Amy FX ${AMYFX_VERSION_NAME} in-app update"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push metadata gagal pada percobaan ${attempt}; menyelaraskan ulang main."
            git fetch origin main
            git rebase origin/main
          done
          echo "Gagal mengaktifkan metadata update setelah tiga percobaan."
          exit 1
