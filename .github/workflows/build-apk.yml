name: Build Amy FX APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-debug-apk
          path: app/build/outputs/apk/debug/*.apk
