name: Build and Publish Amy FX APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "update.json"
      - "README.md"
      - "*.md"
      - "docs/**"

permissions:
  contents: write
  statuses: write

concurrency:
  group: amyfx-main-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AMYFX_APPLICATION_ID: com.amyelitesuite
      AMYFX_APP_LABEL: Amy FX
      AMYFX_URI_SCHEME: amyfx
      AMYFX_UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/suhaimitoamy/Amy-fx/main/update.json
      AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
      AMYFX_KEYSTORE_PASSWORD: android
      AMYFX_KEY_ALIAS: androiddebugkey
      AMYFX_KEY_PASSWORD: android
      AMYFX_VERSION_NAME: "1.5.4"
      AMYFX_VERSION_CODE: "45"
      AMYFX_SIGNING_CERT_SHA256: "47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7"

    steps:
      - name: Mark production release pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state='pending' \
            -f context='Amy FX Production Release' \
            -f description='Testing and building signed Amy FX 1.5.4' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Amy FX production identity
        run: |
          set -euo pipefail
          node --check app/src/main/assets/apps/mapping/js/production-branding.js
          node --check app/src/main/assets/apps/mapping/js/notification-route-sync.js
          node --check app/src/main/assets/apps/mapping/js/api-request-coordinator.js
          node --check app/src/main/assets/apps/mapping/js/view-stability.js
          node --check app/src/main/assets/apps/mapping/js/entry-watch-runtime-v2.js
          node --check app/src/main/assets/apps/mapping/js/market-outlook.js
          node --check app/src/main/assets/apps/mapping/js/outlook/amy-market-context-final-core.js
          node --check app/src/main/assets/update-checker.js
          grep -Fq '<title>Amy FX · Market Intelligence</title>' app/src/main/assets/apps/mapping/index.html
          ! grep -Fq 'Amy FX Preview' app/src/main/assets/apps/mapping/index.html
          ! grep -Fq 'UPDATE · AMY FX v1.5 PREVIEW' app/src/main/assets/apps/mapping/js/main.js
          grep -Fq "name: '1.5.4', code: 45" app/src/main/assets/app-version.js
          grep -Fq '?: 45)' app/build.gradle.kts
          grep -Fq '?: "1.5.4"' app/build.gradle.kts
          grep -Fq 'com.amyelitesuite' app/build.gradle.kts
          grep -Fq 'main/update.json' app/build.gradle.kts
          grep -Fq 'cache: '\''no-store'\''' app/src/main/assets/update-checker.js

      - name: Run complete JavaScript regression suite
        run: timeout 10m npm test

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Amy FX signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent signing key
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Permanent Amy FX signing key tidak ditemukan. Build dihentikan agar tanda tangan aplikasi tidak berubah."
            exit 1
          fi
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew testReleaseUnitTest --no-configuration-cache

      - name: Run Android lint
        run: ./gradlew lintRelease --no-configuration-cache

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Verify APK identity, version, signing structures and signer
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          aapt="$ANDROID_HOME/build-tools/35.0.0/aapt"
          apksigner="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -s "$apk"
          "$aapt" dump badging "$apk" | tee /tmp/amyfx-badging.txt
          grep -Fq "package: name='${AMYFX_APPLICATION_ID}' versionCode='${AMYFX_VERSION_CODE}' versionName='${AMYFX_VERSION_NAME}'" /tmp/amyfx-badging.txt
          grep -Fq "application-label:'${AMYFX_APP_LABEL}'" /tmp/amyfx-badging.txt
          "$apksigner" verify --verbose "$apk"
          sf_entry="$(unzip -Z1 "$apk" | grep -E '^META-INF/[^/]+\.SF$' | head -n1)"
          cert_entry="$(unzip -Z1 "$apk" | grep -E '^META-INF/[^/]+\.(RSA|DSA|EC)$' | head -n1)"
          test -n "$sf_entry"
          test -n "$cert_entry"
          unzip -p "$apk" "$cert_entry" > /tmp/amyfx-apk-cert
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(keytool -printcert -file /tmp/amyfx-apk-cert | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test -n "$actual"
          test "$actual" = "$expected"
          APK_PATH="$apk" python3 - <<'PY'
          import os
          import struct
          data = open(os.environ["APK_PATH"], "rb").read()
          index = data.rfind(b"APK Sig Block 42")
          if index < 0:
              raise SystemExit("APK Signing Block tidak ditemukan")
          size = struct.unpack_from("<Q", data, index - 8)[0]
          start = index + 8 - size
          if start < 0 or struct.unpack_from("<Q", data, start)[0] != size:
              raise SystemExit("APK Signing Block tidak valid")
          position, end, ids = start + 8, index - 8, set()
          while position < end:
              length = struct.unpack_from("<Q", data, position)[0]
              position += 8
              if length < 4 or position + length > end:
                  raise SystemExit("Pasangan APK Signing Block rusak")
              ids.add(struct.unpack_from("<I", data, position)[0])
              position += length
          if 0x7109871A not in ids:
              raise SystemExit("APK Signature Scheme v2 tidak ditemukan")
          PY
          mkdir -p dist
          cp "$apk" dist/AmyFX-latest.apk

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v${{ env.AMYFX_VERSION_NAME }}-signed-apk
          path: dist/AmyFX-latest.apk
          if-no-files-found: error

      - name: Publish rolling production APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f amyfx-latest "$GITHUB_SHA"
          git push origin refs/tags/amyfx-latest --force

          release_notes="Blok tombol timeframe pada halaman Analisis telah dihapus. Urutan halaman Analisis diperbaiki menjadi: Header harga/status, Asia Liquidity, Market Outlook, Ringkasan Market, Valid Break, Mapping M1–H4, Penjelasan Mapping, Setup Aktif."
          if gh release view amyfx-latest >/dev/null 2>&1; then
            gh release edit amyfx-latest \
              --title "Amy FX Latest — v${AMYFX_VERSION_NAME}" \
              --notes "$release_notes" \
              --latest
          else
            gh release create amyfx-latest \
              --title "Amy FX Latest — v${AMYFX_VERSION_NAME}" \
              --notes "$release_notes" \
              --latest
          fi
          gh release upload amyfx-latest dist/AmyFX-latest.apk --clobber
          gh release view amyfx-latest --json assets --jq '.assets[].name' | grep -Fx 'AmyFX-latest.apk'

      - name: Activate update after APK publication
        run: |
          set -euo pipefail
          export RELEASE_DATE="$(date -u +%F)"
          cat > /tmp/amyfx-update.py <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('update.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          notes = [
              'Blok tombol timeframe pada halaman Analisis telah dihapus.',
              'Urutan halaman Analisis diperbaiki menjadi:',
              'Header harga/status',
              'Asia Liquidity',
              'Market Outlook',
              'Ringkasan Market',
              'Valid Break',
              'Mapping M1–H4',
              'Penjelasan Mapping',
              'Setup Aktif'
          ]
          data.update({
              'latest_version_code': 45,
              'latest_version_name': '1.5.4',
              'versionCode': 45,
              'version': '1.5.4',
              'releaseDate': os.environ['RELEASE_DATE'],
              'apk_url': 'https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-latest/AmyFX-latest.apk',
              'downloadUrl': 'https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-latest/AmyFX-latest.apk',
              'force_update': False,
              'mandatory': False,
              'release_notes': notes,
              'changelog': notes,
          })
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4; do
            git fetch origin main
            git checkout -B release-metadata origin/main
            RELEASE_DATE="$RELEASE_DATE" python3 /tmp/amyfx-update.py
            python3 -m json.tool update.json >/dev/null
            git add update.json
            if git diff --cached --quiet; then
              echo "update.json sudah sesuai Amy FX 1.5.4."
              exit 0
            fi
            git commit -m "release: activate Amy FX 1.5.4 in-app update [skip ci]"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push metadata gagal pada percobaan $attempt; menyelaraskan ulang main."
            sleep 2
          done
          echo "Gagal mengaktifkan metadata update setelah empat percobaan."
          exit 1

      - name: Verify public update manifest source
        run: |
          set -euo pipefail
          git fetch origin main
          manifest="$(git show origin/main:update.json)"
          printf '%s\n' "$manifest" | grep -F '"latest_version_code": 45'
          printf '%s\n' "$manifest" | grep -F '"latest_version_name": "1.5.4"'

  report-status:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish production release status
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          state=success
          description='Amy FX 1.5.4 published and update activated'
          if [ "$BUILD_RESULT" != 'success' ]; then
            state=failure
            description="Amy FX 1.5.4 production release failed: $BUILD_RESULT"
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context='Amy FX Production Release' \
            -f description="$description" \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
