name: Build Amy FX APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Amy FX
        uses: actions/checkout@v4

      - name: Checkout Academy Vault
        uses: actions/checkout@v4
        with:
          repository: suhaimitoamy/amy-trading-academy-vault
          path: _academy_vault
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Academy generator dependencies
        run: python -m pip install --disable-pip-version-check pyyaml mistune beautifulsoup4

      - name: Generate privacy-filtered connected Academy
        run: |
          python scripts/generate_connected_academy.py \
            --vault _academy_vault \
            --academy app/src/main/assets/apps/academy

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Create Android debug keystore if missing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -storetype JKS \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-debug-apk
          path: app/build/outputs/apk/debug/*.apk
