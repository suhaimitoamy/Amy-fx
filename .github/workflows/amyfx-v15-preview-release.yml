name: Publish Amy FX v1.5 Preview Update

on:
  push:
    branches:
      - feature/amyfx-v1.5-full-enhancements
    paths:
      - app/src/main/assets/apps/mapping/**
      - tests/entry-watch-engine.test.mjs
      - docs/MULTI_TF_ENTRY_WATCH.md
      - .github/workflows/amyfx-v15-preview-release.yml
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: amyfx-v15-preview-release
  cancel-in-progress: true

env:
  AMYFX_VERSION_NAME: 1.5.0-preview.4
  AMYFX_VERSION_CODE: '90054'
  AMYFX_APPLICATION_ID: com.amyelitesuite.learningpreview
  AMYFX_APP_LABEL: Amy FX Preview
  AMYFX_URI_SCHEME: amyfxpreview
  AMYFX_UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/suhaimitoamy/Amy-fx/feature/amyfx-v1.5-full-enhancements/preview-update.json
  AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
  AMYFX_KEYSTORE_PASSWORD: android
  AMYFX_KEY_ALIAS: androiddebugkey
  AMYFX_KEY_PASSWORD: android
  AMYFX_SIGNING_CERT_SHA256: '47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7'

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mark authoritative Preview release pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state='pending' \
            -f context='Amy FX v1.5 Authoritative Preview' \
            -f description='Building signed Preview 1.5.0-preview.4' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Checkout v1.5 feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Entry Watch and updater
        run: |
          set -euo pipefail
          node --check app/src/main/assets/apps/mapping/js/engine/entry-watch-engine.js
          node --check app/src/main/assets/apps/mapping/js/entry-watch-runtime.js
          node --check app/src/main/assets/apps/mapping/js/engine/concept-analyze.js
          node --test tests/entry-watch-engine.test.mjs
          node tools/configure-preview-web-version.mjs "$AMYFX_VERSION_NAME" "$AMYFX_VERSION_CODE" "$AMYFX_UPDATE_MANIFEST_URL"
          node --check app/src/main/assets/app-version.js
          node --check app/src/main/assets/update-checker.js
          grep -Fq "name: '$AMYFX_VERSION_NAME', code: $AMYFX_VERSION_CODE" app/src/main/assets/app-version.js
          grep -Fq "window.AmyFXUpdateManifestUrl = '$AMYFX_UPDATE_MANIFEST_URL';" app/src/main/assets/app-version.js
          grep -Fq 'Update Amy FX Preview Tersedia' app/src/main/assets/update-checker.js
          grep -Fq 'announceNativeUpdate(latestCode, latestName);' app/src/main/assets/update-checker.js
          node --test tests/preview-updater-config.test.mjs

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Restore permanent Preview signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent Preview signing key
        run: |
          set -euo pipefail
          test "${{ steps.signing-cache.outputs.cache-hit }}" = 'true'
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Build signed Amy FX Preview
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-daemon --no-configuration-cache

      - name: Verify APK identity, version and signer
        run: |
          set -euo pipefail
          APK='app/build/outputs/apk/release/app-release.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee /tmp/preview-badging.txt
          grep -Fq "package: name='$AMYFX_APPLICATION_ID' versionCode='$AMYFX_VERSION_CODE' versionName='$AMYFX_VERSION_NAME'" /tmp/preview-badging.txt
          grep -Fq "application-label:'$AMYFX_APP_LABEL'" /tmp/preview-badging.txt
          "$APKSIGNER" verify --verbose "$APK"
          cert_entry="$(unzip -Z1 "$APK" | grep -E '^META-INF/[^/]+\.(RSA|DSA|EC)$' | head -n1)"
          test -n "$cert_entry"
          unzip -p "$APK" "$cert_entry" > /tmp/amyfx-preview-cert
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(keytool -printcert -file /tmp/amyfx-preview-cert | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test "$actual" = "$expected"
          cp "$APK" AmyFX-Preview-latest.apk

      - name: Publish Preview APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG='amyfx-preview-v1.5.0-preview.4'
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
          fi
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" >/dev/null 2>&1 || true
          cat > /tmp/release-notes.md <<'NOTES'
          Amy FX Preview 1.5.0-preview.4 — Honest Entry Watch Update.

          - Dapat dipasang sebagai update dari Amy FX Preview yang sudah ada.
          - Package ID dan sertifikat signing tetap sama.
          - Level wajib melewati fase PANTAU sebelum entry.
          - Hidden break direkonsiliasi dan level mati tidak dapat hidup kembali.
          - Satu level hanya menghasilkan satu entry lalu ENTRY_SPENT.
          NOTES
          gh release create "$TAG" \
            "AmyFX-Preview-latest.apk#AmyFX-Preview-latest.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title 'Amy FX Preview 1.5.0-preview.4 — Honest Entry Watch Update' \
            --notes-file /tmp/release-notes.md
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | grep -Fx 'AmyFX-Preview-latest.apk'

      - name: Activate update for all installed Preview channels
        run: |
          set -euo pipefail
          git reset --hard HEAD
          cat > preview-update.json <<'JSON'
          {
            "channel": "amyfx-preview-professional-ui",
            "latest_version_code": 90054,
            "latest_version_name": "1.5.0-preview.4",
            "versionCode": 90054,
            "version": "1.5.0-preview.4",
            "releaseDate": "2026-07-23",
            "apk_url": "https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-preview-v1.5.0-preview.4/AmyFX-Preview-latest.apk",
            "downloadUrl": "https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-preview-v1.5.0-preview.4/AmyFX-Preview-latest.apk",
            "force_update": false,
            "mandatory": false,
            "enabled": true,
            "release_notes": [
              "Update Preview tersedia langsung dari aplikasi yang sudah terpasang",
              "Level wajib melewati fase PANTAU sebelum entry",
              "Hidden break direkonsiliasi ketika Direction Forecast pause",
              "Level yang keluar detector menjadi LEVEL_RETIRED",
              "Satu level hanya menghasilkan satu entry lalu ENTRY_SPENT",
              "Level asli dan hasil konversi memiliki expiry eksplisit"
            ],
            "changelog": [
              "Unified in-app update channel",
              "Entry Watch Engine 1.1 causal replay",
              "FORECAST_PAUSED reconciliation",
              "LEVEL_RETIRED and LEVEL_EXPIRED lifecycle",
              "ENTRY_SPENT single-entry lock",
              "Eleven automated lifecycle contract tests",
              "2022–2025 post-fix honesty verification"
            ]
          }
          JSON
          python -m json.tool preview-update.json >/dev/null
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add preview-update.json
          if ! git diff --cached --quiet; then
            git commit -m 'release: activate Amy FX Preview 1.5.0-preview.4 update [skip ci]'
            git push origin HEAD:${{ github.ref_name }}
          fi

          git fetch origin experiment/heatmap-news-20260722
          git worktree add /tmp/amyfx-preview-compat origin/experiment/heatmap-news-20260722
          cp preview-update.json /tmp/amyfx-preview-compat/preview-update.json
          cd /tmp/amyfx-preview-compat
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add preview-update.json
          if ! git diff --cached --quiet; then
            git commit -m 'release: route installed Preview apps to 1.5.0-preview.4 [skip ci]'
            git push origin HEAD:experiment/heatmap-news-20260722
          fi

  report-status:
    if: always()
    needs: publish-preview
    runs-on: ubuntu-latest
    steps:
      - name: Publish authoritative Preview release status
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.publish-preview.result }}
        run: |
          state=success
          description='Preview 1.5.0-preview.4 published and update manifest activated'
          if [ "$BUILD_RESULT" != 'success' ]; then
            state=failure
            description="Authoritative Preview release failed: $BUILD_RESULT"
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context='Amy FX v1.5 Authoritative Preview' \
            -f description="$description" \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
