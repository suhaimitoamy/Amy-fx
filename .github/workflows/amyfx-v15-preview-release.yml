name: Validate Amy FX v1.5 Production Candidate

on:
  push:
    branches:
      - feature/amyfx-v1.5-full-enhancements
    paths:
      - app/**
      - lib/**
      - tests/**
      - tools/**
      - docs/**
      - package.json
      - package-lock.json
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - .github/workflows/amyfx-v15-preview-release.yml
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: amyfx-v15-production-candidate
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mark candidate validation pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state='pending' \
            -f context='Amy FX v1.5 Production Candidate' \
            -f description='Running production candidate tests' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Checkout v1.5 feature branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate production source syntax
        run: |
          set -euo pipefail
          node --check app/src/main/assets/apps/mapping/js/main.js
          node --check app/src/main/assets/apps/mapping/js/production-branding.js
          node --check app/src/main/assets/apps/mapping/js/notification-route-sync.js
          node --check app/src/main/assets/apps/mapping/js/entry-watch-runtime-v2.js
          node --check app/src/main/assets/apps/mapping/js/engine/entry-watch-engine.js
          node --check app/src/main/assets/apps/mapping/js/engine/entry-watch-hardening.js
          node --check app/src/main/assets/apps/mapping/js/engine/validated-market-context-balanced.js

      - name: Test group A-F
        run: node --test --test-force-exit tests/[a-f]*.test.mjs

      - name: Test group G-M
        run: node --test --test-force-exit tests/[g-m]*.test.mjs

      - name: Test notification deep-link
        run: node --test --test-force-exit tests/notification-route-sync.test.mjs

      - name: Test production release identity
        run: node --test --test-force-exit tests/production-release-identity.test.mjs

      - name: Test remaining N-Z
        run: |
          set -euo pipefail
          files=()
          for file in tests/[n-z]*.test.mjs; do
            case "$file" in
              tests/notification-route-sync.test.mjs|tests/production-release-identity.test.mjs) ;;
              *) files+=("$file") ;;
            esac
          done
          if [ "${#files[@]}" -gt 0 ]; then
            node --test --test-force-exit "${files[@]}"
          fi

      - name: Publish candidate success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state='success' \
            -f context='Amy FX v1.5 Production Candidate' \
            -f description='All production candidate tests passed' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

      - name: Publish candidate failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state='failure' \
            -f context='Amy FX v1.5 Production Candidate' \
            -f description='Production candidate validation failed' \
            -f target_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
