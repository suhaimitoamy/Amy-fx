name: Run Asia Range Patch

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/run-asia-patch.yml"

permissions:
  contents: write

jobs:
  run-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Execute embedded Asia patch
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          import textwrap
          from pathlib import Path

          workflow = Path('.github/workflows/patch-asia-range-main.yml').read_text(encoding='utf-8')
          match = re.search(r"python3 - <<'PY'\n(.*?)\n\s*PY\n", workflow, re.S)
          if not match:
              raise SystemExit('embedded Asia patch not found')
          code = textwrap.dedent(match.group(1))
          exec(compile(code, 'asia-range-patch', 'exec'), {})
          PY

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app api tests update.json .github/workflows/build-apk.yml .github/workflows/build-release.yml
          git commit -m "feat(mapping): add Asia high and low session levels"
          git push origin HEAD:main
