name: Validate Amy FX 1.4.7 Release Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - agent/amyfx-stage5-release
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: amyfx-stage5-release-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
  AMYFX_KEYSTORE_PASSWORD: android
  AMYFX_KEY_ALIAS: androiddebugkey
  AMYFX_KEY_PASSWORD: android
  AMYFX_VERSION_NAME: "1.4.7"
  AMYFX_VERSION_CODE: "30"
  AMYFX_SIGNING_CERT_SHA256: "47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7"

jobs:
  validate-release:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout release candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore permanent Amy FX signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify update-compatible signing certificate
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Permanent Amy FX signing key tidak ditemukan."
            exit 1
          fi
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run JavaScript regression tests
        run: node --test tests/*.test.mjs

      - name: Verify repository integrity
        run: |
          set -euo pipefail
          rm -f local.properties
          git diff --check
          test -z "$(git status --porcelain | grep -E '(^|/)(.*\.jks|.*\.keystore)$' || true)"

      - name: Run Android release unit tests
        run: ./gradlew testReleaseUnitTest --no-configuration-cache

      - name: Run Android release lint
        run: ./gradlew lintRelease --no-configuration-cache

      - name: Build signed Amy FX 1.4.7 APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Verify APK identity, version and signer
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$apk" | grep -F "package: name='com.amyelitesuite' versionCode='${AMYFX_VERSION_CODE}' versionName='${AMYFX_VERSION_NAME}'"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$apk" | tee /tmp/apksigner.txt
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' /tmp/apksigner.txt | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test -n "$actual"
          test "$actual" = "$expected"

      - name: Upload validated APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v1.4.7-stage5-signed-apk
          path: app/build/outputs/apk/release/app-release.apk
