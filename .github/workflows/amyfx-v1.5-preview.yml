name: Amy FX v1.5 Preview Legacy Workflow (Disabled)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amyfx-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy workflow disabled
        run: |
          echo 'Legacy Preview publisher is disabled.'
          echo 'Use .github/workflows/amyfx-v15-preview-release.yml for all v1.5 Preview releases.'
