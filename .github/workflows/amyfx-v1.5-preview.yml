name: Amy FX v1.5 Preview Update

on:
  push:
    branches:
      - feature/amyfx-v1.5-full-enhancements
    paths-ignore:
      - preview-update.json
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: amyfx-v1-5-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  AMYFX_UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/suhaimitoamy/Amy-fx/feature/amyfx-v1.5-full-enhancements/preview-update.json
  AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
  AMYFX_KEYSTORE_PASSWORD: android
  AMYFX_KEY_ALIAS: androiddebugkey
  AMYFX_KEY_PASSWORD: android
  AMYFX_SIGNING_CERT_SHA256: "47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7"
  AMYFX_APPLICATION_ID: com.amyelitesuite.learningpreview
  AMYFX_APP_LABEL: Amy FX Preview
  AMYFX_URI_SCHEME: amyfxpreview
  AMYFX_VERSION_NAME: 1.4.15-preview.11
  AMYFX_VERSION_CODE: '90050'
  PREVIEW_TAG: amyfx-preview-v1.4.15-preview.11
  PREVIEW_ARTIFACT: AmyFX-Preview-v1.4.15-preview.11

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout v1.5 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Preview version and update channel
        run: |
          set -euo pipefail
          node tools/configure-preview-web-version.mjs "$AMYFX_VERSION_NAME" "$AMYFX_VERSION_CODE" "$AMYFX_UPDATE_MANIFEST_URL"
          node --check app/src/main/assets/app-version.js
          node --check app/src/main/assets/update-checker.js
          grep -Fq "name: '$AMYFX_VERSION_NAME', code: $AMYFX_VERSION_CODE" app/src/main/assets/app-version.js
          grep -Fq "window.AmyFXUpdateManifestUrl = '$AMYFX_UPDATE_MANIFEST_URL';" app/src/main/assets/app-version.js
          grep -Fq 'Update Amy FX Preview Tersedia' app/src/main/assets/update-checker.js
          grep -Fq 'announceNativeUpdate(latestCode, latestName);' app/src/main/assets/update-checker.js

      - name: Run JavaScript tests
        run: |
          set -euo pipefail
          node --test tests/preview-updater-config.test.mjs
          node --test --test-reporter=spec tests/*.test.mjs

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Preview signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent Preview signing key
        run: |
          set -euo pipefail
          test "${{ steps.signing-cache.outputs.cache-hit }}" = "true"
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Build signed Amy FX Preview
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :app:testReleaseUnitTest :app:lintRelease :app:assembleRelease --stacktrace --no-daemon --no-configuration-cache
          cp app/build/outputs/apk/release/app-release.apk AmyFX-Preview-latest.apk

      - name: Verify APK identity and signer
        run: |
          set -euo pipefail
          APK='AmyFX-Preview-latest.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$AAPT" dump badging "$APK" | tee /tmp/preview-badging.txt
          grep -Fq "package: name='$AMYFX_APPLICATION_ID' versionCode='$AMYFX_VERSION_CODE' versionName='$AMYFX_VERSION_NAME'" /tmp/preview-badging.txt
          grep -Fq "application-label:'$AMYFX_APP_LABEL'" /tmp/preview-badging.txt
          "$APKSIGNER" verify --verbose "$APK"
          cert_entry="$(unzip -Z1 "$APK" | grep -E '^META-INF/[^/]+\.(RSA|DSA|EC)$' | head -n1)"
          test -n "$cert_entry"
          unzip -p "$APK" "$cert_entry" > /tmp/amyfx-preview-cert
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(keytool -printcert -file /tmp/amyfx-preview-cert | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test "$actual" = "$expected"

      - name: Upload Preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PREVIEW_ARTIFACT }}
          path: AmyFX-Preview-latest.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish Preview release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$PREVIEW_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$PREVIEW_TAG" --repo "$GITHUB_REPOSITORY" --yes
          fi
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$PREVIEW_TAG" >/dev/null 2>&1 || true
          cat > /tmp/release-notes.md <<'NOTES'
          Amy FX Preview 1.4.15-preview.11

          - Pencarian instan dan progress membaca di Academy.
          - Visual Scenario Bar untuk Entry, SL, TP1, dan TP2.
          - Kurva pertumbuhan equity pada Jurnal Trading.
          - Alert Level lokal pada Heatmap Depth Radar.
          - Pembersihan sintaks Obsidian pada materi Academy.
          NOTES
          gh release create "$PREVIEW_TAG" \
            "AmyFX-Preview-latest.apk#AmyFX-Preview-latest.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title 'Amy FX Preview 1.4.15-preview.11 — Full Enhancements' \
            --notes-file /tmp/release-notes.md

      - name: Activate Preview update manifests
        run: |
          set -euo pipefail
          cat > preview-update.json <<'JSON'
          {
            "channel": "amyfx-preview-professional-ui",
            "latest_version_code": 90050,
            "latest_version_name": "1.4.15-preview.11",
            "versionCode": 90050,
            "version": "1.4.15-preview.11",
            "releaseDate": "2026-07-22",
            "apk_url": "https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-preview-v1.4.15-preview.11/AmyFX-Preview-latest.apk",
            "downloadUrl": "https://github.com/suhaimitoamy/Amy-fx/releases/download/amyfx-preview-v1.4.15-preview.11/AmyFX-Preview-latest.apk",
            "force_update": false,
            "mandatory": false,
            "enabled": true,
            "release_notes": [
              "Pencarian instan dan progress membaca di Academy",
              "Visual Scenario Bar untuk Entry, SL, TP1, dan TP2",
              "Kurva pertumbuhan equity pada Jurnal Trading",
              "Alert Level lokal pada Heatmap Depth Radar",
              "Pembersihan sintaks Obsidian pada materi Academy"
            ],
            "changelog": [
              "Pencarian instan dan progress membaca di Academy",
              "Visual Scenario Bar untuk Entry, SL, TP1, dan TP2",
              "Kurva pertumbuhan equity pada Jurnal Trading",
              "Alert Level lokal pada Heatmap Depth Radar",
              "Pembersihan sintaks Obsidian pada materi Academy"
            ]
          }
          JSON
          python -m json.tool preview-update.json >/dev/null
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add preview-update.json
          if ! git diff --cached --quiet; then
            git commit -m 'release: activate Amy FX Preview 1.4.15-preview.11 update [skip ci]'
            git push origin HEAD:${{ github.ref_name }}
          fi

          git fetch origin experiment/heatmap-news-20260722
          git worktree add /tmp/amyfx-preview-compat origin/experiment/heatmap-news-20260722
          cp preview-update.json /tmp/amyfx-preview-compat/preview-update.json
          cd /tmp/amyfx-preview-compat
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add preview-update.json
          if ! git diff --cached --quiet; then
            git commit -m 'release: route installed Preview apps to 1.4.15-preview.11 [skip ci]'
            git push origin HEAD:experiment/heatmap-news-20260722
          fi
