name: Publish Validated Amy FX Stage 5 Sources

on:
  push:
    branches:
      - agent/amyfx-stage5-release

permissions:
  contents: write

concurrency:
  group: amyfx-stage5-publish
  cancel-in-progress: true

jobs:
  publish-sources:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/amyfx-stage5-release
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply deterministic stage 5 patch
        run: |
          set -euo pipefail
          python3 tools/stage5_patch.py
          python3 tools/stage5_test_compat.py
          node --test tests/*.test.mjs

      - name: Keep workflow updates for connector publication
        run: |
          set -euo pipefail
          git restore --source=HEAD -- \
            .github/workflows/build-apk.yml \
            .github/workflows/build-release.yml \
            .github/workflows/stage5-apply.yml \
            tools/stage5_patch.py \
            tools/stage5_test_compat.py
          rm -f local.properties
          git diff --check

      - name: Commit validated non-workflow changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md api app gradlew tests update.json
          git commit -m "fix: harden Amy FX 1.4.6 application"
          git push origin HEAD:agent/amyfx-stage5-release
