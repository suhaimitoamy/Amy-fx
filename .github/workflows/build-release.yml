name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version Name (e.g., 1.4.7)"
        required: true
        default: "1.4.7"
      versionCode:
        description: "Version Code (must increase)"
        required: true
        default: "30"

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
      AMYFX_KEYSTORE_PASSWORD: android
      AMYFX_KEY_ALIAS: androiddebugkey
      AMYFX_KEY_PASSWORD: android
      AMYFX_VERSION_NAME: ${{ github.event.inputs.versionName }}
      AMYFX_VERSION_CODE: ${{ github.event.inputs.versionCode }}
      AMYFX_SIGNING_CERT_SHA256: "47:C2:32:BC:44:FA:63:C9:2F:FE:41:1F:71:40:40:4C:09:AA:2A:9C:BF:82:B1:85:9A:86:0B:85:56:7B:AD:C7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Amy FX signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent signing key
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Permanent Amy FX signing key tidak ditemukan. Build dihentikan agar update lama tetap kompatibel."
            exit 1
          fi
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          actual="$(keytool -list -v -keystore "$AMYFX_KEYSTORE_PATH" -storepass "$AMYFX_KEYSTORE_PASSWORD" -alias "$AMYFX_KEY_ALIAS" | sed -n 's/^[[:space:]]*SHA256: //p' | head -n1)"
          test "$actual" = "$AMYFX_SIGNING_CERT_SHA256"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JavaScript regression tests
        run: node --test tests/*.test.mjs

      - name: Run Android unit tests
        run: ./gradlew testReleaseUnitTest --no-configuration-cache

      - name: Run Android lint
        run: ./gradlew lintRelease --no-configuration-cache

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Verify APK identity, requested version and signer
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$apk" | grep -F "package: name='com.amyelitesuite' versionCode='${AMYFX_VERSION_CODE}' versionName='${AMYFX_VERSION_NAME}'"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$apk" | tee /tmp/apksigner.txt
          expected="$(echo "$AMYFX_SIGNING_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          actual="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' /tmp/apksigner.txt | head -n1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          test -n "$actual"
          test "$actual" = "$expected"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v${{ github.event.inputs.versionName }}-signed-apk
          path: app/build/outputs/apk/release/app-release.apk
