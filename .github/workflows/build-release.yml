name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version Name (e.g., 1.3.9)"
        required: true
        default: "1.3.9"
      versionCode:
        description: "Version Code (must increase)"
        required: true
        default: "22"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AMYFX_KEYSTORE_PATH: /tmp/amy-fx-signing.keystore
      AMYFX_KEYSTORE_PASSWORD: android
      AMYFX_KEY_ALIAS: androiddebugkey
      AMYFX_KEY_PASSWORD: android
      AMYFX_VERSION_NAME: ${{ github.event.inputs.versionName }}
      AMYFX_VERSION_CODE: ${{ github.event.inputs.versionCode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore permanent Amy FX signing key
        id: signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.android/debug.keystore
          key: amy-fx-debug-keystore-v1

      - name: Verify permanent signing key
        run: |
          set -euo pipefail
          if [ "${{ steps.signing-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Permanent Amy FX signing key tidak ditemukan. Build dihentikan agar update lama tetap kompatibel."
            exit 1
          fi
          cp "$HOME/.android/debug.keystore" "$AMYFX_KEYSTORE_PATH"
          keytool -list -keystore "$AMYFX_KEYSTORE_PATH" -storepass android -alias androiddebugkey >/dev/null

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JS regression tests
        run: node --test tests/*.test.mjs

      - name: Run Android unit tests
        run: ./gradlew testReleaseUnitTest --no-configuration-cache

      - name: Run Android lint
        run: ./gradlew lintRelease --no-configuration-cache

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v${{ github.event.inputs.versionName }}-signed-apk
          path: app/build/outputs/apk/release/app-release.apk
