name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare keystore
        env:
          AMYFX_KEYSTORE_BASE64: ${{ secrets.AMYFX_KEYSTORE_BASE64 }}
          AMYFX_KEYSTORE_PATH: ${{ secrets.AMYFX_KEYSTORE_PATH }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/keystore"
          if [ -n "$AMYFX_KEYSTORE_BASE64" ]; then
            echo "$AMYFX_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/amy-fx-release.keystore"
          elif [ -n "$AMYFX_KEYSTORE_PATH" ]; then
            echo "$AMYFX_KEYSTORE_PATH" | base64 -d > "$RUNNER_TEMP/keystore/amy-fx-release.keystore"
          else
            echo "No keystore secret provided, will build unsigned or with debug signing."
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          AMYFX_KEYSTORE_PATH: ${{ runner.temp }}/keystore/amy-fx-release.keystore
          AMYFX_KEYSTORE_PASSWORD: ${{ secrets.AMYFX_KEYSTORE_PASSWORD }}
          AMYFX_KEY_ALIAS: ${{ secrets.AMYFX_KEY_ALIAS }}
          AMYFX_KEY_PASSWORD: ${{ secrets.AMYFX_KEY_PASSWORD }}
          AMYFX_VERSION_NAME: "1.2.0"
          AMYFX_VERSION_CODE: "12"
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-release-apk
          path: app/build/outputs/apk/release/*.apk
