name: Concept Engine CI

on:
  push:
    branches:
      - fix/market-accuracy-backtest-2022-2026
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: concept-engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-concepts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Mapping JavaScript syntax
        run: find app/src/main/assets/apps/mapping/js -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run concept integration tests
        run: node --test tests/concept-engine.integration.test.mjs

  android-debug-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Android debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: amy-fx-concept-engine-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
