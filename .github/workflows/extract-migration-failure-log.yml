name: Extract Migration Failure Log

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/extract-migration-failure-log.yml

permissions:
  actions: read
  contents: read

jobs:
  extract-log:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download failed job log and extract tail
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api -H "Accept: application/vnd.github+json" \
            repos/${GITHUB_REPOSITORY}/actions/jobs/88068654880/logs > diagnostics/full.log
          tail -n 300 diagnostics/full.log > diagnostics/tail.log
          cat diagnostics/tail.log

      - name: Upload compact failure log
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-migration-failure-log
          path: diagnostics/tail.log
          if-no-files-found: error
          retention-days: 7
