<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050505"><title>Amy FX Mapping</title>
<style>
:root{--bg:#050505;--card:#151515;--gold:#d4af37;--text:#f6f6f6;--muted:#aaa;--green:#4ade80;--red:#ff5252;--border:rgba(212,175,55,.22)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:86px}button,input{font:inherit}.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 14px;background:rgba(10,10,10,.94);border-bottom:1px solid rgba(255,255,255,.07)}.brand{width:50px;height:40px;border-radius:12px;background:var(--gold);color:#111;display:grid;place-items:center;font-weight:950}.brand-title{font-size:20px;font-weight:950}.brand-sub{font-size:12px;color:var(--gold)}.status{margin-left:auto;color:var(--muted);font-weight:900}.status.on{color:var(--green)}.content{padding:16px;max-width:900px;margin:0 auto}.card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px;margin:0 0 16px}.hero{display:flex;justify-content:space-between;gap:14px}.kicker{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.06em}.price{font-size:28px;font-weight:950}.muted{color:var(--muted)}.tf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.tf-grid button,.action,.chip{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text);border-radius:12px;padding:13px 8px;font-weight:900}.tf-grid button.active,.action{background:var(--gold);color:#111;border-color:var(--gold)}.nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(15,15,15,.96);display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:10px 12px calc(env(safe-area-inset-bottom,0px) + 10px);border-top:1px solid rgba(255,255,255,.08)}.nav button{background:transparent;border:0;color:#aaa;font-weight:800;font-size:12px;display:flex;flex-direction:column;gap:3px;align-items:center}.nav button.active{color:var(--gold)}.setup-card{background:linear-gradient(180deg,#181818,#101010);border:1px solid var(--border);border-radius:18px;padding:15px;margin:12px 0}.setup-head{display:flex;justify-content:space-between;gap:10px}.setup-title{font-weight:950;color:var(--gold);font-size:16px}.badge{border:1px solid rgba(212,175,55,.35);border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;color:var(--gold);height:max-content}.badge.buy{color:var(--green);border-color:rgba(74,222,128,.38)}.badge.sell{color:var(--red);border-color:rgba(255,82,82,.38)}.num-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.num{background:#0b0b0b;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px}.num small{display:block;color:var(--muted);font-size:11px;font-weight:800}.num strong{display:block;font-size:15px;margin-top:2px}.reason{margin-top:12px;line-height:1.45;color:#ddd}.concept-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.concept{background:#1b1b1b;border-radius:14px;padding:13px}.concept small{display:block;font-size:11px;font-weight:900;color:var(--gold)}.concept h3{margin:3px 0 8px;color:var(--gold);font-size:15px}.concept p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}.log{background:#1e1e1e;border-left:4px solid var(--gold);padding:12px;border-radius:10px;margin:8px 0;white-space:pre-wrap}.settings input{width:100%;background:#111723;border:1px solid rgba(255,255,255,.12);border-radius:14px;color:#fff;padding:14px;margin:8px 0 14px}.warn{background:rgba(255,82,82,.11);border:1px solid rgba(255,82,82,.22);padding:12px;border-radius:12px}@media(max-width:520px){.concept-grid,.num-grid{grid-template-columns:1fr}.price{font-size:23px}}
</style>
</head>
<body>
<header class="topbar"><div class="brand">XAU</div><div><div class="brand-title">Amy FX Mapping</div><div class="brand-sub">Setup Entry • BSL/SSL • Alerts</div></div><div id="conn" class="status">Offline</div></header>
<main class="content" id="app"></main>
<nav class="nav"><button data-tab="Dashboard" class="active">▥<span>Dashboard</span></button><button data-tab="Analyze">〽<span>Analyze</span></button><button data-tab="Setups">◎<span>Setup</span></button><button data-tab="History">◷<span>History</span></button><button data-tab="Settings">⚙<span>Settings</span></button></nav>
<script>
const TF={M1:'1min',M5:'5min',M15:'15min',M30:'30min',H1:'1h',H4:'4h',D1:'1day',W1:'1week'};
const state={tab:'Dashboard',tf:'M5',key:localStorage.getItem('twelve_api_key')||'',price:Number(localStorage.getItem('last_price')||0),conn:'Offline',logs:JSON.parse(localStorage.getItem('amy_mapping_logs')||'[]'),analyses:JSON.parse(localStorage.getItem('amy_mapping_analyses')||'[]'),setups:JSON.parse(localStorage.getItem('amy_mapping_setups')||'[]'),candles:{},result:null,bg:localStorage.getItem('bg_scanner')==='true',notified:JSON.parse(localStorage.getItem('amy_mapping_notified')||'{}')};
let ws=null,reconnectTimer=null,scanTimer=null;
const p2=v=>Number.isFinite(+v)?Number(v).toFixed(2):'-';
function nowTime(){return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jakarta',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date())}
function log(x){state.logs=[`[${nowTime()}] ${x}`,...state.logs].slice(0,200);save();renderSoft()}
function save(){localStorage.setItem('amy_mapping_logs',JSON.stringify(state.logs.slice(0,200)));localStorage.setItem('amy_mapping_analyses',JSON.stringify(state.analyses.slice(0,80)));localStorage.setItem('amy_mapping_setups',JSON.stringify(state.setups.slice(0,50)));localStorage.setItem('bg_scanner',String(state.bg));}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function atr(cs){return avg(cs.slice(-14).map(c=>c.high-c.low).filter(x=>x>0))||0.5}
function bodyRatio(c){return Math.abs(c.close-c.open)/Math.max(c.high-c.low,0.0001)}
function swings(cs,left=3,right=3){let highs=[],lows=[];for(let i=left;i<cs.length-right;i++){let h=true,l=true;for(let j=1;j<=left;j++){if(cs[i].high<=cs[i-j].high)h=false;if(cs[i].low>=cs[i-j].low)l=false}for(let j=1;j<=right;j++){if(cs[i].high<=cs[i+j].high)h=false;if(cs[i].low>=cs[i+j].low)l=false}if(h)highs.push({...cs[i],index:i});if(l)lows.push({...cs[i],index:i})}return{highs,lows}}
function detectStructure(cs,sw){let trend='NEUTRAL',last=null;for(let i=1;i<cs.length;i++){let ph=[...sw.highs].reverse().find(x=>x.index<i-1),pl=[...sw.lows].reverse().find(x=>x.index<i-1);if(ph&&cs[i].close>ph.high){last={kind:trend==='BEARISH'?'CHOCH':'BOS',dir:'BULLISH',price:ph.high,index:i};trend='BULLISH'}if(pl&&cs[i].close<pl.low){last={kind:trend==='BULLISH'?'CHOCH':'BOS',dir:'BEARISH',price:pl.low,index:i};trend='BEARISH'}}return{trend,last}}
function detectFvg(cs){let a=atr(cs),out=[];for(let i=Math.max(2,cs.length-80);i<cs.length;i++){let x=cs[i-2],m=cs[i-1],z=cs[i];if(!x||!m||!z)continue;let b=Math.abs(m.close-m.open);if(x.high<z.low&&b>a*.55)out.push({type:'BULLISH',bottom:x.high,top:z.low,index:i});if(x.low>z.high&&b>a*.55)out.push({type:'BEARISH',bottom:z.high,top:x.low,index:i})}return out.slice(-8)}
function detectOB(cs,st){if(!st.last)return[];let i=st.last.index,dir=st.last.dir,start=Math.max(0,i-18),leg=cs.slice(start,i),obs=[];if(dir==='BULLISH'){for(let k=leg.length-1;k>=0;k--){let c=leg[k];if(c.close<c.open){obs.push({type:'BULLISH',bottom:c.low,top:Math.max(c.open,c.close),index:start+k});break}}}else{for(let k=leg.length-1;k>=0;k--){let c=leg[k];if(c.close>c.open){obs.push({type:'BEARISH',bottom:Math.min(c.open,c.close),top:c.high,index:start+k});break}}}return obs}
function tfGroup(tf){return tf==='M1'?['M1','M5','M15','H1']:tf==='M5'?['M5','M15','H1','H4']:tf==='M15'?['M15','H1','H4','D1']:tf==='M30'?['M30','H1','H4','D1']:tf==='H1'?['H1','H4','D1','W1']:tf==='H4'?['H4','D1','W1']:['D1','W1']}
function setupObj(type,dir,tf,score,now,entryLow,entryHigh,sl,tp1,tp2,reason,extra={}){return{type,dir,tf,score:Math.round(Math.max(0,Math.min(100,score))),status:score>=70?'READY SETUP':score>=55?'WATCH SETUP':'WAIT',price:now,entryLow,entryHigh,sl,tp1,tp2,reason,...extra}}
function buildSetups(cs,tf,ctx){let out=[],a=Math.max(atr(cs),0.1),price=ctx.price,bsl=ctx.bsl,ssl=ctx.ssl,eq=ctx.eq,last=cs.at(-1),buffer=Math.max(a*.25,0.2);if(ctx.nearOb){let z=ctx.nearOb,dir=z.type==='BULLISH'?'BUY WATCH':'SELL WATCH',sl=dir.startsWith('BUY')?z.bottom-buffer:z.top+buffer,tp1=dir.startsWith('BUY')?Math.min(eq,bsl):Math.max(eq,ssl),tp2=dir.startsWith('BUY')?bsl:ssl;out.push(setupObj('ORDER BLOCK',dir,tf,68+(ctx.final===(dir.startsWith('BUY')?'BULLISH':'BEARISH')?8:0),price,z.bottom,z.top,sl,tp1,tp2,`${z.type} OB aktif di area ${p2(z.bottom)} - ${p2(z.top)}.`))}if(ctx.nearFvg){let z=ctx.nearFvg,dir=z.type==='BULLISH'?'BUY WATCH':'SELL WATCH',sl=dir.startsWith('BUY')?z.bottom-buffer:z.top+buffer,tp1=dir.startsWith('BUY')?Math.min(eq,bsl):Math.max(eq,ssl),tp2=dir.startsWith('BUY')?bsl:ssl;out.push(setupObj('FAIR VALUE GAP',dir,tf,66+(ctx.final===(dir.startsWith('BUY')?'BULLISH':'BEARISH')?8:0),price,z.bottom,z.top,sl,tp1,tp2,`${z.type} FVG aktif di area ${p2(z.bottom)} - ${p2(z.top)}.`))}let sw=ctx.sw,prevHigh=[...sw.highs].reverse().find(x=>x.index<cs.length-2),prevLow=[...sw.lows].reverse().find(x=>x.index<cs.length-2);if(prevLow&&last.low<prevLow.low&&last.close>prevLow.low){let e1=prevLow.low,e2=Math.max(last.close,prevLow.low+buffer),sl=last.low-buffer;out.push(setupObj('LIQUIDITY SWEEP','BUY WATCH',tf,78,price,e1,e2,sl,price+(price-sl),bsl,`SSL ${p2(prevLow.low)} disapu, low sweep ${p2(last.low)}, lalu close kembali di atas SSL.`))}if(prevHigh&&last.high>prevHigh.high&&last.close<prevHigh.high){let e1=Math.min(last.close,prevHigh.high-buffer),e2=prevHigh.high,sl=last.high+buffer;out.push(setupObj('LIQUIDITY SWEEP','SELL WATCH',tf,78,price,e1,e2,sl,price-(sl-price),ssl,`BSL ${p2(prevHigh.high)} disapu, high sweep ${p2(last.high)}, lalu close kembali di bawah BSL.`))}if(ctx.st.last){let s=ctx.st.last,dir=s.dir==='BULLISH'?'BUY WATCH':'SELL WATCH',entryLow=s.dir==='BULLISH'?s.price-buffer:s.price,entryHigh=s.dir==='BULLISH'?s.price:s.price+buffer,sl=s.dir==='BULLISH'?ctx.low-buffer:ctx.high+buffer,tp1=s.dir==='BULLISH'?Math.min(eq,bsl):Math.max(eq,ssl),tp2=s.dir==='BULLISH'?bsl:ssl;out.push(setupObj('STRUCTURE SETUP',dir,tf,s.kind==='CHOCH'?76:72,price,entryLow,entryHigh,sl,tp1,tp2,`${s.kind} ${s.dir} terkonfirmasi di level ${p2(s.price)}.`))}let body=Math.abs(last.close-last.open);if(body>=a*1.5&&bodyRatio(last)>=.6){let bull=last.close>last.open,dir=bull?'BUY WATCH':'SELL WATCH',lo=Math.min(last.open,last.close),hi=Math.max(last.open,last.close),entryLow=bull?lo+body*.35:hi-body*.65,entryHigh=bull?lo+body*.65:hi-body*.35,sl=bull?last.low-buffer:last.high+buffer,tp1=bull?price+(price-sl):price-(sl-price),tp2=bull?bsl:ssl;out.push(setupObj('DISPLACEMENT CANDLE',dir,tf,81,price,Math.min(entryLow,entryHigh),Math.max(entryLow,entryHigh),sl,tp1,tp2,`Candle ${bull?'bullish':'bearish'} besar. Open ${p2(last.open)}, close ${p2(last.close)}, body dominan.`))}return out.filter(x=>Number.isFinite(x.entryLow)&&Number.isFinite(x.entryHigh)&&Number.isFinite(x.sl)&&Number.isFinite(x.tp1)&&Number.isFinite(x.tp2)).sort((a,b)=>b.score-a.score)}
function analyze(cs,tf,htfBiases={}){if(!cs||cs.length<30)return null;let price=state.price||cs.at(-1).close,sw=swings(cs,tf==='M1'?2:3,tf==='M1'?2:3),st=detectStructure(cs,sw),fvg=detectFvg(cs),ob=detectOB(cs,st),high=Math.max(...sw.highs.slice(-5).map(x=>x.high),...cs.slice(-50).map(x=>x.high)),low=Math.min(...sw.lows.slice(-5).map(x=>x.low),...cs.slice(-50).map(x=>x.low)),eq=(high+low)/2,zone=price>eq?'Premium':price<eq?'Discount':'Equilibrium',bsl=[...sw.highs].reverse().find(x=>x.high>price)?.high||Math.max(...cs.slice(-30).map(c=>c.high)),ssl=[...sw.lows].reverse().find(x=>x.low<price)?.low||Math.min(...cs.slice(-30).map(c=>c.low));let htfList=Object.values(htfBiases).filter(Boolean),bull=htfList.filter(x=>x==='BULLISH').length,bear=htfList.filter(x=>x==='BEARISH').length,htf=bear>bull?'BEARISH':bull>bear?'BULLISH':'NEUTRAL';let biasScore=(st.trend==='BULLISH'?1:st.trend==='BEARISH'?-1:0)+(htf==='BULLISH'?2:htf==='BEARISH'?-2:0),final=biasScore>0?'BULLISH':biasScore<0?'BEARISH':'NEUTRAL';let nearFvg=fvg.find(x=>price>=x.bottom&&price<=x.top)||fvg.at(-1),nearOb=ob.find(x=>price>=x.bottom&&price<=x.top)||ob[0];let ctx={tf,price,sw,st,nearFvg,nearOb,final,bsl,ssl,high,low,eq,zone};let setups=buildSetups(cs,tf,ctx),best=setups[0]||null,signal=best?best.dir:'WAIT',score=best?best.score:45+Math.abs(biasScore)*8;return{tf,price,final,biasScore,score,signal,zone,high,low,eq,bsl,ssl,st,htf,htfBiases,setups,bestSetup:best,concepts:[['Final Bias',final,`${final} | ${zone}`],['Structure',st.trend,st.last?`${st.last.kind} ${st.last.dir} @ ${p2(st.last.price)}`:'Belum ada break struktur'],['OB',nearOb?'ACTIVE':'WAIT',nearOb?`${nearOb.type} ${p2(nearOb.bottom)} - ${p2(nearOb.top)}`:'Tidak ada OB aktif'],['FVG',nearFvg?'ACTIVE':'WAIT',nearFvg?`${nearFvg.type} ${p2(nearFvg.bottom)} - ${p2(nearFvg.top)}`:'Tidak ada FVG aktif'],['Liquidity','ACTIVE',`BSL ${p2(bsl)} | SSL ${p2(ssl)}`],['Best Setup',best?best.status:'WAIT',best?`${best.type} ${best.score}/100`:'Belum ada setup angka']]} }
async function fetchTf(tf){if(!state.key.trim())throw new Error('API key kosong');let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${TF[tf]}&outputsize=300&apikey=${encodeURIComponent(state.key.trim())}`;let r=await fetch(url);let d=await r.json();if(d.status==='error')throw new Error(d.message||'Fetch gagal');let arr=(d.values||[]).reverse().map(c=>({time:new Date(c.datetime).getTime()/1000,timeframe:tf,open:+c.open,high:+c.high,low:+c.low,close:+c.close,tickCount:1,isClosed:true}));state.candles[tf]=arr;return arr}
async function runAnalysis(tf=state.tf){state.tf=tf;render();try{log('Memindai '+tf+'...');let group=tfGroup(tf);await Promise.all(group.map(x=>state.candles[x]?.length?Promise.resolve(state.candles[x]):fetchTf(x).catch(e=>[])));let htfBiases={};for(let x of group.filter(x=>x!==tf)){let mini=state.candles[x];if(mini?.length>30){let a=analyze(mini,x,{});htfBiases[x]=a?.st?.trend||'NEUTRAL'}}let res=analyze(state.candles[tf],tf,htfBiases);state.result=res;state.setups=[...(res?.setups||[]),...state.setups].slice(0,50);state.analyses=[{id:Date.now(),...res},...state.analyses].slice(0,80);save();log(`${tf} selesai: ${res.signal} score ${res.score}/100`);sendTargetsToNative();notifyImportant(res)}catch(e){log('Error '+tf+': '+e.message)}render()}
function setupText(s){if(!s)return'';return `${s.dir} ${s.tf}\nScore: ${s.score}/100\nEntry: ${p2(s.entryLow)} - ${p2(s.entryHigh)}\nSL: ${p2(s.sl)}\nTP1: ${p2(s.tp1)}\nTP2: ${p2(s.tp2)}\n${s.reason}`}
function notifyImportant(res){let s=res?.bestSetup;if(!s||s.score<70)return;let key=`${s.type}:${s.dir}:${Math.round(s.entryLow*10)}:${Math.round(s.sl*10)}`;let last=state.notified[key]||0;if(Date.now()-last<300000)return;state.notified[key]=Date.now();localStorage.setItem('amy_mapping_notified',JSON.stringify(state.notified));let msg=setupText(s);if(window.Android?.showNotificationWithUrl)window.Android.showNotificationWithUrl('AMY FX — '+s.type,msg,location.href);else if(typeof Notification!=='undefined')Notification.requestPermission().then(p=>p==='granted'&&new Notification('AMY FX — '+s.type,{body:msg}))}
function sendTargetsToNative(){if(state.bg&&window.Android?.startBackgroundScanner){let s=state.result?.bestSetup;if(s){let upper=Math.max(Number(s.entryLow),Number(s.entryHigh)),lower=Math.min(Number(s.entryLow),Number(s.entryHigh));window.Android.startBackgroundScanner(state.key,String(upper),String(lower));}else{let r=state.result;window.Android.startBackgroundScanner(state.key,String(r?.bsl||''),String(r?.ssl||''));}}}
function connect(){if(!state.key.trim()){log('Masukkan API key dulu.');return}localStorage.setItem('twelve_api_key',state.key.trim());if(ws){ws.onclose=null;ws.close()}state.conn='Reconnecting';renderSoft();ws=new WebSocket(`wss://ws.twelvedata.com/v1/quotes/price?apikey=${encodeURIComponent(state.key.trim())}`);ws.onopen=()=>{state.conn='Connected';renderSoft();ws.send(JSON.stringify({action:'subscribe',params:{symbols:'XAU/USD'}}));log('WebSocket Connected.');runAnalysis(state.tf)};ws.onmessage=e=>{try{let d=JSON.parse(e.data),p=+d.price;if(p>1000&&p<10000){state.price=p;localStorage.setItem('last_price',String(p));renderSoft();if(!scanTimer)scanTimer=setTimeout(()=>{scanTimer=null;runAnalysis(state.tf)},15000)}}catch(_){}};ws.onclose=()=>{state.conn='Offline';renderSoft();clearTimeout(reconnectTimer);reconnectTimer=setTimeout(connect,8000)};ws.onerror=()=>log('WebSocket error')}
function setupCard(s,i=0){return`<div class="setup-card"><div class="setup-head"><div><div class="setup-title">SETUP ${i+1} — ${s.type}</div><div class="muted">Timeframe: ${s.tf} • Status: ${s.status}</div></div><span class="badge ${s.dir.startsWith('BUY')?'buy':'sell'}">${s.dir}</span></div><div class="num-grid"><div class="num"><small>Score</small><strong>${s.score}/100</strong></div><div class="num"><small>Harga Sekarang</small><strong>${p2(s.price)}</strong></div><div class="num"><small>Entry Area</small><strong>${p2(s.entryLow)} - ${p2(s.entryHigh)}</strong></div><div class="num"><small>SL</small><strong>${p2(s.sl)}</strong></div><div class="num"><small>TP1</small><strong>${p2(s.tp1)}</strong></div><div class="num"><small>TP2</small><strong>${p2(s.tp2)}</strong></div></div><div class="reason"><b>Alasan:</b><br>${s.reason}</div></div>`}
function dashboard(){let r=state.result,s=r?.bestSetup;return`<section class="hero card"><div><div class="kicker">AMY FX SETUP ENGINE</div><h1>XAU/USD</h1><div class="muted">WIB ${nowTime()}</div></div><div style="text-align:right"><div class="muted">Gold Price</div><div class="price">$${p2(state.price)}</div><div class="${state.conn==='Connected'?'green':'muted'}">${state.conn}</div></div></section><button class="action" onclick="setTab('Analyze')" style="width:100%;margin-bottom:16px">⚡ Analisis Setup</button><section class="card"><h2>Best Setup</h2>${s?setupCard(s,0):'<p class="muted">Belum ada setup. Klik Analisis Setup.</p>'}</section><section class="card"><h2>Market Concepts</h2><div class="concept-grid">${(r?.concepts||[]).map(c=>`<div class="concept"><small>${c[1]}</small><h3>${c[0]}</h3><p>${c[2]}</p></div>`).join('')||'<p class="muted">Belum ada analisis.</p>'}</div></section>`}
function analyzeView(){return`<section class="card"><div class="kicker">PILIH TIMEFRAME</div><h1>Setup Entry Mapping</h1><p class="muted">Setup yang muncul: OB, FVG, Liquidity Sweep, Structure, Displacement.</p></section><section class="card"><div class="tf-grid">${Object.keys(TF).map(x=>`<button class="${state.tf===x?'active':''}" onclick="runAnalysis('${x}')">${x}</button>`).join('')}</div></section><section class="card"><h2>Setup Aktif</h2>${(state.result?.setups||[]).map(setupCard).join('')||'<p class="muted">Klik timeframe untuk memuat setup angka.</p>'}</section>`}
function setupsView(){let list=state.setups.slice(0,20);return`<section class="card"><h1>Riwayat Setup</h1>${list.map(setupCard).join('')||'<p class="muted">Belum ada setup tersimpan.</p>'}</section>`}
function history(){return`<section class="card"><h1>Event Logs</h1><button class="action" onclick="downloadLogs()">⇩ Download TXT</button>${state.logs.map(x=>`<div class="log">${x}</div>`).join('')||'<p class="muted">Belum ada event.</p>'}</section>`}
function settings(){return`<section class="card settings"><h1>Settings & API</h1><label>Twelve Data API Key</label><input id="apiKey" value="${state.key}" placeholder="Twelve Data API key"><button class="action" onclick="saveConnect()" style="width:100%">🔑 Save & Connect</button><p class="muted">API key disimpan lokal di HP.</p><div class="warn"><b>Background Scanner</b><br>Jika ON, scanner akan memantau Entry Area setup terbaik dari Mapping saat aplikasi ditutup.</div><button class="${state.bg?'action':'chip'}" onclick="toggleBg()" style="width:100%;margin-top:14px">${state.bg?'📡 Background Scanner ON':'📴 Background Scanner OFF'}</button><button class="action" onclick="testNotif()" style="width:100%;margin-top:12px">🔔 Tes Notifikasi Setup</button></section>`}
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));document.getElementById('conn').textContent=state.conn;document.getElementById('conn').className='status '+(state.conn==='Connected'?'on':'');document.getElementById('app').innerHTML=state.tab==='Dashboard'?dashboard():state.tab==='Analyze'?analyzeView():state.tab==='Setups'?setupsView():state.tab==='History'?history():settings()}
function renderSoft(){let c=document.getElementById('conn');if(c){c.textContent=state.conn;c.className='status '+(state.conn==='Connected'?'on':'')}let p=document.querySelector('.price');if(p)p.textContent='$'+p2(state.price)}
function setTab(t){state.tab=t;render()}window.setTab=setTab;window.runAnalysis=runAnalysis;
function saveConnect(){state.key=document.getElementById('apiKey').value.trim();localStorage.setItem('twelve_api_key',state.key);connect();sendTargetsToNative()}window.saveConnect=saveConnect;
function toggleBg(){if(!state.key.trim()){alert('Isi API key dulu.');return}state.bg=!state.bg;save();if(state.bg)sendTargetsToNative();else window.Android?.stopBackgroundScanner?.();render()}window.toggleBg=toggleBg;
function testNotif(){let s=state.result?.bestSetup||{type:'LIQUIDITY SWEEP',dir:'BUY WATCH',tf:'M5',score:78,entryLow:2355.20,entryHigh:2356.00,sl:2353.50,tp1:2358.50,tp2:2362.00,reason:'Contoh notifikasi setup angka.'};let msg=setupText(s);if(window.Android?.showNotificationWithUrl)window.Android.showNotificationWithUrl('AMY FX — '+s.type,msg,location.href);else if(typeof Notification!=='undefined')Notification.requestPermission().then(p=>p==='granted'&&new Notification('AMY FX — '+s.type,{body:msg}))}
function downloadLogs(){let blob=new Blob([state.logs.join('\n')],{type:'text/plain'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='amy-fx-logs.txt';a.click();URL.revokeObjectURL(url)}window.downloadLogs=downloadLogs;window.testNotif=testNotif;
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));render();
</script>
</body>
</html>
