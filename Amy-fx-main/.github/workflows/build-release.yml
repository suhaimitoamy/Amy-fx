name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.3.0)"
        required: true
        default: "1.3.0"
      version_code:
        description: "Version code (integer, increment each release)"
        required: true
        default: "13"
      create_release:
        description: "Create GitHub Release?"
        type: boolean
        default: true

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Restore release keystore
        env:
          AMYFX_KEYSTORE_BASE64: ${{ secrets.AMYFX_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$AMYFX_KEYSTORE_BASE64" ]; then
            echo "$AMYFX_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/amy-fx-release.keystore"
            echo "Keystore restored"
          else
            echo "WARNING: No keystore found. APK will be unsigned."
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-configuration-cache

      - name: Build release APK
        env:
          AMYFX_KEYSTORE_PATH: ${{ runner.temp }}/amy-fx-release.keystore
          AMYFX_KEYSTORE_PASSWORD: ${{ secrets.AMYFX_KEYSTORE_PASSWORD }}
          AMYFX_KEY_ALIAS: ${{ secrets.AMYFX_KEY_ALIAS }}
          AMYFX_KEY_PASSWORD: ${{ secrets.AMYFX_KEY_PASSWORD }}
          AMYFX_VERSION_NAME: ${{ inputs.version_name }}
          AMYFX_VERSION_CODE: ${{ inputs.version_code }}
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/release/*.apk release-output/AmyFX-v${{ inputs.version_name }}-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-v${{ inputs.version_name }}-release
          path: release-output/AmyFX-v${{ inputs.version_name }}-release.apk
          retention-days: 90

      - name: Update update.json
        if: ${{ inputs.create_release }}
        run: |
          cat > update.json << EOF
          {
            "version": "${{ inputs.version_name }}",
            "versionCode": ${{ inputs.version_code }},
            "releaseDate": "$(date +%Y-%m-%d)",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version_name }}/AmyFX-v${{ inputs.version_name }}-release.apk",
            "changelog": [
              "Release v${{ inputs.version_name }}"
            ],
            "mandatory": false
          }
          EOF

      - name: Commit update.json
        if: ${{ inputs.create_release }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || git commit -m "chore: bump update.json to v${{ inputs.version_name }}"
          git push

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: Amy FX v${{ inputs.version_name }}
          body: |
            ## Amy FX v${{ inputs.version_name }}

            **Download APK di bawah ini lalu install di HP Android.**

            ### Cara Install
            1. Download file `.apk`
            2. Buka file di HP → Allow from unknown sources jika diminta
            3. Install dan buka Amy FX

          files: release-output/AmyFX-v${{ inputs.version_name }}-release.apk
          draft: false
          prerelease: false
